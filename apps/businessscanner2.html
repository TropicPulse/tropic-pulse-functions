  // 2. Start values YOU defined

  let nextBusIndex = maxBusIndex + 1;

  console.log("➡️ Starting listing_id:", nextListingId);
  console.log("➡️ Starting busIndex:", nextBusIndex);

  let insertedCount = 0;

  // 3. Insert only NEW businesses
  for (const mock of mappedList) {

    // MUST have placeId

      console.log("⏭ SKIPPED (no placeId):", mock.busname);

    // ---------------- VALIDATORS ----------------
function isValidBelizePhone(phone) {
  if (!phone) return false;
  const cleaned = phone.replace(/\D/g, ""); // remove non-digits
  return cleaned.length === 11 && cleaned.startsWith("501");
}
// -----------------------------------------------------
// PHONE NORMALIZER
// -----------------------------------------------------
function normalizePhone(raw, row, coords = {}) {
  if (!raw) return null;

  // Clean weird whitespace + NBSP
  let v = String(raw)
    .replace(/\u00A0/g, " ")
    .trim();

  // Strip everything except digits and +
  v = v.replace(/[^\d+]/g, "");

  // Already valid E.164
  if (v.startsWith("+") && v.length >= 8 && v.length <= 15) {
    return v;
  }

  // Remove leading +
  if (v.startsWith("+")) v = v.slice(1);

  // Pure digits
  const digits = v.replace(/\D/g, "");

  // --- BELIZE LOGIC ---
  // 7‑digit local numbers → +501
  if (digits.length === 7) {
    return "+501" + digits;
  }

  // 501 + 7 digits → +501xxxxxxx
  if (digits.startsWith("501") && digits.length === 10) {
    return "+501" + digits.slice(3);
  }

  // --- US / CANADA ---
  if (digits.length === 10) {
    return "+1" + digits;
  }

  if (digits.length === 11 && digits.startsWith("1")) {
    return "+1" + digits.slice(1);
  }

  // --- INTERNATIONAL FALLBACK ---
  if (digits.length >= 8 && digits.length <= 15) {
    return "+" + digits;
  }

  // Reject everything else
  return null;
}

function isValidWebsite(url) {
  if (!url) return false;
  if (url.startsWith("http://") || url.startsWith("https://")) return true;
  if (url.includes(".") && !url.includes(" ")) return true;
  return false;
}

function normalizeWebsite(url) {
  if (!url) return null;

  url = url.trim();

  // If it already starts with http/https → good
  if (url.startsWith("http://") || url.startsWith("https://")) {
    return url;
  }

  // If it contains a dot and no spaces → add https://
  if (url.includes(".") && !url.includes(" ")) {
    return "https://" + url;
  }

  return null;
}

        hasDescription = true;
      }
    }

    if (hasDescription) {
      businessesWithText++;
    }

    mock.descriptionExists = hasDescription;

    // ---------------- CATEGORY ENGINE ----------------
    const allTypes = [
      ...(p.types || []),
      ...(p.googleTypes || []),
      ...(p.raw?.types || []),
      ...(p.raw?.googleTypes || [])
    ];

    const { categories, subcategories } = mapCategoriesFromTypes(allTypes);

    mock.categories = categories.length > 0 ? categories : null;
    mock.subcategories = subcategories.length > 0 ? subcategories : null;

    // ---------------- SUMMARY KEY ----------------
    const key = mainMissing.join(",") || "none";
    missingSummary[key] = (missingSummary[key] || 0) + 1;

    // ---------------- LOGGING ----------------
    log(`📄 Mock Business Document:`);
    log(JSON.stringify(mock, null, 2));

    log(`⚠️ Missing Fields: ${JSON.stringify(missing)}`);
    log(`⚠️ Missing MAIN Fields: ${mainMissing.length ? mainMissing.join(", ") : "none"}`);

    // Collect for saving
    mappedBusinesses.push(mock);
  }

  // ---------------- SUMMARY OUTPUT ----------------
  log("\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
  log("📊 SUMMARY OF MISSING MAIN FIELDS:\n");

  Object.entries(missingSummary).forEach(([key, count]) => {
    log(`• ${count} businesses missing: ${key}`);
  });

  // PHONE SUMMARY
  log("\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
  log("📞 PHONE SUMMARY:");
  log(`• Missing: ${phoneMissing}`);
  log(`• Invalid: ${phoneInvalid}`);
  log(`• Valid: ${phoneValid}`);

  // IMAGE SUMMARY
  log("\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
  log("🖼️ IMAGE SUMMARY:");
  log(`• Businesses with images: ${businessesWithImages}`);
  log(`• Businesses without images: ${sanPedroWithHours.length - businessesWithImages}`);

  // DESCRIPTION SUMMARY
  log("\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
  log("📝 DESCRIPTION SUMMARY:");
  log(`• Businesses with descriptions: ${businessesWithText}`);
  log(`• Businesses without descriptions: ${sanPedroWithHours.length - businessesWithText}`);

  // WEBSITE SUMMARY
  log("\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━");
  log("🌐 WEBSITE SUMMARY:");
  log(`• Missing: ${websiteMissing}`);
  log(`• Invalid: ${websiteInvalid}`);
  log(`• Valid: ${websiteValid}`);

  log("\n🎉 AUDIT COMPLETE.");

  // ---------------- SAVE TO BUSINESSES ----------------
  await saveMappedBusinesses(mappedBusinesses);

  btnRun.disabled = false;
}

    btnRun.onclick = auditPendingToBusinessFormat;
    btnDel.onclick = deleteBadBusinesses;
  </script>
</body>
