function safeLogout() {
  localStorage.removeItem("tp_token_v4");
  localStorage.removeItem("tp_device_token_v4");
  mark("SAFE LOGOUT");
}

async function hardLogout(reason) {
  try {
    mark("HARD LOGOUT: " + (reason || "unknown"));
    localStorage.removeItem("tp_token_v4");
    localStorage.removeItem("tp_device_token_v4");
    await reportDanger(reason || "hardLogout");
  } catch (err) {
    mark("HARD LOGOUT ERROR: " + err);

    localStorage.removeItem("tp_device_token_v4");

  }
}

async function loginBootstrap() {
  showTPLoader();
  mark("BOOTSTRAP START");

  try {
    identity = JSON.parse(localStorage.getItem("tp_identity_v4") || "{}");
    
  } catch (err) {
    identity = null;
  }
  
userName  = identity.name  || null;
    userEmail = identity.email || null;
    userID    = identity.uid   || null;
  token     = localStorage.getItem("tp_token_v4");
  autologin = localStorage.getItem("tp_stay_signed_v4") === "1";
  trusted   = localStorage.getItem("tp_device_token_v4") === "1";

  const now       = nowMs();
  const lastLocal = Number(localStorage.getItem("tp_last_active_v4")) || 0;
  const inactive  = now - lastLocal > 15 * 60 * 1000;

  // 1️⃣ No token → must log in
  if (!token) {
    hideTPLoader();
    mark("NO TOKEN → REQUIRE LOGIN");
    emailSection.style.display = "block";
    rememberSection.style.display = "block";
    pinSection.style.display = "none";
    return;
  }

  // 2️⃣ Try restoring identity
  const result = await restoreIdentityFlow("BOOTSTRAP", token);
  if (!result.ok) {
    hideTPLoader();
    mark("RESTORE FAILED → SHOW LOGIN UI");
    emailSection.style.display = "block";
    rememberSection.style.display = "block";
    pinSection.style.display = "none";
    return;
  }

  // 3️⃣ Session logic
  const target = returnTo || "https://www.tropicpulse.bz/dashboard.html";

  if (!inactive) {
    mark("SESSION ACTIVE → PREWARM + REDIRECT");
    hideTPLoader();
    return window.location.href = target;
  }

  if (inactive && (autologin || trusted)) {
    mark("SESSION STALE BUT TRUSTED/AUTOLOGIN → PREWARM + REDIRECT");
    hideTPLoader();
    return window.location.href = target;
  }

  // 4️⃣ Stale + not trusted → PIN
  hideTPLoader();
  mark("STALE + NOT TRUSTED → REQUIRE PIN");
  emailSection.style.display = "block";
  rememberSection.style.display = "block";
  pinSection.style.display = "none";
}

// -----------------------------
// UNIFIED IDENTITY RESTORE ENGINE
// -----------------------------
async function restoreIdentityFlow(mode, jwtToken) {
  

  const data = await getAuth( jwtToken );

  // HARD LOGOUT
  if (data.hardLogout) {
    mark(`HARD LOGOUT → ${mode}`);
    await hardLogout(`${mode}_hardLogout`);
    return { ok: false };
  }

  // SOFT LOGOUT
  if (!data.firebaseToken) {
    mark(`SOFT LOGOUT → ${mode}`);
    safeLogout();
    return { ok: false };
  }

  // Load identity
  try {
    identity = JSON.parse(localStorage.getItem("tp_identity_v4") || "{}");
  } catch (err) {
    mark(`IDENTITY PARSE ERROR → ${mode}: ${err}`);
    safeLogout();
    return { ok: false };
  }

  // Update identity + token
  identity.fauth = data.firebaseToken;

  if (!data.storedToken) {
    mark(`❌ NO storedToken FROM BACKEND → ${mode}`);
    safeLogout();
    return { ok: false };
  }

  token = data.storedToken;

  localStorage.setItem("tp_token_v4", token);
  localStorage.setItem("tp_identity_v4", JSON.stringify(identity));
  localStorage.setItem("tp_last_active_v4", nowMs());

  mark(`IDENTITY FLOW SUCCESS → ${mode}`);

  return { ok: true, realign: data.realign === true };
}

// -----------------------------
// LOADER
// -----------------------------
function showTPLoader() {
  mark("OPENING LOADER IMAGE HERE WE GO!");
  const el = document.getElementById("t-loading");
  if (!el) return;

  el.style.display = "flex";
  requestAnimationFrame(() => {
    el.classList.add("show");
  });
}

// -----------------------------
// WARM START (UI ONLY)
// -----------------------------
function warmStartApp() {
  mark("🔥 WARM START INITIATED");
  try {
    if (pulseband && typeof pulseband.setInitialUIState === "function") {
      pulseband.setInitialUIState();
    }
  } catch (err) {
    mark("warmStartApp: PulseBand UI not ready → " + err);
  }
  // -----------------------------
// SEND PIN (GUARDED)
// -----------------------------
if (!window.__sendPinBound) {
  window.__sendPinBound = true;

  document.getElementById("sendBtn").addEventListener("click", async () => {
    const email = emailInput.value.trim().toLowerCase();
    showTPLoader();

    if (!email || !email.includes("@")) {
      hideTPLoader();
      authMsg.textContent = "Please Enter a Valid Email!";
      authMsg.className = "msg error";
      authMsg.style.display = "block";
      emailSection.style.display = "block";
      rememberSection.style.display = "block";
      pinSection.style.display = "none";
      authMsg.style.fontWeight = "600";
      emailInput.focus();
      return;
    }

    authMsg.style.display = "none";
    try {
      const data = await getHook({
        type: "sendPin",
        email
      });

      hideTPLoader();

      if (data.success) {

        if (data.rateLimitRemaining !== undefined) {
          console.log(
            `PIN requests left: ${data.rateLimitRemaining}, resets at: ${data.rateLimitResetAt}`
          );
        }

        authMsg.style.display = "block";
        authMsg.className = "msg success";
        authMsg.textContent = "PIN Sent! Check your Email!";
        authMsg.style.fontWeight = "600";

        emailSection.style.display = "none";
        rememberSection.style.display = "none";
        pinSection.style.display = "block";
        pinInput.focus();

      } else {
        authMsg.textContent = "Could not Send PIN. Try again!";
        authMsg.className = "msg error";
        authMsg.style.display = "block";

        emailSection.style.display = "block";
        rememberSection.style.display = "block";
        pinSection.style.display = "none";
        emailInput.focus();
      }

    } catch (err) {
      hideTPLoader();
      authMsg.textContent = "Network error. Try again!";
      authMsg.className = "msg error";
      authMsg.style.display = "block";

      emailSection.style.display = "block";
      rememberSection.style.display = "block";
      pinSection.style.display = "none";
      emailInput.focus();
    }
  });
}
// -----------------------------
// VERIFY PIN (GUARDED)
// -----------------------------
if (!window.__verifyPinBound) {
  window.__verifyPinBound = true;

  document.getElementById("verifyBtn").addEventListener("click", async () => {
    const email = emailInput.value.trim().toLowerCase();
    const pin = pinInput.value.trim();
    showTPLoader();

    if (pin.length !== 6) {
      hideTPLoader();
      authMsg.textContent = "PIN must be 6 digits!";
      authMsg.className = "msg error";
      authMsg.style.display = "block";
      pinInput.focus();
      return;
    }

    authMsg.style.display = "none";
    try {
      const data = await getHook({
        type: "verifyPin",
        email,
        pin,
        purpose: "login",
        userID
      });

      hideTPLoader();

      // -----------------------------------------
      // SUCCESS → Save identity + token
      // -----------------------------------------
      if (data.success && data.token && data.identity) {

        // Save JWT
        localStorage.setItem("tp_token_v4", data.token);

        // Save identity
        localStorage.setItem("tp_identity_v4", JSON.stringify(data.identity));

        // Mark device as trusted
        localStorage.setItem("tp_device_token_v4", "1");

        // Stay signed in
        if (document.getElementById("staySignedIn").checked) {
          localStorage.setItem("tp_stay_signed_v4", "1");
        } else {
          localStorage.removeItem("tp_stay_signed_v4");
        }

        // Referral redemption (now backend-based)
        const pendingRef = localStorage.getItem("pendingReferral");
        if (pendingRef) {
          try {
            await getHook({
              type: "redeemReferral",
              referralCode: pendingRef,
              uid: data.identity.uid
            });
          } catch (err) {
            console.error("Referral redemption failed:", err);
          }
          localStorage.removeItem("pendingReferral");
        }

        // Identity restore (OS-style)
        const result = await restoreIdentityFlow("FRESH_LOGIN", data.token);

        if (result.ok) {
          window.location.href = returnTo || "https://www.tropicpulse.bz/dashboard.html";
          return;
        }

        // Restore failed → show login UI
        emailSection.style.display = "block";
        rememberSection.style.display = "block";
        pinSection.style.display = "none";
        return;
      }

      // -----------------------------------------
      // FAILURE → Invalid PIN
      // -----------------------------------------
      authMsg.textContent = "Invalid PIN. Try again!";
      authMsg.className = "msg error";
      authMsg.style.display = "block";
      pinInput.focus();

    } catch (err) {
      hideTPLoader();
      authMsg.textContent = "Network error. Try again!";
      authMsg.className = "msg error";
      authMsg.style.display = "block";
      pinInput.focus();
    }
  });
}
// -----------------------------------------
  // ⭐ PREVENT DUPLICATE LISTENERS
  // -----------------------------------------
  if (!window.__pulsebandListenersAttached) {
    window.__pulsebandListenersAttached = true;

    // ⭐ 1. Restore state on load (runs ONCE)
    window.addEventListener("load", () => {
      const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
      const disabled = (window.isIdle === true && inactiveFlag === true);

      if (disabled) {
        window.isIdle = true;
        
      } else {
        window.isIdle = false; // active by default
        
      }

      updatePulseBandImage();
      updatePulseBandPanel();
    });

    // ⭐ 2. Badge toggle listener
    document.getElementById("pb-mini-badge").addEventListener("click", () => {
      const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
      const disabled = (window.isIdle === true && inactiveFlag === true);

      if (disabled) {
        // Turn ON
        localStorage.removeItem("pulseband_disabled");
        window.isIdle = false;
        
      } else {
        // Turn OFF
        localStorage.setItem("pulseband_disabled", "1");
        window.isIdle = true;
        
      }

      updatePulseBandImage();
      updatePulseBandPanel();
    });
  }
  mark("🔥 WARM START COMPLETE");
}

function hideTPLoader() {
  const el = document.getElementById("t-loading");
  if (!el) return;

  el.classList.remove("show");
  requestAnimationFrame(() => {
    mark("HIDING LOADER IMAGE ITS ALMOST OVER!");
    el.style.display = "none";
  }, 300);

  if (emailInput) emailInput.focus();
  if (pinInput) pinInput.focus();
}

function mark(label) {
    const now = nowMs();
    console.log(`${label}: +${(now - lastTime).toFixed(1)}ms`);
    lastTime = now;
  }

  function isDesktop() {
  const ua = navigator.userAgent.toLowerCase();

  const mobileUA =
    ua.includes("iphone") ||
    ua.includes("android") ||
    ua.includes("ipad") ||
    ua.includes("mobile");

  const smallScreen = window.innerWidth < 900 || window.innerHeight < 700;
  const touch = navigator.maxTouchPoints > 1;

  // If UA says mobile AND screen is small AND touch exists → it's mobile
  if (mobileUA && smallScreen && touch) return false;

  // Otherwise → desktop
  return true;
}
// ------------------------------------------------------
// UNIVERSAL PULSEBAND DATA PIPELINE (ADD TO EVERY PAGE)
// ------------------------------------------------------
function attachPulseBandPipeline() {
  if (!PulseClient || !pulseband) {
    console.warn("PulseBand pipeline: PulseClient or pulseband missing");
    return;
  }

  // 1. When PulseClient state changes → update PulseBand UI
  PulseClient.onStateChange = (state) => {
    try {
      if (pulseband.update) {
        pulseband.update(state);
      }
    } catch (err) {
      console.error("PulseBand.update failed:", err);
    }
  };

  // 2. Immediately push initial state if available
  try {
    if (PulseClient.getState && pulseband.update) {
      const initial = PulseClient.getState();
      pulseband.update(initial);
    }
  } catch (err) {
    console.error("PulseBand initial update failed:", err);
  }
}

  function mark(label) {
    console.log(label);
  }

  mark("CHECKEMAIL: STARTING DOM LOAD");
  // ------------------------------------
  // WARM START (PulseBand UI only)

  mark("STARTING DOM WARMSTARTAPP");
  warmStartApp();
  mark("ENDING DOM WARMSTARTAPP");
  mark("STARTING DOM attachPulseBandPipeline");
  attachPulseBandPipeline();
  mark("ENDING DOM attachPulseBandPipeline");
  
  // ------------------------------------
  // LOGIN BOOTSTRAP (identity + session + cache warm)
  // ------------------------------------
  mark("STARTING DOM BOOTSTRAP");
  await loginBootstrap();
  mark("ENDING DOM BOOTSTRAP");
  // ------------------------------------
  // PULSEBAND BADGE + PANEL TOGGLE
  // ------------------------------------
  const badge = document.getElementById("pulseband-badge");
  const panel = document.getElementById("pulseband-panel");

  badge.onclick = (e) => {
    e.stopPropagation();
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  };

  document.addEventListener("click", (e) => {
    const clickedInsidePanel = panel.contains(e.target);
    const clickedBadge = badge.contains(e.target);

    if (!clickedInsidePanel && !clickedBadge) {
      panel.style.display = "none";
    }
  });
  // -----------------------------------------
  // ⭐ LIVE PULSEBAND UPDATE LOOP
  // -----------------------------------------
  setInterval(async () => {
    const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
    const disabled = (window.isIdle === true && inactiveFlag === true);

    if (disabled) return;

    const status = pulseband.getStatus();
    const data = await window.getPulseBandRate();

    pulseband.setStatus({
      ...status,
      ...data,
      lastSyncTimestamp: nowMs(),
      lastSyncSeconds: 0
    });
  }, 3000);

  // -----------------------------------------
  // ⭐ LAST SYNC COUNTER LOOP
  // -----------------------------------------
  setInterval(() => {
    const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
    const disabled = (window.isIdle === true && inactiveFlag === true);

    const status = pulseband.getStatus();
    const ts = getSafeTimestamp(status);

    const seconds = safeSeconds((nowMs() - ts) / 1000);

    pulseband.setStatus({
      ...status,
      lastSyncTimestamp: ts,
      lastSyncSeconds: seconds
    });
  }, 1000);
  mark("CHECKEMAIL: ENDING DOM LOAD");

})();
