<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pulse AI Admin Dashboard — Forensic Edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* -------------------------------------------------------
   GLOBAL — Pulse OS aesthetic
-------------------------------------------------------- */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at top, #1f2937 0, #020617 45%, #000 100%);
    color: #e5e7eb;
    overflow-x: hidden;
}

/* -------------------------------------------------------
   HEADER — glass + glow
-------------------------------------------------------- */
header {
    backdrop-filter: blur(14px);
    background: linear-gradient(90deg, rgba(15,23,42,0.9), rgba(15,23,42,0.6));
    border-bottom: 1px solid rgba(148,163,184,0.4);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
    z-index: 20;
}

header img {
    height: 52px;
    filter: drop-shadow(0 0 10px rgba(56,189,248,0.9));
}

h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #f9fafb;
    text-shadow: 0 0 12px rgba(56,189,248,0.7);
}

/* -------------------------------------------------------
   LAYOUT
-------------------------------------------------------- */
.container {
    padding: 26px;
    max-width: 1320px;
    margin: 0 auto;
}

/* -------------------------------------------------------
   CONTROLS — neon buttons
-------------------------------------------------------- */
.controls {
    margin-bottom: 24px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
}

button {
    background: linear-gradient(135deg, #22d3ee, #3b82f6);
    color: white;
    border: none;
    padding: 11px 20px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 6px 18px rgba(37,99,235,0.6);
    transition: 0.2s ease;
}

button:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 26px rgba(37,99,235,0.8);
}

input[type="file"] {
    padding: 9px 12px;
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(148,163,184,0.6);
    border-radius: 999px;
    color: #e5e7eb;
    font-size: 13px;
}

/* -------------------------------------------------------
   SUMMARY CARDS — 3D tiles
-------------------------------------------------------- */
.cards {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-bottom: 26px;
}

.card {
    width: 250px;
    padding: 18px 18px 16px 18px;
    border-radius: 18px;
    background: radial-gradient(circle at top left, rgba(56,189,248,0.18), rgba(15,23,42,0.95));
    backdrop-filter: blur(12px);
    box-shadow: 0 14px 32px rgba(0,0,0,0.7);
    transition: 0.25s ease;
    border: 1px solid rgba(148,163,184,0.5);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    top: -40%;
    right: -40%;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle, rgba(56,189,248,0.35), transparent 70%);
    opacity: 0.7;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0,0,0,0.85);
}

.card.ok { border-left: 5px solid #22c55e; }
.card.warning { border-left: 5px solid #eab308; }
.card.error { border-left: 5px solid #ef4444; }

.card h3 {
    margin: 0 0 6px 0;
    font-size: 18px;
    color: #f9fafb;
}

.card p {
    margin: 0;
    font-size: 13px;
    color: #cbd5f5;
}

/* -------------------------------------------------------
   PANELS — glass containers
-------------------------------------------------------- */
.panel {
    background: radial-gradient(circle at top left, rgba(15,23,42,0.9), rgba(15,23,42,0.98));
    padding: 20px 22px;
    border-radius: 18px;
    box-shadow: 0 14px 32px rgba(0,0,0,0.75);
    border: 1px solid rgba(148,163,184,0.5);
    margin-bottom: 24px;
}

.panel h2 {
    margin-top: 0;
    font-size: 18px;
    color: #e5e7eb;
}

/* -------------------------------------------------------
   ISSUES LIST
-------------------------------------------------------- */
.issue {
    padding: 10px 0;
    border-bottom: 1px solid rgba(55,65,81,0.8);
    font-size: 13px;
}

.issue:last-child {
    border-bottom: none;
}

.issue .type {
    font-weight: 700;
    margin-right: 8px;
    text-transform: uppercase;
}

.issue.error .type { color: #f97373; }
.issue.warning .type { color: #facc15; }

/* -------------------------------------------------------
   TRACE TERMINAL
-------------------------------------------------------- */
.trace-box {
    background: #020617;
    color: #22c55e;
    padding: 16px 18px;
    border-radius: 14px;
    font-family: "Consolas", "Fira Code", monospace;
    white-space: pre-wrap;
    max-height: 320px;
    overflow-y: auto;
    box-shadow: inset 0 0 18px rgba(0,0,0,0.9);
    border: 1px solid rgba(34,197,94,0.4);
    font-size: 12px;
}

/* -------------------------------------------------------
   VARIABLE LINEAGE PANEL
-------------------------------------------------------- */
.lineage-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 13px;
}

.lineage-item {
    padding: 10px 12px;
    border-radius: 12px;
    background: radial-gradient(circle at top left, rgba(30,64,175,0.6), rgba(15,23,42,0.95));
    border: 1px solid rgba(129,140,248,0.7);
    box-shadow: 0 10px 24px rgba(15,23,42,0.9);
    cursor: pointer;
    transition: 0.2s ease;
}

.lineage-item:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 32px rgba(15,23,42,1);
}

.lineage-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.lineage-name {
    font-weight: 600;
    color: #e5e7eb;
}

.lineage-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid rgba(148,163,184,0.7);
    color: #cbd5f5;
}

.lineage-body {
    margin-top: 6px;
    line-height: 1.4;
}

.lineage-body code {
    background: rgba(15,23,42,0.9);
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 11px;
}

/* collapsed details */
.lineage-details {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed rgba(148,163,184,0.6);
    display: none;
}

.lineage-item.expanded .lineage-details {
    display: block;
}
</style>
</head>

<body>
<header>
    <img src="PulseBand.png" alt="Pulse Logo" />
    <h1>PULSE AI ADMIN — FORENSIC DASHBOARD</h1>
</header>

<div class="container">

    <div class="controls">
        <input type="file" id="firestoreFile" accept="application/json" />
        <input type="file" id="pulseSchemaFile" accept="application/json" />
        <button onclick="runAudit()">Run Full Audit</button>

        <!-- ⭐ NEW: Snapshot dropdown + loader -->
        <select id="aiSnapshotDropdown"
                style="padding:8px 12px;border-radius:8px;background:#0f172a;color:#e5e7eb;border:1px solid #475569;">
            <option value="">Saved Snapshots</option>
        </select>

        <button onclick="loadSavedAiSnapshot()">Load Saved Snapshot</button>
    </div>

    <div id="summaryCards" class="cards"></div>

    <div class="panel">
        <h2>Issues</h2>
        <div id="issueList"></div>
    </div>

    <div class="panel">
        <h2>Variable Lineage & Formulas</h2>
        <div id="lineageList" class="lineage-list"></div>
    </div>

    <div class="panel">
        <h2>Trace</h2>
        <div id="traceBox" class="trace-box"></div>
    </div>

</div>
<!-- Backend Connector Layer -->
<script type="module">
  import { pulseband } from "/proxy/PulseBand.js";
  import { identity } from "./PulseIdentity.js";
  import { getAuth, getHook, getMap, callHelper, attachScanner } from "/lib/Connectors/PageScanner.js";
</script>
<script>
/* -------------------------------------------------------
   State
-------------------------------------------------------- */
let firestoreDoc = null;
let pulseSchema = null;

// in‑memory AI audit snapshots
let aiSnapshots = [];
let lastAiContext = null;

document.getElementById("firestoreFile").addEventListener("change", async (e) => {
    firestoreDoc = JSON.parse(await e.target.files[0].text());
});

document.getElementById("pulseSchemaFile").addEventListener("change", async (e) => {
    pulseSchema = JSON.parse(await e.target.files[0].text());
});

/* -------------------------------------------------------
   Core audit — minimal but honest
   - No hidden magic
   - You can see every step in trace
-------------------------------------------------------- */
function runAudit() {
    if (!firestoreDoc || !pulseSchema) {
        alert("Load both Firestore doc + Pulse schema first.");
        return;
    }

    const context = {
        trace: [],
        diagnostics: {
            mismatches: [],
            missingFields: [],
            slowdownCauses: [],
            driftDetected: false
        },
        lineage: [] // variable lineage entries
    };

    log(context, "Starting audit...");

    // Missing fields (Pulse expects, Firestore lacks)
    for (const key in pulseSchema) {
        if (!(key in firestoreDoc)) {
            context.diagnostics.missingFields.push(key);
            log(context, `Missing field: ${key}`);
        }
    }

    // Mismatches + lineage
    for (const key in firestoreDoc) {
        const rawValue = firestoreDoc[key];
        const rawType = typeof rawValue;
        const schemaDef = pulseSchema[key];

        let expectedType = schemaDef ? schemaDef.type : "unknown";

        if (schemaDef && expectedType !== rawType) {
            context.diagnostics.mismatches.push({
                field: key,
                expected: expectedType,
                actual: rawType
            });
            log(context, `Mismatch: ${key} expected ${expectedType}, got ${rawType}`);
        }

        // Build lineage entry (raw variable)
        context.lineage.push({
            name: key,
            rawValue,
            rawType,
            expectedType,
            isDerived: false,
            parent: null,
            formula: null,
            explanation: "Top-level field from Firestore document."
        });
    }

    // Simple slowdown heuristic
    if (Object.keys(firestoreDoc).length > 50) {
        context.diagnostics.slowdownCauses.push("Large Firestore document (more than 50 fields).");
        log(context, "Slowdown: Large Firestore document.");
    }

    // Infer derived variables (e.g., latencyType from latency)
    inferDerivedVariables(context);

    log(context, "Audit complete.");

    // save + remember last context
    saveAiSnapshot(context);
    lastAiContext = context;

    renderDashboard(context);
}

function log(context, msg) {
    context.trace.push(msg);
}

/* -------------------------------------------------------
   Derived variable inference
-------------------------------------------------------- */
function inferDerivedVariables(context) {
    const names = context.lineage.map(l => l.name);
    const nameSet = new Set(names);

    names.forEach(name => {
        if (name.endsWith("Type")) {
            const base = name.slice(0, -4); // remove "Type"
            if (nameSet.has(base)) {
                const derivedRaw = firestoreDoc[name];
                const derivedType = typeof derivedRaw;

                const formula = `${name} = f(${base})`;
                const explanation =
                    `Derived variable "${name}" is inferred from base "${base}". ` +
                    `This dashboard does NOT pretend to know the exact formula; ` +
                    `it only guarantees that "${name}" depends on "${base}" so you can verify the math.`;

                context.lineage.push({
                    name,
                    rawValue: derivedRaw,
                    rawType: derivedType,
                    expectedType: pulseSchema[name]?.type || "unknown",
                    isDerived: true,
                    parent: base,
                    formula,
                    explanation
                });

                log(context, `Derived variable detected: ${name} depends on ${base}`);
            }
        }

        if (name.endsWith("Percent")) {
            const base = name.slice(0, -7); // remove "Percent"
            const numeratorName = base + "Actual";
            const denominatorName = base + "Total";

            if (nameSet.has(numeratorName) && nameSet.has(denominatorName)) {
                const percentRaw = firestoreDoc[name];

                const formula = `${name} = (${numeratorName} / ${denominatorName}) * 100`;
                const explanation =
                    `Percentage "${name}" is derived from "${numeratorName}" and "${denominatorName}". ` +
                    `This lets you verify the numerator, denominator, and final percentage.`;

                context.lineage.push({
                    name,
                    rawValue: percentRaw,
                    rawType: typeof percentRaw,
                    expectedType: pulseSchema[name]?.type || "unknown",
                    isDerived: true,
                    parent: `${numeratorName}, ${denominatorName}`,
                    formula,
                    explanation
                });

                log(context, `Derived percentage detected: ${name} depends on ${numeratorName}, ${denominatorName}`);
            }
        }
    });
}

/* -------------------------------------------------------
   Snapshot system (AI dashboard)
-------------------------------------------------------- */
function saveAiSnapshot(context) {
    const timestamp = new Date().toISOString();
    const label = `Audit @ ${timestamp}`;

    aiSnapshots.push({
        id: timestamp,
        label,
        context: structuredCloneSafe(context)
    });

    refreshAiSnapshotDropdown();
}

function refreshAiSnapshotDropdown() {
    const dropdown = document.getElementById("aiSnapshotDropdown");
    if (!dropdown) return; // safe if HTML not wired yet

    dropdown.innerHTML = `<option value="">Saved Snapshots</option>`;

    aiSnapshots.forEach(snap => {
        const opt = document.createElement("option");
        opt.value = snap.id;
        opt.textContent = snap.label;
        dropdown.appendChild(opt);
    });
}

function loadSavedAiSnapshot() {
    const dropdown = document.getElementById("aiSnapshotDropdown");
    if (!dropdown) {
        alert("No snapshot dropdown found in DOM.");
        return;
    }

    const id = dropdown.value;
    if (!id) {
        alert("Select a saved snapshot first.");
        return;
    }

    const snap = aiSnapshots.find(s => s.id === id);
    if (!snap) {
        alert("Snapshot not found.");
        return;
    }

    lastAiContext = structuredCloneSafe(snap.context);
    renderDashboard(lastAiContext);
}

/* -------------------------------------------------------
   Tilde hotkey — reload last audit
-------------------------------------------------------- */
document.addEventListener("keydown", (e) => {
    if (e.key === "`") {
        if (!lastAiContext) return;
        renderDashboard(lastAiContext);
    }
});

/* -------------------------------------------------------
   Safe clone helper
-------------------------------------------------------- */
function structuredCloneSafe(obj) {
    try {
        return structuredClone(obj);
    } catch {
        return JSON.parse(JSON.stringify(obj));
    }
}

/* -------------------------------------------------------
   Rendering
-------------------------------------------------------- */
function renderDashboard(context) {
    renderSummaryCards(context);
    renderIssues(context);
    renderTrace(context);
    renderLineage(context);
}

function renderSummaryCards(context) {
    const root = document.getElementById("summaryCards");
    root.innerHTML = "";

    const { mismatches, missingFields, slowdownCauses, driftDetected } = context.diagnostics;

    const cards = [
        {
            title: "Overall Health",
            severity: mismatches.length || missingFields.length || driftDetected ? "warning" : "ok",
            description: driftDetected
                ? "Schema drift detected."
                : mismatches.length || missingFields.length
                ? "Some data issues detected."
                : "No major issues detected."
        },
        {
            title: "Mismatches",
            severity: mismatches.length ? "error" : "ok",
            description: `${mismatches.length} field mismatches`
        },
        {
            title: "Missing Fields",
            severity: missingFields.length ? "warning" : "ok",
            description: `${missingFields.length} missing fields`
        },
        {
            title: "Performance",
            severity: slowdownCauses.length ? "warning" : "ok",
            description: slowdownCauses.length
                ? slowdownCauses.join(", ")
                : "No slowdown patterns detected"
        }
    ];

    cards.forEach(c => {
        const div = document.createElement("div");
        div.className = `card ${c.severity}`;
        div.innerHTML = `
            <h3>${c.title}</h3>
            <p>${c.description}</p>
        `;
        root.appendChild(div);
    });
}

function renderIssues(context) {
    const root = document.getElementById("issueList");
    root.innerHTML = "";

    const { mismatches, missingFields, slowdownCauses, driftDetected } = context.diagnostics;

    mismatches.forEach(m => {
        root.innerHTML += `
            <div class="issue error">
                <span class="type">MISMATCH</span>
                Field "<strong>${m.field}</strong>" expected <code>${m.expected}</code>, got <code>${m.actual}</code>
            </div>
        `;
    });

    missingFields.forEach(f => {
        root.innerHTML += `
            <div class="issue warning">
                <span class="type">MISSING</span>
                Field "<strong>${f}</strong>" is missing from Firestore but exists in Pulse schema
            </div>
        `;
    });

    slowdownCauses.forEach(s => {
        root.innerHTML += `
            <div class="issue warning">
                <span class="type">SLOWDOWN</span>
                ${s}
            </div>
        `;
    });

    if (driftDetected) {
        root.innerHTML += `
            <div class="issue error">
                <span class="type">DRIFT</span>
                Schema drift detected between Pulse and data source
            </div>
        `;
    }

    if (!root.innerHTML.trim()) {
        root.innerHTML = `<p style="font-size:13px;color:#9ca3af;">No issues detected.</p>`;
    }
}

function renderTrace(context) {
    document.getElementById("traceBox").textContent =
        context.trace.join("\n");
}

/* -------------------------------------------------------
   Variable Lineage Renderer
-------------------------------------------------------- */
function renderLineage(context) {
    const root = document.getElementById("lineageList");
    root.innerHTML = "";

    if (!context.lineage.length) {
        root.innerHTML = `<p style="font-size:13px;color:#9ca3af;">No variables detected.</p>`;
        return;
    }

    const sorted = [...context.lineage].sort((a, b) => {
        if (a.isDerived === b.isDerived) {
            return a.name.localeCompare(b.name);
        }
        return a.isDerived ? 1 : -1;
    });

    sorted.forEach(entry => {
        const div = document.createElement("div");
        div.className = "lineage-item";
        div.innerHTML = `
            <div class="lineage-header">
                <div class="lineage-name">${entry.name}</div>
                <div class="lineage-badge">
                    ${entry.isDerived ? "Derived" : "Raw"} • ${entry.rawType}
                </div>
            </div>
            <div class="lineage-body">
                <div><strong>Raw value:</strong> <code>${formatValue(entry.rawValue)}</code></div>
                <div><strong>Expected type:</strong> <code>${entry.expectedType}</code></div>
                ${entry.parent ? `<div><strong>Parent:</strong> <code>${entry.parent}</code></div>` : ""}
                ${entry.formula ? `<div><strong>Formula:</strong> <code>${entry.formula}</code></div>` : ""}
            </div>
            <div class="lineage-details">
                <div><strong>Explanation:</strong> ${entry.explanation}</div>
                ${
                    entry.isDerived && entry.parent
                        ? `<div style="margin-top:4px;font-size:12px;color:#cbd5f5;">
                            Use this to verify the math: inspect <code>${entry.parent}</code> in the Firestore doc and confirm this derived value is not hardcoded.
                           </div>`
                        : ""
                }
            </div>
        `;

        div.addEventListener("click", () => {
            div.classList.toggle("expanded");
        });

        root.appendChild(div);
    });
}

function formatValue(v) {
    if (v === null) return "null";
    if (v === undefined) return "undefined";
    if (typeof v === "object") {
        try {
            const s = JSON.stringify(v);
            return s.length > 80 ? s.slice(0, 77) + "..." : s;
        } catch {
            return "[object]";
        }
    }
    return String(v);
}
</script>

</body>
</html>
