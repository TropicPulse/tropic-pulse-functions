</div>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    body {
      margin: 0;
      padding: 0;
      background: #000;
      background-image: url('https://tropicpulse.bz/Mysterious.png?v4');
      background-size: cover;
      background-position: center;

    }
    
    body::before {
      content: "";
      position: fixed;
      inset: 0;

      z-index: -1;
    }

  <script>
    window.onerror = function (msg, src, line, col, err) {
    const div = document.createElement("div");
    div.style.position = "fixed";
    div.style.bottom = "0";
    div.style.left = "0";
    div.style.right = "0";
    div.style.background = "rgba(255,0,0,0.85)";
    div.style.color = "white";
    div.style.padding = "10px";
    div.style.fontSize = "14px";
    div.style.zIndex = "999999";
    div.style.whiteSpace = "pre-wrap";
    div.textContent = `🔥 JS ERROR:\n${msg}\n${src}:${line}:${col}`;
    document.body.appendChild(div);
  };
  (function () {
  const logBox = document.createElement("div");
  logBox.style.position = "fixed";
  logBox.style.top = "0";
  logBox.style.left = "0";
  logBox.style.right = "0";
  logBox.style.maxHeight = "40vh";
  logBox.style.overflowY = "auto";
  logBox.style.background = "rgba(0,0,0,0.75)";
  logBox.style.color = "lime";
  logBox.style.fontSize = "12px";
  logBox.style.padding = "6px";
  logBox.style.zIndex = "999999";
  logBox.style.whiteSpace = "pre-wrap";
  document.body.appendChild(logBox);

  const oldLog = console.log;
  console.log = function (...args) {
    oldLog.apply(console, args);
    logBox.textContent += args.join(" ") + "\n";
  };
})();
console.log("🌞 Script loaded, attaching visibility listener…");
    const params = new URLSearchParams(window.location.search);
    const token = localStorage.getItem("tp_token_v3");
    const returnTo = params.get("returnTo");
    let identity = null;
    try {
      identity = JSON.parse(localStorage.getItem("tp_identity_v3") || "{}");
    } catch {
      identity = null;
    }

    if (!token || !identity.uid) {
      localStorage.removeItem("tp_token_v3");
      localStorage.removeItem("tp_identity_v3");
      localStorage.removeItem("tp_device_token_v3");
      window.location.replace("https://tropicpulse.bz/CheckEmail.html");
    } else {
      localStorage.setItem("tp_device_token_v3", "1");

      setTimeout(() => {
        if (returnTo) {
          window.location.replace(returnTo);
        } else {
          window.location.replace("https://tropicpulse.bz/loading.html?dest=appDashboard");
        }
    })}
  </script>
