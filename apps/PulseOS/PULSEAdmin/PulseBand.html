<script type="module">
 
  let lastHeapUsed = null;
let lastHeapTime = null;
let currentPPS = 0;
let baselinePPS = null;

const power = navigator.deviceMemory || "Unknown";
const cores = navigator.hardwareConcurrency || "Unknown";

  

async function generatePulsebandActivity(s) {
  const start = performance.now();

  const active = window.__pulseCurrentActivity;
  const targetUrl = active
  ? `/TPProxy?url=${encodeURIComponent(active.url)}`
  : `/TPProxy?url=${encodeURIComponent("https://jsonplaceholder.typicode.com/photos")}`;

  try {
    const { data, meta } = await PulseClient.get(targetUrl);

    const duration = performance.now() - start;
    const bytes = meta.bytes || 1;

    // Update real activity
    if (active) {
      active.bytes = bytes;
      active.durationMs = duration;
      active.speedKbps = (bytes / 1024) / (duration / 1000);
      active.ts = nowMs();
    }

    // Phone baseline
    const phoneKbps = 800;
    const estimatedPhoneMs = (bytes / phoneKbps) * 1000;

    // Pulse metrics
    const pulseMs = duration;
    const timeSaved = estimatedPhoneMs - pulseMs;
    const advantage = pulseMs > 0 ? estimatedPhoneMs / pulseMs : 1;
    const efficiency = advantage * 100;

    // NEW: Pulse Capacity
    const capacity = await getPulseCapacity();

    // NEW: Micro-window stall
    const microWindowActive = !detectMicroWindowStall(s);

    // NEW: Throughput health
    const throughputHealth = detectThroughputHealth(bytes, duration);

    // WRITE TO LIVE + SNAPSHOT (v3)
    pulseband.setStatus({
      live: {
        latency: pulseMs,
        networkHealth: throughputHealth,
        route: meta.route,
        state: "active",
        microWindowActive,
        pulsebandBars: s.live?.pulsebandBars ?? 0,
        phoneBars: s.live?.phoneBars ?? 0,
        lastSyncTimestamp: nowMs()
      },

      snapshot: {
        lastChunkKbps: active?.speedKbps ?? 0,
        lastChunkDurationMs: duration,
        lastChunkSizeKB: bytes / 1024,
        pulseSeconds: pulseMs / 1000,
        capacity,
        efficiency,
        advantage,
        timeSaved,
        lastUpdateTimestamp: nowMs()
      },

      // Legacy fields (still used by some UI)
      lastPageBytes: bytes,
      lastPageDuration: pulseMs,
      avgPulseMs: s.avgPulseMs
        ? (s.avgPulseMs * 0.7 + pulseMs * 0.3)
        : pulseMs,
      avgPhoneMs: s.avgPhoneMs
        ? (s.avgPhoneMs * 0.7 + estimatedPhoneMs * 0.3)
        : estimatedPhoneMs,

      estimatedPhoneMs,
      pulseMs,
      timeSaved,
      advantage,
      efficiency,
      capacity,
      microWindowActive,
      throughputHealth,

      currentActivity: active || null,
      lastError: null,
      lastUpdatedTs: nowMs()
    });

  } catch (err) {
    pulseband.setStatus({
      lastError: String(err),
      live: { state: "error", route: "error" },
      lastUpdatedTs: nowMs()
    });
  }
}

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return "0.00";
  return Number(n).toFixed(2);
}

function getPulsebandCase(s) {
  // ❌ Hard failure
  if (s.lastError)
    return "❌ Error — proxy unreachable";

  // 🔥 Critical conditions
  if (s.capacity !== undefined && s.capacity < 20)
    return "🔥 Critical — device heavily throttled";

  if (s.microWindowActive === false)
    return "🧊 Stalled — Pulse micro-window frozen";

  if (s.advantage < 0)
    return "🔻 Phone faster — Pulse disadvantage";

  if (s.avgPulseMs >= 600)
    return "🔥 Critical — severe congestion";

  // ⚠️ Warning conditions
  if (s.capacity !== undefined && s.capacity < 40)
    return "⚠️ Low Capacity — reduced performance";

  if (s.lastChunkKbps < 50)
    return "🐌 Slow chunks — weak throughput";

  if (s.avgPulseMs >= 300)
    return "⚠️ Slow — possible congestion";

  if (s.batterySaver)
    return "🔋 Battery Saver — reduced performance";

  if (s.efficiencyMode === "low")
    return "🌙 Low-power mode — throttled";

  // 🙂 Good conditions
  if (s.avgPulseMs < 150)
    return "🙂 Good — stable performance";

  // 🚀 Excellent conditions
  if (s.avgPulseMs < 50 && s.lastPageBytes > 5000)
    return "🚀 Excellent — blazing fast route";

  // Default fallback
  return "😐 Moderate — some latency";
}

function detectBrowserVersion(ua) {
  ua = ua || "";

  // Chrome (desktop + Android)
  let m = ua.match(/Chrome\/([\d\.]+)/);
  if (m && !ua.includes("Edg") && !ua.includes("OPR") && !ua.includes("Brave")) {
    return { name: "Chrome", version: m[1] };
  }

  // Edge
  m = ua.match(/Edg\/([\d\.]+)/);
  if (m) return { name: "Edge", version: m[1] };

  // Chrome iOS
  m = ua.match(/CriOS\/([\d\.]+)/);
  if (m) return { name: "Chrome iOS", version: m[1] };

  // Safari (iOS + macOS)
  m = ua.match(/Version\/([\d\.]+).*Safari/);
  if (m) return { name: "Safari", version: m[1] };

  // Firefox
  m = ua.match(/Firefox\/([\d\.]+)/);
  if (m) return { name: "Firefox", version: m[1] };

  // Samsung Internet
  m = ua.match(/SamsungBrowser\/([\d\.]+)/);
  if (m) return { name: "Samsung Internet", version: m[1] };

  // Opera
  m = ua.match(/OPR\/([\d\.]+)/);
  if (m) return { name: "Opera", version: m[1] };

  // Brave
  m = ua.match(/Brave\/([\d\.]+)/);
  if (m) return { name: "Brave", version: m[1] };

  // Vivaldi
  m = ua.match(/Vivaldi\/([\d\.]+)/);
  if (m) return { name: "Vivaldi", version: m[1] };

  // DuckDuckGo
  m = ua.match(/DuckDuckGo\/([\d\.]+)/);
  if (m) return { name: "DuckDuckGo", version: m[1] };

  // UC Browser
  m = ua.match(/UCBrowser\/([\d\.]+)/);
  if (m) return { name: "UC Browser", version: m[1] };

  // Yandex
  m = ua.match(/YaBrowser\/([\d\.]+)/);
  if (m) return { name: "Yandex Browser", version: m[1] };

  // Android WebView
  if (ua.includes("; wv")) {
    m = ua.match(/Version\/([\d\.]+)/);
    return { name: "Android WebView", version: m ? m[1] : "raw: " + ua };
  }

  // Node.js
  m = ua.match(/node\/([\d\.]+)/i);
  if (m) return { name: "Node.js", version: m[1] };

  // curl
  m = ua.match(/curl\/([\d\.]+)/i);
  if (m) return { name: "curl", version: m[1] };

  // Python requests
  m = ua.match(/python-requests\/([\d\.]+)/i);
  if (m) return { name: "Python Requests", version: m[1] };

  // Go-http-client
  m = ua.match(/Go-http-client\/([\d\.]+)/i);
  if (m) return { name: "Go HTTP Client", version: m[1] };

  // Java
  m = ua.match(/Java\/([\d\.]+)/i);
  if (m) return { name: "Java", version: m[1] };

  // Fallback — NEVER "Unknown"
  return { name: "raw", version: ua };
}

function getBrowserVersion(ua) {
  const b = detectBrowserVersion(ua);
  return `${b.name} ${b.version}`.trim();
}

function renderPulseBars(sys) {
  const pulseKbps = sys.appKbps;
  const phoneKbps = sys.phoneKbps;

  // If missing → show raw truth
  if (pulseKbps == null || phoneKbps == null) {
    return `
      <div class="pb-card">
        <h4>PulseBand</h4>
        <div>Pulse metrics unavailable</div>
        <div class="pb-row"><label>Raw</label><span>${JSON.stringify(sys)}</span></div>
      </div>
    `;
  }

  // PulseBand bars = relative performance vs phone
  const ratio = phoneKbps > 0 ? pulseKbps / phoneKbps : 0;
  const pct = Math.max(0, Math.min(100, Math.round(ratio * 100)));

  const color =
    pct > 70 ? "pb-good" :
    pct > 40 ? "pb-warn" :
               "pb-bad";

  return `
    <div class="pb-card">
      <h4>PulseBand Speed</h4>
      <div>${pulseKbps.toFixed(0)} kbps (${pct}% of phone)</div>
      <div class="pb-bar"><div class="pb-bar-fill ${color}" style="width:${pct}%;"></div></div>
    </div>
  `;
}

function renderPhoneBars(sys) {
  const phoneKbps = sys.phoneKbps;

  if (phoneKbps == null) {
    return `
      <div class="pb-card">
        <h4>Phone Baseline</h4>
        <div>Phone metrics unavailable</div>

/* ---------------------------------------------------------
   OS Version Detection (truth-first, safer)
--------------------------------------------------------- */
function detectOSVersion(ua) {
  ua = ua || "";

  // Android
  const android = ua.match(/Android\s([\d\.]+)/i);
  if (android) return `Android ${android[1]}`;

  // iOS / iPadOS
  const ios = ua.match(/OS\s([\d_]+)/i);
  if (ios && /iPhone|iPad|iPod/i.test(ua)) {
    return `iOS ${ios[1].replace(/_/g, ".")}`;
  }

  // Windows
  const win = ua.match(/Windows NT\s([\d\.]+)/i);
  if (win) return `Windows NT ${win[1]}`;

  // macOS
  const mac = ua.match(/Mac OS X\s([\d_]+)/i);
  if (mac) return `macOS ${mac[1].replace(/_/g, ".")}`;

  // ChromeOS
  const cros = ua.match(/CrOS\s[a-zA-Z0-9_]+\s([\d\.]+)/i);
  if (cros) return `ChromeOS ${cros[1]}`;

  // Linux
  if (/Linux/.test(ua)) return "Linux";

  // Last resort — never "Unknown"
  return `UA: ${ua}`;
}

/* ---------------------------------------------------------
   Device Model Detection (Android + iPhone full)
--------------------------------------------------------- */
function detectDeviceModel(ua) {
  ua = ua || "";
  const U = ua.toUpperCase();

  // iPhone
  if (U.includes("IPHONE")) {
    const model = ua.match(/iPhone\s([0-9A-Za-z]+)/i);
    if (model) return `iPhone ${model[1]}`;
    return "iPhone";
  }

  // iPad
  if (U.includes("IPAD")) {
    const model = ua.match(/iPad\s([0-9A-Za-z]+)/i);
    if (model) return `iPad ${model[1]}`;
    return "iPad";
  }

  // Google Pixel
  const pixel = ua.match(/Pixel\s([0-9A-Za-z]+)/);
  if (pixel) return `Google Pixel ${pixel[1]}`;
  if (U.includes("PIXEL")) return "Google Pixel";

  // Samsung S-series (S28 → S24)
  const match = patterns => patterns.some(p => U.includes(p));
  const S_SERIES = [28, 27, 26, 25, 24];
  for (const n of S_SERIES) {
    if (match([`S${n} ULTRA`, `S${n}U`])) return `Galaxy S${n} Ultra`;
    if (match([`S${n}+`, `S${n} PLUS`])) return `Galaxy S${n}+`;
    if (match([`S${n} `])) return `Galaxy S${n}`;
  }

  // Samsung A-series (A28 → A24)
  const A_SERIES = [28, 27, 26, 25, 24];
  for (const n of A_SERIES) {
    if (match([`A${n}`])) return `Galaxy A${n}`;
  }

  // Samsung SM-XXXX codes
  const sm = ua.match(/SM-([A-Z0-9]+)/i);
  if (sm) return `Samsung ${sm[1]}`;

  // Generic Android model (Build/)
  const androidModel = ua.match(/Android.*?;\s([^;]+)\sBuild/i);
  if (androidModel) return androidModel[1].trim();

  // Desktop OS
  if (/WINDOWS NT/i.test(U)) return "Windows PC";
  if (/MACINTOSH/i.test(U)) return "Mac";
  if (/CROS/i.test(U)) return "Chromebook";
  if (/LINUX/i.test(U)) return "Linux Device";

  // Final fallback — never "Unknown"
  return `UA: ${ua}`;
}

/* ---------------------------------------------------------
   Pulse Baseline / Capacity (non-blocking, safe)
--------------------------------------------------------- */

async function detectPulseBaseline() {
  return new Promise(resolve => {
    let count = 0;
    const start = performance.now();

    function tick() {
      count++;
      if (performance.now() - start >= 1000) {
        resolve(count);
      } else {
        // yield to the event loop
        queueMicrotask(tick);
      }
    }

    tick();
  });
}

async function getPulseCapacity() {
  if (!baselinePPS) baselinePPS = await detectPulseBaseline();
  if (!baselinePPS || baselinePPS <= 0) return 100;

  const ratio = currentPPS / baselinePPS;
  return Math.max(0, Math.min(100, Math.round(ratio * 100)));
}

/* ---------------------------------------------------------
   Throughput Health (defensive, clear)
--------------------------------------------------------- */
function detectThroughputHealth(bytes, durationMs) {
  if (!bytes || !durationMs || durationMs <= 0) return "unknown";

  const kbps = (bytes / 1024) / (durationMs / 1000);

  if (kbps > 2000) return "excellent";
  if (kbps > 800) return "good";
  if (kbps > 200) return "weak";
  return "poor";
}

/* ---------------------------------------------------------
   Micro Window Stall Detection (defensive)
--------------------------------------------------------- */
function detectMicroWindowStall(s) {
  if (!s) return false;

  const now = performance.now();
  const last = typeof s.lastUpdatedTs === "number" ? s.lastUpdatedTs : 0;
  const delta = now - last;

  return delta > 5000; // 5 seconds without update = stall
}

function getDeviceModel(ua) {
  return detectDeviceModel(ua);
}


function getOSVersion(ua) {
  return detectOSVersion(ua);
}

/* ---------------------------------------------------------
   Network Info (WiFi / 4G / 5G / etc.) — Smart Detector
--------------------------------------------------------- */
function detectNetworkInfo(proxyhealth = {},s) {
  const c = navigator.connection || navigator.webkitConnection || navigator.mozConnection;

  // Browser-provided values
  const browserType = c?.effectiveType || null;
  const browserDownlink = c?.downlink || null;
  const browserRtt = c?.rtt || null;

  // Device clues
  const ua = navigator.userAgent.toLowerCase();
  const isMobile =
    /iphone|ipad|android|mobile|opera mini|iemobile|wpdesktop/.test(ua);

  // Physics clues (PulseBand)
  const latency = s.latency ?? browserRtt ?? null;
  const kbps = s.kbps ?? browserDownlink * 1000 ?? null;

  // -----------------------------------------------------
  // 1. Determine network TYPE (WiFi/5G/etc.)
  // -----------------------------------------------------
  let type = "WiFi";
  let downlink = 0;
  let rtt = 0;

  if (browserType && browserType !== "unknown") {
    type = browserType.toUpperCase();
    downlink = browserDownlink || 0;
    rtt = browserRtt || latency || 0;
  } else if (latency !== null && kbps !== null) {
    if (latency < 60 && kbps > 20000) type = "WiFi";
    else if (latency < 80 && kbps > 10000) type = "5G";
    else if (latency < 120 && kbps > 3000) type = "4G";
    else if (latency < 200) type = "3G";
    else type = "2G";

    downlink = kbps / 1000;
    rtt = latency;
  } else if (isMobile) {
    type = "Mobile";
  }

  // -----------------------------------------------------
  // 2. Build TRANSPORT from proxy health
  // -----------------------------------------------------
  const protocol = proxyhealth.protocol ?? "—";
  const tls = proxyhealth.tlsProtocol ?? "TLS Offloaded Upstream";
  const http = proxyhealth.httpVersion ?? "—";
  const source = proxyhealth.tlsSource ?? "cloudflare";

  const transport = `protocol: ${protocol} | tls: ${tls} | http: ${http} | source: ${source}`;

  // -----------------------------------------------------
  // 3. Return unified network object
  // -----------------------------------------------------
  return {
    type,
    downlink,
    rtt,
    transport,     // <-- NOW INCLUDED
    tls,
    rawTransport: { protocol, tls, http, source } // optional for debugging
  };
}

function getNetworkInfo(proxyhealth,s) {
  return detectNetworkInfo(proxyhealth,s);
}

   Memory Info
--------------------------------------------------------- */
function detectMemoryInfo() {
  if (!performance.memory) return null;
  return {
    used: performance.memory.usedJSHeapSize,
    total: performance.memory.totalJSHeapSize,
    limit: performance.memory.jsHeapSizeLimit
  };
}

  return detectMemoryInfo();

function detectMemoryHealth(mem, saturation, growth, ram) {
  if (!mem) return 100;

  let score = 100;

  // High saturation
  if (saturation > 80) score -= 30;
  if (saturation > 90) score -= 50;

  // Rapid growth (leak)
  if (growth > 500000) score -= 20; // 0.5MB/sec
  if (growth > 2000000) score -= 40; // 2MB/sec

  // Low RAM devices
  if (ram && ram <= 4) score -= 10;

  return Math.max(0, score);
}
function getMemoryHealth() {
  const mem = getMemoryInfo();
  const sat = getHeapSaturation();
  const growth = getHeapGrowthRate();
  const ram = getDeviceMemory();

  return detectMemoryHealth(mem, sat, growth, ram);
}


function detectHeapGrowth(mem) {
  if (!mem) return null;

  const now = performance.now();

  if (lastHeapUsed === null) {
    lastHeapUsed = mem.used;
    lastHeapTime = now;
    return 0;
  }

  const deltaBytes = mem.used - lastHeapUsed;
  const deltaTime = (now - lastHeapTime) / 1000; // seconds

  lastHeapUsed = mem.used;
  lastHeapTime = now;

  return deltaBytes / deltaTime; // bytes per second
}
function getHeapGrowthRate() {
  const mem = getMemoryInfo();
  return detectHeapGrowth(mem);
}
function detectDeviceMemory() {
  return navigator.deviceMemory || null; // 2, 4, 8, 16 (GB)
}
function getDeviceMemory() {
  return detectDeviceMemory();
}
function detectHeapSaturation(mem) {
  if (!mem) return null;
  return Math.round((mem.used / mem.limit) * 100);
}
function getHeapSaturation() {
  const mem = getMemoryInfo();
  return detectHeapSaturation(mem);
}
function getMemoryWarning() {
  const health = getMemoryHealth();

  if (health >= 80) return "Healthy";
  if (health >= 60) return "Moderate Pressure";
  if (health >= 40) return "High Pressure";
  return "Critical — Possible Slowdowns";
}

   Returns: "tcp", "quic", "udp", "tls", "unknown"
--------------------------------------------------------- */

async function detectProtocol() {
  try {
    const res = await fetch("/PULSE-PROXY/health");
    const json = await res.json();
    window.__proxyHealth = json;   // <-- THIS IS THE FIX
    return json;
  } catch (e) {
    // keep last known good value
    window.__proxyHealth = window.__proxyHealth || null;
    return window.__proxyHealth;
  }
}

function formatObjectReadable(obj) {
  if (!obj || typeof obj !== "object") return String(obj);

  try {
    return Object.entries(obj)
      .map(([k, v]) => `${k}: ${v === null || v === undefined ? "—" : v}`)
      .join(" | ");
  } catch {
    return JSON.stringify(obj);
  }
}


async function getProtocol() {
  const h = await detectProtocol();
  const protocol = h.protocol ?? "—";
  const tls = h.tlsProtocol ?? "TLS Offloaded Upstream";
  const http = h.httpVersion ?? "—";
  const source = h.tlsProtocol ? "node" : "cloudflare";

  // Build the readable string from the extracted fields
  const baseText = `protocol: ${protocol} | tls: ${tls} | http: ${http} | source: ${source}`;

  // If the raw object contains MORE fields than expected, append them
  const knownKeys = ["protocol", "tlsProtocol", "httpVersion"];
  const extraKeys = Object.keys(h).filter(k => !knownKeys.includes(k));

  let extraText = "";
  if (extraKeys.length > 0) {
    const extraObj = {};
    for (const k of extraKeys) extraObj[k] = h[k];
    extraText = " | extra: " + formatObjectReadable(extraObj);
  }

  return {
    raw: h,
    protocol,
    tls,
    http,
    source,
    text: baseText + extraText
  };
}


function detectThrottling(callback) {
  let last = performance.now();
  let lastState = "Normal";
  let lastLag = 0;

  setInterval(() => {
    const now = performance.now();
    const lag = now - last - 100;
    last = now;

    const state = lag > 200 ? "Throttled" : "Normal";

    // Detect BIG change (your request)
    const bigChange = Math.abs(lag - lastLag) > 150; // threshold for "BIG"
    lastLag = lag;

    if (state !== lastState || bigChange) {
      log(
        `%c[PulseBand] Throttle event → ${state} (lag=${lag.toFixed(1)}ms, big=${bigChange})`,
        state === "Throttled"
          ? "color:red;font-weight:bold;"
          : "color:green;font-weight:bold;"
      );

      // Optional: send to backend logs
      if (pulseband?.logEvent) {
        pulseband.logEvent("throttle_event", {
          state,
          lag: Math.round(lag),
          bigChange
        });
      }

      lastState = state;
    }

    callback(state);
  }, 100);
}
/* ---------------------------------------------------------
   SYSTEM INFO — RUNTIME-GRADE, TRUTH-FIRST
--------------------------------------------------------- */
async function getSystemInfo(s) {
  const ua = navigator.userAgent || "";
  const platform = navigator.platform || "";
  const language = navigator.language || "";

  // Browser / OS / Device — NEVER UNKNOWN
  const browser = getBrowserVersion(ua) || `raw: ${ua}`;
  const osVersion = getOSVersion(ua) || `raw: ${ua}`;
  const deviceModel = getDeviceModel(ua) || `raw: ${ua}`;

  // Runtime identity
  const runtime = detectRuntime(ua);

  // Protocol — truth only
  let protocol = null;
  try {
    protocol = await getProtocol(); // now returns full object
  } catch (e) {
    protocol = { error: `protocol detection failed: ${e}` };
  }

  // Battery — truth only
  let battery = null;
  try {
    battery = await getBatteryInfo();
  } catch (e) {
    battery = { error: `battery API failed: ${e}` };
  }

  // Network — truth only
  const net = getNetworkInfo(protocol, s) || { error: "network API unavailable" };

  // Memory — truth only
  const memory = getMemoryInfo() || { error: "memory API unavailable" };

  // CPU cores — truth only
  const cores = navigator.hardwareConcurrency ?? null;

  return {
    ua,
    platform,
    language,

    /* ---------------- VERSION FINGERPRINT ---------------- */
    appVersion: window.__APP_VERSION__ ?? null,
    webVersion: window.__WEB_VERSION__ ?? null,
    pulsebandVersion: pulseband?.version ?? null,
    proxyVersion: window.__proxyHealth?.version ?? null,
    browserVersion: browser,
    osVersion,

    /* ---------------- RUNTIME ---------------- */
    runtimeType: runtime.type,
    runtimeVersion: runtime.version,
    runtimeDetails: runtime.details,

    /* ---------------- DEVICE ---------------- */
    deviceModel,
    browser,

    /* ---------------- PROTOCOL ---------------- */
    protocol, // now full object

    /* ---------------- NETWORK ---------------- */
    networkType: net.type ?? null,
    downlink: net.downlink ?? null,
    rtt: net.rtt ?? null,
    networkRaw: net,

    /* ---------------- BATTERY ---------------- */
    batteryLevel: battery?.level ?? null,
    batteryCharging: battery?.charging ?? null,
    batterySaver: battery?.saver ?? null,
    batteryRaw: battery,

    /* ---------------- MEMORY ---------------- */
    memoryUsed: memory?.used ?? null,
    memoryTotal: memory?.total ?? null,
    memoryLimit: memory?.limit ?? null,
    memoryRaw: memory,

    /* ---------------- CPU ---------------- */
    cpuCores: cores
  };
}
/* ---------------------------------------------------------
   RUNTIME DETECTOR — Browser / WebView / PWA / Server
--------------------------------------------------------- */
function detectRuntime(ua) {
  ua = ua || "";

  // Split UA into:
  // TYPE = before first "("
  // VERSION = everything after
  const [first, restRaw] = ua.split("(");
  const typeSegment = first.trim(); // "Mozilla/5.0"
  const versionSegment = restRaw ? "(" + restRaw.trim() : ""; // "(Linux; ...)"

  // Server fingerprints
  if (typeof window === "undefined") {
    if (/node/i.test(ua)) return { type: typeSegment, version: versionSegment, details: "Node.JS" };
    if (/curl/i.test(ua)) return { type: typeSegment, version: versionSegment, details: "CURL" };
    if (/python/i.test(ua)) return { type: typeSegment, version: versionSegment, details: "Python" };
    return { type: typeSegment, version: versionSegment, details: "Generic Server" };
  }

  // WebView fingerprints
  if (ua.includes("; wv"))
    return { type: typeSegment, version: versionSegment, details: "Android WebView" };

  if (/FBAN|FBAV|Instagram|Line|TikTok/i.test(ua))
    return { type: typeSegment, version: versionSegment, details: "App-Embedded WebView" };

  // PWA detection
  if (window.matchMedia("(display-mode: standalone)").matches)
    return { type: typeSegment, version: versionSegment, details: "Installed PWA" };

  // Browser (default)
  return { type: typeSegment, version: versionSegment, details: "Standard Browser Runtime" };
}

function analyzePulseEnvironment(proxy = {}, net = {}, pulse = {}) {
  const reasons = [];

  // Normalize inputs so nothing is undefined
  const netType = (net.type || "").toLowerCase();
  const down = Number(net.downlink) || 0;
  const rtt = Number(net.rtt) || 0;

  const avgPulse = Number(pulse.avgPulseMs) || 0;
  const capacity = Number(pulse.capacity) || 0;
  const chunkKbps = Number(pulse.lastChunkKbps) || 0;
  const lastBytes = Number(pulse.lastPageBytes) || 0;
  const proxyLatency = Number(proxy.latency) || 0;

  const advantage = Number(pulse.advantage);
  const microWindow = pulse.microWindowActive;
  const redisStatus = proxy.redis || "ok";

  // -----------------------------------------------------
  // ⭐ NETWORK WEAKNESS
  // -----------------------------------------------------
  if (netType.includes("2g") || down < 1)
    reasons.push("📶 Weak network connection");

  if (rtt > 250)
    reasons.push("📡 High network latency");

  if (rtt > 80 && down < 2)
    reasons.push("🌪 Network jitter or instability");

  // -----------------------------------------------------
  // ⭐ PULSE PERFORMANCE
  // -----------------------------------------------------
  if (avgPulse > 300)
    reasons.push("🐢 High Pulse latency");

  if (capacity > 0 && capacity < 40)
    reasons.push(`⚠️ Pulse capacity low (${capacity}%)`);

  if (microWindow === false)
    reasons.push("🧊 Pulse micro-window stalled");

  if (!isNaN(advantage) && advantage < 1)
    reasons.push("🔻 Pulse advantage negative (phone faster)");

  // -----------------------------------------------------
  // ⭐ PAYLOAD PRESSURE
  // -----------------------------------------------------
  if (lastBytes > 500000)
    reasons.push("📦 Large payload size");

  if (chunkKbps > 0 && chunkKbps < 50)
    reasons.push("🐌 Slow chunk throughput");

  // -----------------------------------------------------
  // ⭐ PROXY HEALTH
  // -----------------------------------------------------
  if (proxy.region && proxy.region !== "us-central1")
    reasons.push("🌎 Proxy region far from device");

  if (proxyLatency > 200)
    reasons.push("🌩 Proxy cold or under load");

  if (redisStatus !== "ok")
    reasons.push("🧱 Redis backend degraded");

  // -----------------------------------------------------
  // ⭐ DEVICE THROTTLING
  // -----------------------------------------------------
  if (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4)
    reasons.push("📱 Low-core device (reduced parallelism)");

  if (pulse.efficiencyMode === "low")
    reasons.push("🔋 Device in low-power mode");

  // -----------------------------------------------------
  // ⭐ BATTERY IMPACT
  // -----------------------------------------------------
  if (pulse.batterySaver)
    reasons.push("🪫 Battery saver reducing performance");

  // -----------------------------------------------------
  // ⭐ IF NOTHING TRIGGERED
  // -----------------------------------------------------
  if (!reasons.length)
    reasons.push("🚀 Everything looks optimal");

  return reasons;
}

function renderLogs() {
  const logs = window.__pulseLogs || [];

  const filtered = logs.filter(l => {
    // ⭐ REAL ERRORS
    if (l.error) return true;
    if (l.severity === "error") return true;

    // ⭐ HIGH-VALUE OPERATIONAL EVENTS
    const highValue = [
      "route_change",
      "proxy_change",
      "pathSwitch",
      "probe",
      "physics",
      "ping",
      "capacity_drop",
      "throughput_collapse",
      "micro_stall",
      "micropulse_error",
      "cloud_hint_http_error",
      "pulsenet_status_update"
    ];
    if (highValue.includes(l.type)) return true;

    // ⭐ PROXY ROUTE EVENTS (pulse / phone)
    if (l.route === "pulse" || l.route === "phone") return true;

    // ⭐ IGNORE EVERYTHING ELSE
    return false;
  });

  if (!filtered.length) {
    document.getElementById("pb-log-table").innerHTML =
      `<tr><td colspan="8" style="text-align:center; padding:10px;">No logs yet</td></tr>`;
    return;
  }

  const sorted = filtered.slice().sort((a, b) => b.ts - a.ts);

  const rows = sorted.map(l => {
    const time = new Date(l.ts).toLocaleTimeString();
    const type = l.type || "event";
    const path = l.path || "—";
    const route = l.route || "—";
    const bytes = l.bytes ?? "—";
    const duration = l.durationMs ?? "—";
    const device = l.system?.deviceModel || "—";
    const error = l.error || l.message || "";

    let style = "";
    if (l.error || l.severity === "error")
      style = "background:#2a0f0f; color:#ff6b6b;";
    else
      style = "background:#0f1f2a; color:#7fc8ff;";

    return `
      <tr style="${style}">
        <td>${time}</td>
        <td>${type}</td>
        <td>${path}</td>
        <td>${route}</td>
        <td>${bytes}</td>
        <td>${duration}</td>
        <td>${device}</td>
        <td>${error}</td>
      </tr>
    `;
  }).join("");

  document.getElementById("pb-log-table").innerHTML = `
    <tr>
      <th>Time</th>
      <th>Type</th>
      <th>Path</th>
      <th>Route</th>
      <th>Bytes</th>
      <th>Duration</th>
      <th>Device</th>
      <th>Message</th>
    </tr>
    ${rows}
  `;
}

  function formatDuration(seconds) {
    seconds = Math.floor(Number(seconds) || 0);
    if (seconds < 60) {
      return `${seconds}s`;
    }
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    if (m < 60) {
      return `${m}m ${s}s`;
    }
    const h = Math.floor(m / 60);
    const mm = m % 60;
    if (h < 24) {
      return `${h}h ${mm}m`;
    }
    const d = Math.floor(h / 24);
    const hh = h % 24;
    return `${d}d ${hh}h`;
  }

  function safeSeconds(v) {
    const n = Number(v);
    if (!Number.isFinite(n) || n < 0) return 0;
    return Math.floor(n);
  }

function computeStabilityScore(logs) {
  const now = Date.now();

  // ⭐ 1. Only consider last 5 minutes
  const errors = logs.filter(l =>
    l.error || l.type?.includes("error") || l.type === "critical"
  ).filter(l =>
    now - l.ts < 5 * 60 * 1000
  );

  if (!errors.length) return 100;

  let score = 100;

  // ⭐ 2. Error volume
  if (errors.length > 5) score -= 20;
  if (errors.length > 10) score -= 40;

  // ⭐ 3. Repeated paths
  const paths = {};
  errors.forEach(e => {
    const p = e.path || "unknown";
    paths[p] = (paths[p] || 0) + 1;
  });

  const maxRepeat = Math.max(...Object.values(paths));
  if (maxRepeat > 3) score -= 20;

  // ⭐ 4. Multiple devices failing
  const devices = new Set(
    errors.map(e => e.system?.deviceModel || "unknown")
  );
  if (devices.size > 3) score -= 10;

  return Math.max(0, score);
}

function timeAgo(ts) {
  const diff = nowMs() - ts;
  if (diff < 60000) return `${Math.round(diff / 1000)}s ago`;
  if (diff < 3600000) return `${Math.round(diff / 60000)}m ago`;
  return `${Math.round(diff / 3600000)}h ago`;
}

    .filter(l => l.error && (now - l.ts < 5 * 60 * 1000))

  const container = document.getElementById("pb-error-list");

  if (!recent.length) {
    container.innerHTML = `<div class="pb-ok">All systems normal</div>`;
    return;

  const stability = computeStabilityScore(recent);

        <div class="pb-error-msg">${msg}</div>
        <div class="pb-error-path">${path}</div>
      </div>
    `;
  }).join("");

  container.innerHTML = html;
}

function debugPulseBandState() {
  if (!pulseband) {
    warn("❌ PulseBand not loaded at all.");
    return;
  }

  const s = pulseband.getStatus?.();
  if (!s) {
    warn("❌ getStatus() returned null or undefined.");
    return;
  }

  const f = (v) =>
    v === undefined || v === null || Number.isNaN(v) ? "—" : v;

  group("🔍 PulseBand Engine State Debug");

  log("pulseband exists:", !!pulseband);
  log("getStatus exists:", !!pulseband.getStatus);
  log("setStatus exists:", !!pulseband.setStatus);
  log("emit exists:", !!pulseband.emit);
  log("on exists:", !!pulseband.on);

  // -----------------------------
  // CORE ENGINE STATE
  // -----------------------------
  log("Engine State:", f(s.state));
  log("Bars:", f(s.pulsebandBars), "/4");
  log("Phone Bars:", f(s.phoneBars), "/4");
  log("Latency:", f(s.latency), "ms");
  log("Network Health:", f(s.networkHealth));
  log("Route:", f(s.route));
  log("isLive:", f(s.isLive));
  log("isIdle:", f(s.isIdle));
  log("Engine Disabled:", f(s.engineDisabled));
  log("Last Sync Seconds:", f(s.lastSyncSeconds));

  // -----------------------------
  // PHYSICS
  // -----------------------------
  group("⚡ Physics");

  const physicsFields = [
    "lastChunkKbps",
    "lastChunkSizeKB",
    "lastChunkDurationMs",
    "kbps",
    "msPerKB",
    "pulseMs",
    "estimatedPhoneMs",
    "timeSaved",
    "advantage",
    "efficiency",
    "capacity",
    "microWindowActive",
    "throughputHealth"
  ];

  let missingPhysics = false;

  physicsFields.forEach((key) => {
    const val = s[key];
    if (val === undefined || val === null) missingPhysics = true;
    log(`${key}:`, f(val));
  });

  if (missingPhysics) {
    warn("⚠️ Physics not initialized — no throughput data yet");
  }

  groupEnd(); // physics

  // -----------------------------
  // SNAPSHOT (if exists)
  // -----------------------------
  if (s.snapshot) {
    group("📦 Snapshot (Historical)");
    log("Latency:", f(s.snapshot.latency));
    log("Throughput:", f(s.snapshot.lastChunkKbps));
    log("Chunk Size:", f(s.snapshot.lastChunkSizeKB));
    log("Chunk Duration:", f(s.snapshot.lastChunkDurationMs));
    log("Capacity:", f(s.snapshot.capacity));
    log("Efficiency:", f(s.snapshot.efficiency));
    log("Advantage:", f(s.snapshot.advantage));
    groupEnd();
  }

  groupEnd(); // main
}

async function waitForPulseBand() {
  return new Promise(resolve => {
    const check = () => {
      if (pulseband &&
          typeof pulseband.requestFullBusinessCache === "function") {
        resolve();
      } else {
        setTimeout(check, 20);
      }
    };
    check();
  });
}

(async () => {
  log("PulseBand Dashboard: Loading Redis historical data...");

  try {
    log("⏳ Waiting for PulseBand to initialize...");
    await waitForPulseBand();   // ⭐ THIS FIXES EVERYTHING
    warn("🔥 PulseBand ready.");
    function startProxyRefreshLoop() {
      refreshProxyHealth();
      refreshProxyNode();
      refreshProxyMetrics();
      
      setInterval(() => {
        refreshProxyHealth();
        refreshProxyNode();
        refreshProxyMetrics();
      }, 2000);
    }

    startProxyRefreshLoop();

    warn("🔥 Redis historical data loaded into PulseBand snapshot.");
    
    setInterval(async () => {
      let status = pulseband.getStatus();
      generatePulsebandActivity(status)
      status = pulseband.getStatus();
      const data = await window.getPulseBandRate();
      pulseband.setStatus({
        ...status,
        ...data,
        lastSyncTimestamp: nowMs(),
        lastSyncSeconds: 0
      });
    }, 3000);
    setInterval(() => {
      const s = pulseband.getStatus();
      pulseband.setStatus({
        ...s,
        lastSyncSeconds: (s.lastSyncSeconds || 0) + 1
      });
    }, 1000);
    
    warn("🔥 PulseBand SYNC STATUS UPDATED");
    document.getElementById("hero").addEventListener("click", () => {
      log("🟦 Header clicked — dumping PulseBand state...");
      debugPulseBandState();
    });
    /* ---------------------------------------------------------
      AUTO REFRESH LOOP (Pulse‑Physics Edition)
    --------------------------------------------------------- */
    log("⏳ Waiting for PulseBand Dashboard to Render...");
    setInterval(() => {
      let s = pulseband.getStatus();
      renderPulseStatusUnified(s);
      s = pulseband.getStatus();
      renderSystemInfo(s);        // upgraded system info
      renderProxyHealth(s);       // upgraded proxy health with bars
      renderLogs();              // upgraded logs
      renderCriticalErrors();    // upgraded critical error engine
      
    }, 1000);
    
    warn("⏳ FINISHING PulseBand Dashboard Render!");
  } catch (err) {
    error("❌ Failed to load Redis data:", err);
  }
})();
