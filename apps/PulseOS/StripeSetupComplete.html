<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tropic Pulse - Setup Complete</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #fff7b3, #ffe066);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader-container {
      text-align: center;
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
    }

    .loader-image img {
      width: 120px;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
      animation: float 2.4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(0,0,0,0.15);
      border-top-color: #00a884;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 18px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      color: #4a3f2f;
      font-weight: 600;
      opacity: 0.85;
    }
  </style>
</head>

<body>

  <div class="loader-container">
    <div class="loader-image">
      <img src="https://www.tropicpulse.bz/ToucanLogo-Mini.png?v9" alt="Tropic Pulse Logo">
    </div>
    <div class="spinner"></div>
    <div class="loading-text">Finalizing your setup…</div>
  </div>
  
  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Backend Connector Layer -->
<script type="module">
// Auto‑derive page name
const pageName = import.meta.url.split('/').pop().replace('.js', '');

// A1 Skin Reflex
import * as PulseSkinReflex from "./PulseOSSkinReflex.js";
PulseSkinReflex.attachScanner(pageName);

// A0 Window / Evolutionary ignition
import * as PulseEvolutionarySight from "./PulseEvolutionaryWindow.js";


  // optional: start the OS
  const Brain = PulseEvolutionarySight.igniteBrain({
    intent: PulseIntentMap,
    organism: PulseOrganismMap,
    iq: PulseIQMap
  });

    window.__FIREBASETOKEN__ = "%%FIREBASE_TOKEN%%";
    // Your backend replaces %%FIREBASE_TOKEN%% with the real firebase custom token.
 
    document.addEventListener("DOMContentLoaded", async () => {
      // DisplayName is cosmetic only — page must load no matter what
      const params = new URLSearchParams(window.location.search);
      
      const returnTo = params.get("returnTo");
      // Real firebase token is embedded privately
      const token = window.__FIREBASETOKEN__;

      if (!token) {
        window.location.href = "https://www.tropicpulse.bz/error.html";
        return;
      }

      // Save token locally (same behavior as before)
      localStorage.setItem("tp_token_v4", token);
      localStorage.setItem("tp_device_token_v4", "1");

      try {
        // POST token to backend to restore identity
        const response = await fetch("https://verifytoken-ilx3agka5q-uc.a.run.app", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

        const data = await response.json();

        if (!data.success || !data.identity) {
          window.location.href = "https://www.tropicpulse.bz/error.html";
          return;
        }

        // Save identity
        localStorage.setItem("tp_identity_v4", JSON.stringify(data.identity));

      setTimeout(() => {
        if (returnTo) {
          window.location.replace(returnTo);
        } else {
          window.location.replace("https://www.tropicpulse.bz/loading.html?dest=appDashboard");
        }
    })

      } catch (err) {
        window.location.href = "https://www.tropicpulse.bz/error.html";
      }
    });
  </script>

</body>
</html>
