  <div class="card">
    <div class="header">

    <div class="cta2">
      <button onclick="resendLink()">Resend Link</button>
    </div>

    <div id="checkmark"></div>
    <div id="status"></div>

      <a href="mailto:Sales@TropicPulse.bz">Sales@TropicPulse.bz</a>.
    </div>
  </div>

  <script>
    function resendLink() {
      const status = document.getElementById("status");
      const checkmark = document.getElementById("checkmark");

      status.style.display = "block";
      status.classList.remove("error", "success");
      checkmark.style.display = "none";

      status.textContent = "Sending a fresh link...";
      status.style.opacity = 1;

      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");

      if (!token) {
        status.textContent = "Missing token. Unable to resend.";
        status.classList.add("error");
        return;
      }

      fetch(`https://api-ilx3agka5q-uc.a.run.app/resend-link?token=${token}`)
        .then(r => r.text())
        .then(msg => {
          status.textContent = msg;
          status.classList.add("success");
          // Show animated checkmark
          checkmark.style.display = "block";
          // ⭐ Remove token from URL AFTER resend succeeds
        })
        .catch(err => {
          status.textContent = "Something went wrong. Please try again.";
          status.classList.add("error");
        });
      }
  </script>
