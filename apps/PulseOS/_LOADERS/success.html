  <script>
  (async () => {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
      error("No token found");
      document.getElementById("email-target").textContent = "Unknown";
      return;
    }

    // Call backend to fetch user data
    const response = await fetch("https://verifytoken-ilx3agka5q-uc.a.run.app", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token })
    });

    const data = await response.json();
    const email = data.email || data.Email || null;
    if (!data.success) {
      error("Token invalid:", data.error);
      document.getElementById("email-target").textContent = "Invalid token";
      return;
    }
    // Write token
    localStorage.setItem("tp_token_v4", data.token);

    localStorage.setItem("tp_identity_v4", JSON.stringify(data.identity));
    localStorage.setItem("tp_device_token_v4", "1");
    
    
    // Log identity write
    await fetch("https://logidentitywrite-ilx3agka5q-uc.a.run.app", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        identity: data.identity,
        identityWrite: true
      })
    });


    // Update the email pill
    document.getElementById("email-target").textContent = email;

  })();
  </script>
