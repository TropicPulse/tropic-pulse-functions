<!DOCTYPE html>
<html>
<head>
  <title>Welcome to Tropic Pulse!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Backend Connector Layer -->
<script type="module">
// Auto‑derive page name
const pageName = import.meta.url.split('/').pop().replace('.js', '');

// A1 Skin Reflex
import * as PulseSkinReflex from "./PulseOSSkinReflex.js";
PulseSkinReflex.attachScanner(pageName);

// A0 Window / Evolutionary ignition
import * as PulseEvolutionarySight from "./PulseEvolutionaryWindow.js";


  // optional: start the OS
  const Brain = PulseEvolutionarySight.igniteBrain({
    intent: PulseIntentMap,
    organism: PulseOrganismMap,
    iq: PulseIQMap
  });
</script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background: linear-gradient(180deg, #fffaa8, #ffe066);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .center-box {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loader-image {
      width: 160px;
      height: 160px;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-image img {
      width: 160px;
      height: 160px;
      object-fit: contain;
    }

    .loader-circle {
      width: 70px;
      height: 70px;
      border: 6px solid #00a884;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 18px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      color: #4a3f2f;
      font-weight: 600;
      margin-top: 10px;
      min-height: 24px;
    }

    .fade-out {
      animation: fadeOut 0.35s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.98); }
    }

    .btn {
      margin-top: 22px;
      padding: 12px 26px;
      background: #00a884;
      color: white;
      border-radius: 999px;
      text-decoration: none;
      font-size: 18px;
      box-shadow: 0 6px 14px rgba(0,168,132,0.25);
    }
  </style>
</head>

<body>
  <div class="center-box" id="loaderBox">

    <div class="loader-image">
      <img src="https://www.tropicpulse.bz/ToucanLogo-Mini.png" alt="Tropic Pulse Logo">
    </div>

    <div class="loader-circle"></div>

    <div class="loading-text" id="loadingText">Loading up the Pulse…</div>

    <a id="continueBtn" class="btn" href="#">Continue</a>

    <script>
      const messages = [
        "Warming up the Island Breeze…",
        "Checking your Tropic Pulse Identity…",
        "Preparing your Login…",
        "Almost There…"
      ];

      let i = 0;
      setInterval(() => {
        loadingText.innerText = messages[i];
        i = (i + 1) % messages.length;
      }, 800);

      const params = new URLSearchParams(location.search);
      const ref = params.get("ref");

      if (ref) {
        localStorage.setItem("pendingReferral", ref);
        loadingText.innerText = "Your Referral Code is Saved! Install or Open the App to Continue.";
      } else {
        loadingText.innerText = "Welcome to Tropic Pulse!";
      }

      const appUrl = "https://www.tropicpulse.bz/CheckEmail.html";
      continueBtn.href = appUrl;

    </script>

  </div>
</body>
</html>
