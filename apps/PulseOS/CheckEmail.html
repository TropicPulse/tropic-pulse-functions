<script type="module">

/* ============================================================
   0. SKIN REFLEX — UNIVERSAL FRONT DOOR
============================================================ */
import * as PulseSkinReflex from "./PulseOSSkinReflex.js";

/* ⭐ attachScanner handles:
      • sessionCheck
      • routeCheck
      • pageName / lastPage
      • identity exposure
*/
await PulseSkinReflex.attachScanner();

/* ============================================================
   1. BOOT MEMBRANE
============================================================ */
import PulseWindow from "./PulseEvolutionaryWindow.js";

/* ============================================================
   LOCAL ERROR SURFACE (unchanged)
   ============================================================ */
window.onerror = function (msg, src, line, col) {
  const div = document.createElement("div");
  div.style.position = "fixed";
  div.style.bottom = "0";
  div.style.left = "0";
  div.style.right = "0";
  div.style.background = "rgba(255,0,0,0.85)";
  div.style.color = "white";
  div.style.padding = "10px";
  div.style.fontSize = "14px";
  div.style.zIndex = "9999";
  div.style.whiteSpace = "pre-wrap";
  div.textContent = `🔥 JS ERROR:\n${msg}\n${src}:${line}:${col}`;
  document.body.appendChild(div);
};

function showTPLoader() {
  const el = document.getElementById("t-loading");
  if (!el) return;
  el.style.display = "flex";
  requestAnimationFrame(() => el.classList.add("show"));
}

function hideTPLoader() {
  const el = document.getElementById("t-loading");
  if (!el) return;
  el.classList.remove("show");
  setTimeout(() => (el.style.display = "none"), 150);
}

/* ============================================================
   DOM ELEMENTS
   ============================================================ */
const authMsg         = document.getElementById("authMsg");
const pinSection      = document.getElementById("pinSection");
const emailSection    = document.getElementById("emailSection");
const rememberSection = document.getElementById("rememberSection");

const pinInput        = document.getElementById("pinInput");
const emailInput      = document.getElementById("emailInput");
const staySignedIn    = document.getElementById("staySignedIn");

const params   = new URLSearchParams(window.location.search);
const returnTo = params.get("returnTo");

/* ============================================================
   UI HELPERS
   ============================================================ */
function showLoginUI() {
  emailSection.style.display = "block";
  rememberSection.style.display = "block";
  pinSection.style.display = "none";
  authMsg.style.display = "none";
}

/* ============================================================
   1) LOGIN BOOTSTRAP
   ============================================================ */
async function loginBootstrap() {
  showTPLoader();

  const id = window.PulseIdentity || null;

  if (!id) {
    hideTPLoader();
    showLoginUI();
    return;
  }

  hideTPLoader();
  window.location.href = returnTo || "/dashboard.html";
}

/* ============================================================
   2) SEND PIN
   ============================================================ */
if (!window.__sendPinBound) {
  window.__sendPinBound = true;

  document.getElementById("sendBtn").addEventListener("click", async () => {
    const email = emailInput.value.trim().toLowerCase();
    showTPLoader();

    if (!email || !email.includes("@")) {
      hideTPLoader();
      authMsg.textContent = "Please Enter a Valid Email!";
      authMsg.className = "msg error";
      authMsg.style.display = "block";
      showLoginUI();
      emailInput.focus();
      return;
    }

    authMsg.style.display = "none";

    try {
      const data = await getHook({ type: "sendPin", email });
      hideTPLoader();

      if (data.success) {
        authMsg.className = "msg success";
        authMsg.textContent = "PIN Sent! Check your Email!";
        authMsg.style.display = "block";

        emailSection.style.display = "none";
        rememberSection.style.display = "none";
        pinSection.style.display = "block";
        pinInput.focus();
      } else {
        authMsg.className = "msg error";
        authMsg.textContent = "Could not Send PIN. Try again!";
        authMsg.style.display = "block";
        showLoginUI();
        emailInput.focus();
      }
    } catch {
      hideTPLoader();
      authMsg.className = "msg error";
      authMsg.textContent = "Network error. Try again!";
      authMsg.style.display = "block";
      showLoginUI();
      emailInput.focus();
    }
  });
}

/* ============================================================
   3) VERIFY PIN — v9.3 CANONICAL IDENTITY
   ============================================================ */
if (!window.__verifyPinBound) {
  window.__verifyPinBound = true;

  document.getElementById("verifyBtn").addEventListener("click", async () => {
    const email = emailInput.value.trim().toLowerCase();
    const pin   = pinInput.value.trim();
    showTPLoader();

    if (pin.length !== 6) {
      hideTPLoader();
      authMsg.className = "msg error";
      authMsg.textContent = "PIN must be 6 digits!";
      authMsg.style.display = "block";
      pinInput.focus();
      return;
    }

    authMsg.style.display = "none";

    try {
      const data = await getHook({
        type: "verifyPin",
        email,
        pin,
        purpose: "login"
      });

      hideTPLoader();

      if (data.success && data.identity) {
        const canonical = {
          ...data.identity,
          trustedDevice: true
        };

        try {
          localStorage.setItem("tp_identity_v9", JSON.stringify(canonical));
          localStorage.setItem("tp_device_token_v9", "1");
        } catch {}

        window.PulseIdentity = canonical;

        window.location.href = returnTo || "/dashboard.html";
        return;
      }

      authMsg.className = "msg error";
      authMsg.textContent = "Invalid PIN. Try again!";
      authMsg.style.display = "block";
      pinInput.focus();

    } catch {
      hideTPLoader();
      authMsg.className = "msg error";
      authMsg.textContent = "Network error. Try again!";
      authMsg.style.display = "block";
      pinInput.focus();
    }
  });
}

/* ============================================================
   4) PULSEBAND BADGE — UI ONLY
   ============================================================ */
if (!window.__pulsebandListenersAttached) {
  window.__pulsebandListenersAttached = true;

  const badge = document.getElementById("pulseband-badge");
  const panel = document.getElementById("pulseband-panel");

  if (badge && panel) {
    badge.onclick = (e) => {
      e.stopPropagation();
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    };

    document.addEventListener("click", (e) => {
      const inside = panel.contains(e.target);
      const onBadge = badge.contains(e.target);
      if (!inside && !onBadge) panel.style.display = "none";
    });
  }
}

/* ============================================================
   5) DOM WRAPPER
   ============================================================ */
(async () => {
  await loginBootstrap();
})();
</script>
