/* Fullscreen overlay */
#t-loading {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.22);
  backdrop-filter: blur(16px) saturate(180%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999999;
  opacity: 1;
  transition: opacity 0.6s ease-out;
}

/* Logo */
#t-loading-logo {
  width: 250px;
  height: 250px;
  object-fit: contain;
  animation: tpShimmer 3.5s ease-in-out infinite;
  
}

/* Magical shimmer sweep */
@keyframes tpShimmer {
  0% {
    transform: scale(0.92);
    opacity: 0.7;
    filter: drop-shadow(0 0 4px rgba(0,255,200,0.2));
  }
  50% {
    transform: scale(1.09);
    opacity: 1;
    filter: drop-shadow(0 0 18px rgba(0,255,200,0.45));
  }
  100% {
    transform: scale(0.92);
    opacity: 0.7;
    filter: drop-shadow(0 0 4px rgba(0,255,200,0.2));
  }
}

/* Hidden state */
#t-loading.hide {
  opacity: 0;
  pointer-events: none;
}
/* ================= PULSEBAND PANEL ONLY (v7 Extract) ================= */

/* Overlay root */
#pulseband-overlay {
  position: fixed;
  bottom: 18px;
  right: 18px;
  z-index: 80;
  pointer-events: none; /* panel/badge will re-enable */
}

/* Bubble badge */
#pulseband-badge {
  width: 52px;
  height: 52px;
  border-radius: 999px;
  background: radial-gradient(circle at 30% 20%, #ffffff 0%, #ffd400 40%, #ff5a5a 100%);
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  pointer-events: auto;
  position: relative;
  overflow: hidden;
  border: 2px solid #000;
}

/* Animated bars inside badge */
.pb-bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
}

.pb-bars span {
  width: 4px;
  border-radius: 999px;
  background: #000;
  animation: pbBarPulse 1s ease-in-out infinite;
}

.pb-bars span:nth-child(1) { height: 10px; animation-delay: 0s; }
.pb-bars span:nth-child(2) { height: 14px; animation-delay: 0.1s; }
.pb-bars span:nth-child(3) { height: 18px; animation-delay: 0.2s; }
.pb-bars span:nth-child(4) { height: 12px; animation-delay: 0.3s; }

@keyframes pbBarPulse {
  0%, 100% { transform: scaleY(0.7); }
  50% { transform: scaleY(1.2); }
}

/* Panel card */
.pb-card {
  position: absolute;
  bottom: 70px;
  right: 0;
  width: 280px;
  max-width: 90vw;
  background: #000;
  border-radius: 18px;
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
  padding: 14px 16px 16px 16px;
  color: #fff;
  border: 2px solid #ffd400;
  pointer-events: auto;
  transform-origin: bottom right;
  transform: translateY(12px) scale(0.96);
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
}

/* When active */
.pb-card.pb-open {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
}

/* Panel header */
.pb-header {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  margin-bottom: 8px;
}

.pb-mini-badge {

  height: 32px;
  border-radius: 999px;
  border: 2px solid var(--tp-yellow-strong);
  box-shadow: 0 0 10px rgba(255, 212, 0, 0.6);
}

/* Rows */
.pb-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 0.82rem;
  padding: 4px 0;
  border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
}

}

}

.pb-hint {
  font-weight: 400;
  font-size: 0.75rem;
  color: rgba(255, 255, 255, 0.6);
}

.pb-value {
  font-weight: 600;
  color: var(--tp-yellow-strong);
  text-align: right;
}

/* Mobile tweaks */
@media (max-width: 900px) {
  #pulseband-overlay {
    bottom: 12px;
    right: 12px;
  }

  .pb-card {
    width: 260px;
  }
}

/************************************************************
 * SESSION CHECK (ALL PAGES EXCEPT LOGIN)
 ************************************************************/
async function sessionCheck() {
  mark("sessionCheck");

  // -----------------------------------------
  // 1. LOAD LOCAL VARIABLES
  // -----------------------------------------
  autologin = localStorage.getItem("tp_stay_signed_v4") === "1";
  trusted   = localStorage.getItem("tp_device_token_v4") === "1";

  try {
    identity = JSON.parse(localStorage.getItem("tp_identity_v4") || "{}");
  } catch {
    identity = null;
  }

  token     = localStorage.getItem("tp_token_v4");
  userID    = identity?.uid   || null;
  userEmail = identity?.email || null;
  userName  = identity?.displayName || null;

  // -----------------------------------------
  // 2. IDENTITY + TOKEN MUST EXIST
  // -----------------------------------------
  if (!identity || !userID || !token) {
    mark("Missing identity or token → HARD LOGOUT");
    hardLogout("missing_identity_or_token");
    return false;
  }

  // -----------------------------------------
  // 3. LOCAL INACTIVITY CHECK
  // -----------------------------------------
  const now       = nowMs();
  const lastLocal = Number(localStorage.getItem("tp_last_active_v4")) || 0;
  const diff      = now - lastLocal;

  const inactive15 = diff > 15 * 60 * 1000; // > 15 minutes

  if (inactive15 && !trusted) {
    if (!autologin) {
      mark("Inactive >15 min AND not autologin/trusted → HARD LOGOUT");
      hardLogout("inactive_and_not_remembered");
    } else {
      mark("Inactive >15 min AND autologin → SOFT LOGOUT");
      safeLogout();
    }
    return false;
  }

  // -----------------------------------------
  // 4. BACKEND AUTH REFRESH (THE ONLY REAL STEP)
  // -----------------------------------------
  const data = await getAuth(token);

  if (data.hardLogout) {
    mark("Backend flagged danger → HARD LOGOUT");
    hardLogout("backend_danger_flag");
    return false;
  }

  if (!data.identity) {
    mark("Backend returned no identity → HARD LOGOUT");
    hardLogout("missing_identity_from_backend");
    return false;
  }

  // Update JWT lineage if provided
  if (data.newJwtToken) {
    token = data.newJwtToken;
    localStorage.setItem("tp_token_v4", token);
    mark("Updated JWT lineage from backend");
  }

  // Update identity cache
  identity = data.identity;
  localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

  // -----------------------------------------
  // 5. UPDATE LAST ACTIVE
  // -----------------------------------------
  localStorage.setItem("tp_last_active_v4", now);

  return true;
}

function safeNormalizeDate(d) {
  if (!d) return null;

  // Already ISO YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;

  // MM/DD/YYYY
  const md = d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (md) {
    let [_, m, day, y] = md;
    return `${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }

  // DD-MM-YYYY
  const dm = d.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if (dm) {
    let [_, day, m, y] = dm;
    return `${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }

  // YYYY/MM/DD
  const ymd = d.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if (ymd) {
    let [_, y, m, day] = ymd;
    return `${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }

  // DD-MMM-YYYY (19-FEB-2026)
  const mmm = d.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/);
  if (mmm) {
    const months = {
      JAN:"01", FEB:"02", MAR:"03", APR:"04",
      MAY:"05", JUN:"06", JUL:"07", AUG:"08",
      SEP:"09", OCT:"10", NOV:"11", DEC:"12"
    };
    let [_, day, mon, y] = mmm;
    mon = mon.toUpperCase();
    if (!months[mon]) return null;
    return `${y}-${months[mon]}-${String(day).padStart(2,"0")}`;
  }

  return null;
}

function safeNormalizeTime(t) {
  
  if (!t) return "00:00";
  t = t.trim();

  if (/^\d{2}:\d{2}$/.test(t)) return t;

  const simpleAP = t.match(/^(\d{1,2})\s*(AM|PM)$/i);
  if (simpleAP) {
    let [_, h, ap] = simpleAP;
    h = Number(h);
    if (ap.toUpperCase() === "PM" && h !== 12) h += 12;
    if (ap.toUpperCase() === "AM" && h === 12) h = 0;
    return `${String(h).padStart(2,"0")}:00`;
  }

  const match = t.match(/(\d{1,2}):(\d{1,2})\s*(AM|PM)/i);
  if (match) {
    let [_, h, m, ap] = match;
    h = Number(h);
    m = Number(m);
    if (ap.toUpperCase() === "PM" && h !== 12) h += 12;
    if (ap.toUpperCase() === "AM" && h === 12) h = 0;
    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  }

  const match2 = t.match(/(\d{1,2}):(\d{1,2})/);
  if (match2) {
    let [_, h, m] = match2;
    return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
  }

  if (/^\d{3,4}$/.test(t)) {
    let padded = t.padStart(4, "0");
    let h = padded.slice(0, 2);
    let m = padded.slice(2);
    return `${h}:${m}`;
  }

  if (/^\d{1,2}$/.test(t)) {
    return `${String(Number(t)).padStart(2,"0")}:00`;
  }

  return "00:00";

}

function normalizeCategory(str) {
  if (!str) return "";

  // Clean up but DO NOT destroy spaces or hyphens
  let s = str
    .toLowerCase()
    .trim()
    .replace(/&/g, "and")
    .replace(/\//g, " ")          // slash → space
    .replace(/[^a-z0-9\s-]/g, "") // allow letters, numbers, spaces, hyphens
    .replace(/\s+/g, " ");        // collapse multiple spaces

  const parts = s.split(" ");

  // 1 word → do nothing
  if (parts.length === 1) {
    return s;
  }

  // 2 words → DO NOTHING (your rule)
  if (parts.length === 2) {
    return s;
  }

  // 3+ words
  // If original already had a hyphen → DO NOTHING
  if (s.includes("-")) {
    return s;
  }

  // If no hyphen existed → first join hyphen, rest spaces
  return parts[0] + "-" + parts[1] + " " + parts.slice(2).join(" ");
}

async function getEventCategoryIcon(ev) {
  if (!ev) return null;

  const cat = normalizeCategory(ev.category || "");
  const sub = normalizeCategory(ev.subcategory || "");

  // 1) Try category map first
  if (cat && eventCategoryIconMap[cat]) {
    return eventCategoryIconMap[cat];
  }

  // 2) Try subcategory map second
  if (sub && eventSubcategoryIconMap[sub]) {
    return eventSubcategoryIconMap[sub];
  }

  // 3) Fallback: Firestore CategoryIconCache lookup
  try {
    if (cat) {
      const snap = await firebase.firestore()
        .collection("CategoryIconCache")
        .where("category", "==", cat)
        .where("source", "array-contains", "events")
        .limit(1)
        .get();

      if (!snap.empty) {
        const doc = snap.docs[0].data();
        if (doc.migratedUrl) return doc.migratedUrl;
      }
    }
  } catch (err) {
    error("CategoryIconCache lookup failed:", err);
  }

  // 4) Nothing found
  return null;
}

async function loadMapForEvent(ev) {

  const mapAddress   = el("mapAddress");
  const mapImage     = el("mapImage");
  const mapLink      = el("mapLink");

    safeText(mapName, "");
    safeText(mapAddress, "No venue provided.");
    mapImage.src = "";
    mapLink.href = "#";
    return;
  }

  const hasCachedMap =
    ev.mapImageUrl &&
    ev.mapsWebUrl &&
    ev.resolvedAddress &&
    ev.resolvedName;

  /* -------------------------------------------------
     1. USE CACHED MAP IF AVAILABLE
  -------------------------------------------------- */
  if (hasCachedMap) {
    mapContainer.style.display = "block";

    safeText(
      mapName,
      ev.title ||
      ev.resolvedName ||
      cleanVenue ||
      "Event Location"
    );

    safeText(mapAddress, cleanVenue);

    // Clear old handlers
    mapImage.onload = null;
    mapImage.onerror = null;

    // If cached map fails → regenerate
    mapImage.onerror = async () => {
      warn("Cached event map failed, regenerating…");
      await regenerateEventMap(ev);
    };

    // Load cached map
    mapImage.src = `${ev.mapImageUrl}?t=${nowMs()}`;
    mapLink.href = ev.mapsWebUrl;

    const iconUrl = await getEventCategoryIcon(ev);

    attachMapOverlayHandler(
      ev.title || ev.resolvedName || cleanVenue || "Event Location",
      iconUrl
    );

    mapImage.onclick = () => mapLink.click();
    return;
  }

  /* -------------------------------------------------
     2. FALLBACK: GENERATE NEW MAP
  -------------------------------------------------- */
  try {
    const venue = cleanVenue || "";
    const eventID = evt.id;
    
    // ⭐ NEW — call connector instead of backend URL
    const data = await getMap(venue, eventID);

    if (!data || !data.success) {
      mapContainer.style.display = "block";
      safeText(mapName, "");
      safeText(mapAddress, "Map unavailable.");
      mapImage.src = "";
      mapLink.href = "#";
      return;
    }

    mapContainer.style.display = "block";

    safeText(
      mapName,
      ev.title ||
      data.resolvedName ||
      cleanVenue ||
      "Event Location"
    );

    safeText(
      mapAddress,
      data.resolvedAddress ||
      ev.venue ||
      ""
    );

    mapImage.onload = null;
    mapImage.onerror = null;

    // If generated map fails → regenerate
    mapImage.onerror = async () => {
      warn("Generated event map failed, regenerating…");
      await regenerateEventMap(ev);
    };

    mapImage.src = `${data.mapImageUrl}?t=${nowMs()}`;

/* -------------------------------------------------
   28. LABEL + ICON RENDERER
-------------------------------------------------- */
function prettyLabel(str) {
  if (!str) return "";

  return str
    .split("-")
    .map(part =>
      part
        .split(" ")
        .map(w => w.charAt(0).toUpperCase() + w.slice(1))
        .join(" ")
    )
    .join(" ");
}

function renderLabeledIcon(key, isSub = false) {
  if (!key) return "";

  const label = prettyLabel(key);

  const iconUrl = isSub
    ? eventSubcategoryIconMap[key] || ""
    : eventCategoryIconMap[key] || "";

  const iconImg = iconUrl
    ? `<img src="${iconUrl}" style="width:30px;height:30px;margin-top:-6px;object-fit:contain;margin-right:2px;vertical-align:middle;">`
    : "";

  return `${iconImg}<span>${label}</span>`;
}

// Helper: convert "11:00 AM" → { hours, minutes }
  function to12Hour(time24) {
  if (!time24) return "";

  let parts = time24.split(":");
  let h = Number(parts[0]) || 0;
  let m = parts[1] ? Number(parts[1]) : 0;

  const suffix = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  return `${h}:${String(m).padStart(2, "0")} ${suffix}`;
}

   17. DOTS UPDATE (idempotent)
-------------------------------------------------- */
function updateDots() {
  const dots = el("dots");
  if (!dots) return;

  dots.innerHTML = "";

  (carouselImages || []).forEach((_, i) => {
    const d = document.createElement("span");
    d.className = "dot" + (i === currentIndex ? " active" : "");
    d.setAttribute("aria-label", `Image ${i + 1}`);

    d.onclick = () => {
      currentIndex = i;
      updateCarousel();
    };

    dots.appendChild(d);
  });
}

  /* -------------------------------------------------
   20. CAROUSEL UPDATE (idempotent)
-------------------------------------------------- */
function updateCarousel() {
  try {
    const mainImage = el("mainImage");
    const leftArrow = el("leftArrow");
    const rightArrow = el("rightArrow");

    mainImage.style.opacity = 0;

    // prevent duplicate onload handlers
    mainImage.onload = null;

    mainImage.onload = () => {
      mainImage.style.opacity = 1;
    };

    if (!Array.isArray(carouselImages) || carouselImages.length === 0) {
      warn("Carousel: No images found, using fallback.");
      carouselImages = ["https://www.tropicpulse.bz/Frustrated.png"];
      currentIndex = 0;
    }

    if (currentIndex < 0) currentIndex = 0;
    if (currentIndex >= carouselImages.length)
      currentIndex = carouselImages.length - 1;

    setTimeout(() => {
      mainImage.src = carouselImages[currentIndex];
      mainImage.onerror = () => {
        mainImage.src = "https://www.tropicpulse.bz/Frustrated.png";
      };
      mainImage.style.opacity = 1;
    }, 150);

    leftArrow.style.display =
      currentIndex > 0 ? "block" : "none";
    rightArrow.style.display =
      currentIndex < carouselImages.length - 1 ? "block" : "none";

    if (typeof updateDots === "function") {
      updateDots();
    } else {
      warn("Carousel: updateDots() missing.");
    }
  } catch (err) {
    error("updatCarousel error:", err);
    const mainImage = el("mainImage");
    if (mainImage) {
      mainImage.src = "https://www.tropicpulse.bz/Frustrated.png";
      mainImage.style.opacity = 1;
    }
  }
}

/* ---------- Event sanitization ---------- */
function sanitizeEvent(raw = {}) {
  const data = raw || {};

  return {
    id: data.id || null,

    // Core identity
    title: data.title || "Untitled Event",
    category: data.category || "General",

    // Venue + location
    venue: data.venue || data.location || "TBA",
    location: data.location || data.venue || null,

    // Lat/lng
    lat: data.lat || null,
    lng: data.lng || null,

    // Dates + times
    fromDate: data.fromDate || null,
    toDate: data.toDate || data.fromDate || null,
    fromTime: data.fromTime || null,
    toTime: data.toTime || null,

    // Pricing
    price: data.price || null,
    priceRange: data.priceRange || null,

    // Media
    images: data.images || [],
    banners: data.banners || [],
    mainPhotoURL: data.mainPhotoURL || null,

    // Organizer
    email: data.email || null,
    organizerEmail: data.organizerEmail || data.email || null,
    organizerPhone: data.organizerPhone || null,

    // Tags / vibe
    tags: data.tags || [],
    vibeTags: data.vibeTags || [],

    social: {
      facebook: (data.social?.facebook ?? []),
      instagram: (data.social?.instagram ?? []),
      twitter: (data.social?.twitter ?? []),
      youtube: (data.social?.youtube ?? []),
      other: (data.social?.other ?? [])
    },
    websites: data.websites || [],

    // Description
    summary: data.summary || null,
    description: data.description || null,

    // Spread remaining fields safely
    ...data
  };
}

/* ---------- Display helpers ---------- */
function getDisplayVenue(ev) {
  if (!ev) return 'TBA';

  // 1. Google busiess name (clean commas → spaces)
  if (ev.resolvedName) {
    return ev.resolvedName
      .replace(/san pedro, belize/gi, '')
      .replace(/san pedro belize/gi, '')
      .replace(/belize city, belize/gi, '')
      .replace(/belize city belize/gi, '')
      .replace(/,/g, ' ')
      .trim();
  }

  // 2. Google address fallback
  if (ev.resolvedAddress) return ev.resolvedAddress;

  // 3. User-typed venue (title-cased)
  if (ev.venue) {
    return ev.venue.replace(/\w\S*/g, txt =>
      txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase()
    );
  }

  return 'TBA';
}

function saveLocation(lat, lng) {
    localStorage.setItem(
      "lastKnownLocation",
      JSON.stringify({ lat, lng, ts: nowMs() })
    );
  }

  function getSavedLocation() {
    try {
      const raw = localStorage.getItem("lastKnownLocation");
      if (!raw) return null;

      const obj = JSON.parse(raw);
      if (!obj.lat || !obj.lng) return null;

      return obj;
    } catch {
      return null;
    }
  }

  function fetchLowAccuracyInBackground(onUpdate) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        log("Background low accuracy:", loc);
        saveLocation(loc.lat, loc.lng);
        onUpdate(loc);
      },
      err => {
        warn("Background low accuracy failed:", err);

        // Retry once after 2 seconds
        setTimeout(() => {
          navigator.geolocation.getCurrentPosition(
            pos2 => {
              const loc2 = { lat: pos2.coords.latitude, lng: pos2.coords.longitude };
              log("Retry low accuracy:", loc2);
              saveLocation(loc2.lat, loc2.lng);
              onUpdate(loc2);
            },
            err2 => {
              warn("Retry low accuracy failed:", err2);
            },
            { enableHighAccuracy: false, timeout: 5000 }
          );
        }, 2000);
      },
      { enableHighAccuracy: false, timeout: 5000 }
    );
  }

  function getDistanceMiles(lat1, lon1, lat2, lon2) {
    const R = 3958.8; // Earth radius in miles
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1 * Math.PI / 180) *
      Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) ** 2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
  }

  async function getInstantLocationWithBackgroundUpdate(onSignificantChange) {
    const saved = getSavedLocation();

    // 1️⃣ Return cached location immediately
    if (saved) {
      log("Using cached location:", saved);
      setTimeout(() => {
        fetchLowAccuracyInBackground(newLoc => {
          const dist = getDistanceMiles(saved, newLoc);
          if (dist > 50) {
            log("📍 Significant movement:", dist, "m");
            onSignificantChange(newLoc);
          }
        });
      }, 0);
      return saved;
    }

    // 2️⃣ No saved location → try low accuracy immediately
    return new Promise(resolve => {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          log("Initial low accuracy:", loc);
          saveLocation(loc.lat, loc.lng);
          resolve(loc);

          // Background refresh
          fetchLowAccuracyInBackground(newLoc => {
            const dist = getDistanceMiles(loc, newLoc);
            if (dist > 50) onSignificantChange(newLoc);
          });
        },
        err => {
          warn("Initial low accuracy failed:", err);
          resolve(null);

          // Still try background update
          fetchLowAccuracyInBackground(newLoc => {
            onSignificantChange(newLoc);
          });
        },
        { enableHighAccuracy: false, timeout: 7000 }
      );
    });
  }

  const icon      = document.getElementById("tpIcon");
  const mapImg    = document.getElementById("mapImage");

  if (!overlay || !dot || !label || !mapImg) return;

  const rect = mapImg.getBoundingClientRect();

  // Center of the map image
  const cx = rect.width / 2;
  const cy = rect.height / 2;

  dot.style.left = `${cx - 9}px`;
  dot.style.top  = `${cy - 9}px`;

  labelText.textContent = name || "Location";
  label.style.left = `${cx}px`;
  label.style.top  = `${cy - 22}px`;

  // Category icon support
  if (iconUrl) {
    icon.src = iconUrl;
    icon.style.display = "block";
  } else {
    icon.style.display = "none";
  }

  overlay.style.display = "block";

  // Install new resize handler
  window.__tp_overlay_resize_handler = () => {
    clearTimeout(__tp_overlay_resize_timeout);
    __tp_overlay_resize_timeout = setTimeout(() => {
      applyTropicOverlay(labelText.textContent, icon.src || null);
    }, 150);
  };

  window.addEventListener("resize", window.__tp_overlay_resize_handler);
}

(async () => {
    function mark(label, position = false) {
      const now = nowMs();
      if (position) {
        log(`${label}: +${(now - firstTime).toFixed(1)}ms`);
      } else {
        log(`${label}: +${(now - lastTime).toFixed(1)}ms`);
      }
      lastTime = now;
    }
    mark("EVENT DOM STARTS");
    
    currentUserLocation = await getInstantLocationWithBackgroundUpdate(newLoc => {
      mark("SETTING CURRENT LOCATION IF AVAILABLE");
      currentUserLocation = newLoc;
    });
    mark("EVENT LOCATION READY");

    await loadEvent();
    mark("EVENT LOADED");

    await runWakeUpHeartbeat();
    mark("EVENT HEARTBEAT STARTED");
    
    initializeOverlays();
    mark("EVENT OVERLAYS LOADED");
    // -----------------------------
  // LIVE PULSEBAND UPDATE LOOP
  // -----------------------------
  setInterval(async () => {
    const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
    const disabled = (window.isIdle === true && inactiveFlag === true);
    if (disabled) return;

    const status = pulseband.getStatus();
    const data = await window.getPulseBandRate();

    pulseband.setStatus({
      ...status,
      ...data,
      lastSyncTimestamp: nowMs(),
      lastSyncSeconds: 0
    });
  }, 3000);

  // -----------------------------
  // LAST SYNC COUNTER LOOP
  // -----------------------------
  setInterval(() => {
    const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
    const disabled = (window.isIdle === true && inactiveFlag === true);

    const status = pulseband.getStatus();
    const ts = getSafeTimestamp(status);
    const seconds = safeSeconds((nowMs() - ts) / 1000);

    pulseband.setStatus({
      ...status,
      lastSyncTimestamp: ts,
      lastSyncSeconds: seconds
    });
  }, 1000);
    hideTPLoader();
    mark("EVENT DOM ENDS", true);
  })();

</script>
