<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tropic Pulse - Resending Link</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #fff7b3, #ffe066);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader-container {
      text-align: center;
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
    }

    .loader-image img {
      width: 110px;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
      animation: float 2.4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="loader-container">
    <div class="loader-image">
      <img src="https://www.tropicpulse.bz/pictures/ToucanLogo-Mini.png?v4" alt="Tropic Pulse Logo">
    </div>
  </div>

<script type="module">
  // Auto‑derive page name
const pageName = import.meta.url.split('/').pop().replace('.js', '');

// A1 Skin Reflex
import * as PulseSkinReflex from "./PulseOSSkinReflex.js";
PulseSkinReflex.attachScanner(pageName);

// A0 Window / Evolutionary ignition
import * as PulseEvolutionarySight from "./PulseEvolutionaryWindow.js";


  // optional: start the OS
  const Brain = PulseEvolutionarySight.igniteBrain({
    intent: PulseIntentMap,
    organism: PulseOrganismMap,
    iq: PulseIQMap
  });
  window.__SERVER_HAS_TOKEN__ = true;

    document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);

  // ⭐ Use displayName — the official public identity layer
  const displayName = params.get("displayName") || "Friend";

  // Server-side token presence check
  if (!window.__SERVER_HAS_TOKEN__) {
    window.location.href = "https://www.tropicpulse.bz/error.html";
    return;
  }

  // Browser sends NO TOKEN — only a trigger
  fetch("https://www.tropicpulse.bz/resendlink-trigger", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ request: true })
  })
  .then(() => {
    window.location.href =
      "https://www.tropicpulse.bz/success.html?displayName=" +
      encodeURIComponent(displayName);
  })
  .catch(() => {
    window.location.href = "https://www.tropicpulse.bz/error.html";
  });
});

  </script>

</body>
</html>
