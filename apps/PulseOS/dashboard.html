  <div id="t-loading">
    <img src="/_PICTURES/ToucanLogo-Mini.png" id="t-loading-logo"></img>
  </div>
  <div id="pulseband-overlay">
    <div id="pulseband-badge">
      <div class="pb-bars">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div id="pulseband-panel" class="pb-card">

      <div class="pb-header">
      <img id="pb-mini-badge" class="pb-mini-badge"
          src="/_PICTURES/PulseBand.png"
          alt="PulseBand Badge">
    </div>

      <div class="pb-row">
        <label>PulseBand Bars <span class="pb-hint">(App Speed)</span></label>
        <span id="pb-bars-text" class="pb-value">0/4</span>
      </div>

      <div class="pb-row">
        <label>Phone Bars <span class="pb-hint">(Signal Speed)</span></label>
        <span id="pb-phonebars-text" class="pb-value">0/4</span>
      </div>

      <div class="pb-row">
        <label>Stability <span class="pb-hint">(Connect Quality)</span></label>
        <span id="pb-stability" class="pb-value">0%</span>
      </div>

      <div class="pb-row">
        <label>Latency <span class="pb-hint">(Response Time)</span></label>
        <span id="pb-latency" class="pb-value">0 ms</span>
      </div>

      <div class="pb-row">
        <label>Micro‑Windows <span class="pb-hint">(Speed Bursts)</span></label>
        <span id="pb-micro" class="pb-value">Idle</span>
      </div>

      <div class="pb-row">
        <label>Route <span class="pb-hint">(Network Path)</span></label>
        <span id="pb-route" class="pb-value">Primary</span>
      </div>

      <div class="pb-row">
        <label>State <span class="pb-hint">(Current Mode)</span></label>
        <span id="pb-state" class="pb-value">Initializing</span>
      </div>

      <div class="pb-row">
        <label>Last Sync <span class="pb-hint">(Updated)</span></label>
        <span id="pb-sync" class="pb-value">0s ago</span>
      </div>

      <div class="pb-row">
        <label>Efficiency <span class="pb-hint">(Speed Mode)</span></label>
        <span id="pb-efficiency" class="pb-value">Micro‑Burst</span>
      </div>

      <div class="pb-row">
        <label>Network Health <span class="pb-hint">(Overall)</span></label>
        <span id="pb-health" class="pb-value">Checking…</span>
      </div>

      <div class="pb-row">
        <label>PulseBand Advantage</label>
        <span id="pb-advantage" class="pb-value">2.5× Faster</span>
      </div>

      <div class="pb-row">
        <label>PulseBand vs Phone</label>
        <span id="pb-estimated" class="pb-value">Calculating…</span>
      </div>
    </div>
  </div>
  <div id="hero-backdrop-top"></div>
  <div id="hero-backdrop-bottom"></div>

  <div class="card-wrapper">
    <div class="profile-header">
        <img src="/_PICTURES/ToucanLogo-Mini.png" class="auth-logo"/>
      </div>
    <div class="card">
      <h2>Your Tropic Pulse Account</h2>
      <p style="color:#fff;font-weight:500;">Securely Connected and Ready to Go!</p>

      <div class="photo-wrapper">
        <div id="shimmer" class="shimmer"></div>
        <img id="profilePhoto" class="profile-photo" src="" />
      </div>

      <div id="info" class="info"></div>

      <button id="stripeBtn" class="tp-btn dashboard-btn">
        <span class="btn-icon">📊</span> Stripe Dashboard
      </button>

      <button id="updateBtn" class="tp-btn update-btn">
        <span class="btn-icon">✏️</span> Update Profile
      </button>

      <button id="adminBtn" class="tp-btn admin-btn" style="display:none;">
        <span class="btn-icon">🛠️</span> Admin Panel
      </button>

      <div class="settings-box">
        <div class="settings-title">Device Settings</div>

        <div class="setting-row">
          <span>Stay Signed On This Device</span>
          <label class="switch">
            <input type="checkbox" id="stayToggle">
            <span class="slider"></span>
          </label>
        </div>

        <div class="setting-note">
          When Enabled, No Need to Enter a PIN on this Device.
        </div>
      </div>

      <div class="logout" id="logoutBtn">Log Out</div>
    </div>
  </div>
<script type="module">
/* ============================================================================
   DASHBOARD — v11 FRONT PAGE
   Identity → OS Boot → Render → UI Animations
   No PulseBand engine. No timers except CSS fades.
============================================================================ */

// -----------------------------------------
// ⭐ UI HELPERS
// -----------------------------------------
function hideTPLoader() {
  const el = document.getElementById("t-loading");
  if (!el) return;
  el.classList.add("hide");
  setTimeout(() => el.remove(), 700);
}

function safeLogout() {
  localStorage.removeItem("tp_identity_v9");
  localStorage.removeItem("tp_device_token_v9");
  window.location.replace("/login.html");
}

// -----------------------------------------
// ⭐ SESSION CHECK (v11 rule)
// -----------------------------------------
async function sessionCheck() {
  let id = null;

  try {
    const raw = localStorage.getItem("tp_identity_v9");
    if (raw) id = JSON.parse(raw);
  } catch {
    id = null;
  }

  if (!id || !id.trustedDevice) {
    const here = encodeURIComponent(location.pathname + location.search);
    window.location.href = `/CheckEmail.html?returnTo=${here}`;
    return null;
  }

  window.PulseIdentity = id;
  return id;
}

// -----------------------------------------
// ⭐ HERO HEADER ENTRANCE ANIMATION
// -----------------------------------------
async function runHeroHeaderEntrance() {
  if (window.__heroHeaderPlayed) return;
  window.__heroHeaderPlayed = true;

  const top = document.createElement("div");
  const bottom = document.createElement("div");

  top.id = "hero-backdrop-top";
  bottom.id = "hero-backdrop-bottom";

  const base = {
    position: "fixed",
    left: "0",
    right: "0",
    background: "rgba(0,0,0,0.65)",
    pointerEvents: "none",
    zIndex: "9999"
  };

  Object.assign(top.style, base, {
    top: "0",
    height: "100vh",
    opacity: "1",
    transition: "height 1.2s ease-out, opacity 0.8s ease-out"
  });

  Object.assign(bottom.style, base, {
    bottom: "0",
    height: "100vh",
    opacity: "1",
    transition: "height 1.2s ease-out"
  });

  document.body.appendChild(top);
  document.body.appendChild(bottom);

  await new Promise(requestAnimationFrame);
  await new Promise(requestAnimationFrame);
  await new Promise(res => setTimeout(res, 600));

  bottom.style.height = "0";
  top.style.height = "115px";

  setTimeout(() => (top.style.opacity = "0"), 900);

  setTimeout(() => {
    bottom.style.opacity = "0";
    top.remove();
    bottom.remove();
  }, 1800);
}

// -----------------------------------------
// ⭐ DASHBOARD POP ANIMATION
// -----------------------------------------
function applyDashboardPop(identity) {
  const header = document.querySelector(".tp-dashboard-header");
  const nameEl = document.querySelector(".tp-dashboard-greeting-name");
  const trustBadge = document.querySelector(".tp-trusted-badge");

  if (header) {
    header.classList.add("tp-dashboard-header-pop");
    setTimeout(() => header.classList.remove("tp-dashboard-header-pop"), 600);
  }

  if (nameEl && identity?.name) {
    nameEl.textContent = identity.name.split(" ")[0];
    nameEl.classList.add("tp-greeting-pop");
    setTimeout(() => nameEl.classList.remove("tp-greeting-pop"), 800);
  }

  if (trustBadge) {
    trustBadge.textContent = identity.trustedDevice ? "Trusted Device" : "Untrusted Device";
    trustBadge.classList.toggle("trusted", identity.trustedDevice);
  }
}

// -----------------------------------------
// ⭐ MAIN RENDER
// -----------------------------------------
async function renderDashboard(identity) {
  const shimmer = document.getElementById("shimmer");
  const img = document.getElementById("profilePhoto");
  const info = document.getElementById("info");

  if (!shimmer || !img || !info) return;

  shimmer.style.display = "block";

  info.innerHTML = `
    <div class="info-row"><span class="label">Name:</span> <span class="textA">${identity.name}</span></div>
    <div class="info-row"><span class="label">Email:</span> <span class="textA">${identity.email}</span></div>
    <div class="info-row"><span class="label">Role:</span> <span class="textA">${identity.role || "Deliverer"}</span></div>
    <div class="info-row"><span class="label">Stripe Account:</span> <span class="textA">${identity.stripeAccountID || "Not linked"}</span></div>
    <div class="info-row"><span class="label">Trusted Device:</span> <span class="textA">${identity.trustedDevice ? "Yes" : "No"}</span></div>
  `;

  applyDashboardPop(identity);

  let photo =
    (identity.photoURL && identity.photoURL.trim() !== "" && identity.photoURL) ||
    "/_PICTURES/Frustrated.png";

  img.src = photo;

  img.onload = () => {
    shimmer.style.display = "none";
    img.style.display = "block";
  };

  img.onerror = () => {
    img.src = "/_PICTURES/Frustrated.png";
    shimmer.style.display = "none";
    img.style.display = "block";
  };

  // Buttons
  const logoutBtn = document.getElementById("logoutBtn");
  const adminBtn  = document.getElementById("adminBtn");
  const stripeBtn = document.getElementById("stripeBtn");
  const updateBtn = document.getElementById("updateBtn");

  if (logoutBtn) logoutBtn.onclick = () => safeLogout();

  if (adminBtn) {
    if (identity.role?.toLowerCase() === "admin") {
      adminBtn.style.display = "block";
    }
    adminBtn.onclick = () => (window.location.href = "/PULSEAdmin/PULSEAdmin.html");
  }

  if (stripeBtn) {
    const stripeUrl = identity.stripeDashboardURL || identity.loginLink || "#";
    stripeBtn.onclick = () => (window.location.href = stripeUrl);
  }

  if (updateBtn) {
    updateBtn.onclick = () => (window.location.href = "/userrecord.html");
  }

  hideTPLoader();
}

// -----------------------------
// DASHBOARD BOOTSTRAP — v11 (UNDERSTANDING-ONLY)
// -----------------------------
(async () => {
  // -----------------------------------------
  // MARKER (CLEAN + SAFE)
  // -----------------------------------------
  let lastTime = nowMs();
  function mark(label, absolute = false) {
    const now = nowMs();
    const diff = now - lastTime;
    log(
      absolute
        ? `${label}: @${now.toFixed(1)}ms`
        : `${label}: +${diff.toFixed(1)}ms`
    );
    lastTime = now;
  }

  mark("DASHBOARD DOM START");

  // -----------------------------------------
  // GLOBAL UI STATE
  // -----------------------------------------
  window.isIdle = true;

  // -----------------------------------------
  // 1️⃣ v11 SESSION CHECK (ONE-TIME)
  // -----------------------------------------
  mark("DASHBOARD: sessionCheck()");
  const id = await sessionCheck();
  if (!id) return; // redirected to login if invalid

  // -----------------------------------------
  // 2️⃣ UI PREP
  // -----------------------------------------
  document.body.classList.add("hero-header-intro");
  hideTPLoader();

  // -----------------------------------------
  // 3️⃣ HERO HEADER ANIMATION
  // -----------------------------------------
  mark("DASHBOARD: HERO ENTRANCE");
  await runHeroHeaderEntrance();

  // -----------------------------------------
  // 4️⃣ RENDER DASHBOARD (IDENTITY-ONLY INPUT)
  // -----------------------------------------
  mark("DASHBOARD: RENDER START");
  await renderDashboard(id);

  // -----------------------------------------
  // ⭐ PULSEBAND UI RESTORE (NO LOOPS)
// -----------------------------------------
  if (!window.__pulsebandListenersAttached) {
    window.__pulsebandListenersAttached = true;

    // Restore PulseBand UI on load
    window.addEventListener("load", () => {
      const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
      window.isIdle = !!inactiveFlag;
    });

    // Mini badge toggle
    const miniBadge = document.getElementById("pb-mini-badge");
    if (miniBadge) {
      miniBadge.addEventListener("click", () => {
        const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
        const disabled = inactiveFlag && window.isIdle;

        if (disabled) {
          localStorage.removeItem("pulseband_disabled");
          window.isIdle = false;
        } else {
          localStorage.setItem("pulseband_disabled", "1");
          window.isIdle = true;
        }
      });
    }
  }

  mark("DASHBOARD DOM END", true);
})();


  </script>
</body>
</html>
