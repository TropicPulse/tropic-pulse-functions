<style>

  body {
      margin: 0;
      padding: 0;
      background: #000;
      background-image: url('https://www.tropicpulse.bz/Mysterious.png?v4');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }
    
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65); /* increase to 0.75 or 0.85 for deeper darkness */
      pointer-events: none;
      z-index: -1;
    }

  #qr-wrapper {
    position: relative;
    margin: 1px auto 6px auto;
    padding: 20px;
    background: #000;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.15);
  }

  #close-area {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }

  #close-btn {
    position: absolute;
    top: -50px;
    right: 0;
    font-size: 32px;
    color: white;
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="close-area"></div>

<div id="qr-wrapper">
  <div id="close-btn">✕</div>
  <div id="qr"></div>
</div>

<script>
  window.onerror = function (msg, src, line, col, err) {
    const div = document.createElement("div");
    div.style.position = "fixed";
    div.style.bottom = "0";
    div.style.left = "0";
    div.style.right = "0";
    div.style.background = "rgba(255,0,0,0.85)";
    div.style.color = "white";
    div.style.padding = "10px";
    div.style.fontSize = "14px";
    div.style.zIndex = "999999";
    div.style.whiteSpace = "pre-wrap";
    div.textContent = `🔥 JS ERROR:\n${msg}\n${src}:${line}:${col}`;
    document.body.appendChild(div);
  };
  (function () {
  const logBox = document.createElement("div");
  logBox.style.position = "fixed";
  logBox.style.top = "0";
  logBox.style.left = "0";
  logBox.style.right = "0";
  logBox.style.maxHeight = "40vh";
  logBox.style.overflowY = "auto";
  logBox.style.background = "rgba(0,0,0,0.75)";
  logBox.style.color = "lime";
  logBox.style.fontSize = "12px";
  logBox.style.padding = "6px";
  logBox.style.zIndex = "999999";
  logBox.style.whiteSpace = "pre-wrap";
  document.body.appendChild(logBox);

  const oldLog = console.log;
  console.log = function (...args) {
    oldLog.apply(console, args);
    logBox.textContent += args.join(" ") + "\n";
  };
})();
console.log("🌞 Script loaded, attaching visibility listener…");
  // --- SIMPLE IDENTITY CHECK ---
  let identityCheck = null;
  try {
    identityCheck = JSON.parse(localStorage.getItem("tp_identity_v4") || "null");
  } catch {
    identityCheck = null;
  }

  if (!identityCheck || !identityCheck.uid) {
    // Clear all Tropic Pulse keys
    Object.keys(localStorage).forEach(k => {
      if (
        k.startsWith("tp_") ||
        k.includes("vault") ||
        k.includes("pulse")
      ) {
        localStorage.removeItem(k);
      }
    });

    const returnTo = encodeURIComponent("https://www.tropicpulse.bz/PulsePoints.html");
    window.location.replace(`https://www.tropicpulse.bz/CheckEmail.html?returnTo=${returnTo}`);
    throw new Error("No identity — redirecting to CheckEmail");
  }
  // --- END SIMPLE IDENTITY CHECK ---


  const params = new URLSearchParams(location.search);
  const code = params.get("code");

  new QRCode(document.getElementById("qr"), {
    text: code,
    width: 260,
    height: 260,
    correctLevel: QRCode.CorrectLevel.H
  });

  document.getElementById("close-area").onclick = () => {
    parent.postMessage({ action: "closeQRView" }, "*");
  };

  document.getElementById("close-btn").onclick = () => {
    parent.postMessage({ action: "closeQRView" }, "*");
  };
</script>

</body>
</html>
