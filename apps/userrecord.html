try {

// ---------------------------------------------
// DOM ELEMENTS
// ---------------------------------------------
const img = document.getElementById("profilePhoto");

const verifyEmailBtn = document.getElementById("verifyEmailBtn");
const saveBtn = document.getElementById("saveBtn");
const changeBtn = document.getElementById("changePhotoBtn");
const photoInput = document.getElementById("photoInput");

// ---------------------------------------------
// SAVE PROFILE
// ---------------------------------------------
saveBtn.onclick = async () => {
  const ok = await updateUserRecordFromUI();
  if (ok) {
    showMessage("Profile updated!", "success");

    // Update identity locally
    identity.displayName = payload.displayName;
    localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

    formIsDirty = false;
  }
};

// ---------------------------------------------
// EMAIL CHANGE HANDLER
// ---------------------------------------------
emailInput.addEventListener("input", () => {
  const newEmail = emailInput.value.trim().toLowerCase();

  if (identity && newEmail !== identity.email.toLowerCase()) {
    verifyEmailBtn.style.display = "inline-block";
    saveBtn.disabled = true;
    saveBtn.classList.add("disabled");
  } else {
    verifyEmailBtn.style.display = "none";
    saveBtn.disabled = false;
    saveBtn.classList.remove("disabled");
  }
});

// ---------------------------------------------
// SEND EMAIL VERIFICATION PIN
// ---------------------------------------------
verifyEmailBtn.onclick = async () => {
  const newEmail = emailInput.value.trim().toLowerCase();

  try {
    const data = await getHook({
      type: "sendPin",
      email: newEmail,
      uid: identity.uid,
      purpose: "emailChange"
    });

    if (data.success) {
      document.getElementById("emailPinContainer").style.display = "block";
      showMessage("A verification code has been sent to " + newEmail, "success");
    } else {
      showMessage(data.error || "Unable to send verification PIN.", "error");
    }

  } catch (err) {
    showMessage("Unable to send verification PIN.", "error");
  }
};
// ---------------------------------------------
// PHOTO UPLOAD
// ---------------------------------------------
changeBtn.onclick = () => photoInput.click();
photoInput.onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];

    let data;
    try {
      // 1️⃣ Send to backend through Router → Endpoint → Backend
      data = await callHelper("uploadProfilePhoto", {
        uid: identity.uid,
        image: base64
      });
    } catch (err) {
      showMessage("Unable to upload photo.", "error");
      return;
    }

    // 2️⃣ Backend response
    if (!data?.success || !data?.photoURL) {
      showMessage("Photo upload failed.", "error");
      return;
    }

    // 3️⃣ Update UI
    img.style.display = "none";

    img.onload = () => {
      img.style.display = "block";
    };

    img.onerror = () => {
      img.src = "https://www.tropicpulse.bz/Frustrated.png";
      img.style.display = "block";
    };

    img.src = data.photoURL;

    // 4️⃣ Update identity
    identity.photoURL = data.photoURL;
    localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

    showMessage("Profile photo updated!", "success");
  };

  reader.readAsDataURL(file);
};
// ---------------------------------------------
// REDEEM PULSE POINTS
// ---------------------------------------------
const redeemBtn = document.getElementById("redeemPulseBtn");
const confirmInline = document.getElementById("redeemConfirmInline");
const redeemYes = document.getElementById("redeemYesBtn");
const redeemNo = document.getElementById("redeemNoBtn");

redeemBtn.onclick = () => {
  const points = identity.pointsBalance ?? 0;

  if (points < 500) {
    showMessage("You need at least 500 points to redeem.", "error");
    return;
  }

  redeemBtn.style.display = "none";
  confirmInline.style.display = "flex";
  saveBtn.disabled = true;
  saveBtn.classList.add("disabled");
};

redeemNo.onclick = () => {
  confirmInline.style.display = "none";
  redeemBtn.style.display = "inline-block";
  saveBtn.disabled = false;
  saveBtn.classList.remove("disabled");
};

redeemYes.onclick = async () => {
  const points = identity.pointsBalance;
  const token = localStorage.getItem("tp_token_v4");

  try {
    const data = await getHook({
      type: "redeemPulsePoints",
      token,
      uid: identity.uid,
      email: identity.email,
      pointsToRedeem: points
    });

    if (!data?.success) {
      showMessage(data?.message || data?.error || "Error submitting redemption request.", "error");
      confirmInline.style.display = "none";
      redeemBtn.style.display = "inline-block";
      saveBtn.disabled = false;
      saveBtn.classList.remove("disabled");
      return;
    }

    // SUCCESS
    identity.pointsBalance = data.pointsBalance;
    localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

    showMessage("Redemption request submitted! Wallet will update within 24-48 hours.", "success");

  } catch (err) {
    console.error(err);
    showMessage("Network error submitting redemption request.", "error");
  }

  confirmInline.style.display = "none";
  redeemBtn.style.display = "inline-block";
  saveBtn.disabled = false;
  saveBtn.classList.remove("disabled");
};

document.getElementById("checkDisplayNameBtn").onclick = async () => {
  const input = document.getElementById("displayNameInput");
  const status = document.getElementById("displayNameStatus");

  let raw = input.value.trim();

  // 1️⃣ If empty → ask backend to generate a brand new name
  if (!raw) {
    const data = await getHook({
      type: "checkDisplayName",
      generate: true
    });

    input.value = data.generated;
    status.className = "msg success show";
    status.textContent = "A New Display Name was Created!";
    return;
  }

  // 2️⃣ Sanitize user input
  const clean = sanitizeDisplayName(raw);
  input.value = clean;

  // 3️⃣ Check availability
  const data = await getHook({
    type: "checkDisplayName",
    name: clean
  });

  status.style.display = "block";

  if (data.available) {
    status.className = "msg success show";
    status.textContent = "Display Name is Available!";
    return;
  }

  // 4️⃣ If taken → ask backend to generate the next available version
  const data2 = await getHook({
    type: "checkDisplayName",
    base: clean
  });

  input.value = data2.suggested;
  status.className = "msg error show";
  status.textContent = "That Name was Taken — Try This One!";
};

document.getElementById("submitEmailPinBtn").onclick = async () => {
  const newEmail = emailInput.value.trim().toLowerCase();
  const pin = document.getElementById("emailPinInput").value.trim();
  const saveBtn = document.getElementById("saveBtn");

  try {
    const data = await getHook({
      type: "verifyPin",
      email: newEmail,
      pin,
      uid: identity.uid,
      purpose: "emailChange"
    });

    if (data.success) {
      identity.email = newEmail;
      localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

      verifyEmailBtn.style.display = "none";
      document.getElementById("emailPinContainer").style.display = "none";
      saveBtn.disabled = false;
      saveBtn.classList.remove("disabled");

      showMessage("Email Verified and Updated!", "success");
    } else {
      showMessage(data.error || "Invalid PIN.", "error");
    }

  } catch (err) {
    showMessage("Network error verifying PIN.", "error");
  }
};

const msg = document.getElementById("msg");

function showMessage(text, type = "error") {
  const msg = document.getElementById("msg");
  msg.textContent = text;
  msg.className = "msg " + type;
  msg.style.display = "block";

  // pulse animation
  msg.classList.add("show");
  setTimeout(() => msg.classList.remove("show"), 300);

  // smooth scroll
  msg.scrollIntoView({ behavior: "smooth", block: "center" });

  // auto-hide
  setTimeout(() => {
    msg.style.display = "none";
  }, 4000);
}

function safeLogout() {
  localStorage.removeItem("tp_token_v4");
  localStorage.removeItem("tp_device_token_v4");
  mark("SAFE LOGOUT");
}

async function hardLogout(reason) {
  try {
    mark("HARD LOGOUT: " + (reason || "unknown"));
    localStorage.removeItem("tp_token_v4");
    localStorage.removeItem("tp_device_token_v4");
    await reportDanger(reason || "hardLogout");
  } catch (err) {
    mark("HARD LOGOUT ERROR: " + err);
    localStorage.removeItem("tp_token_v4");
    localStorage.removeItem("tp_device_token_v4");
  } finally {
    window.location.replace("/CheckEmail.html");
  }
}

function mark(label) {
  const now = nowMs();
  console.log(`${label}: +${(now - lastTime).toFixed(1)}ms`);
  lastTime = now;
}

// ---------------------------------------------
// CLEAN SESSIONCHECK (NO CACHE/HEARTBEAT JUNK)
// ---------------------------------------------
async function sessionCheck() {
  mark("sessionCheck");

  // -----------------------------------------
  // 1. LOAD LOCAL VARIABLES
  // -----------------------------------------
  autologin = localStorage.getItem("tp_stay_signed_v4") === "1";
  trusted   = localStorage.getItem("tp_device_token_v4") === "1";

  try {
    identity = JSON.parse(localStorage.getItem("tp_identity_v4") || "{}");
  } catch {
    identity = null;
  }

  token     = localStorage.getItem("tp_token_v4");
  userID    = identity?.uid   || null;
  userEmail = identity?.email || null;
  userName  = identity?.displayName || null;

  // -----------------------------------------
  // 2. IDENTITY + TOKEN MUST EXIST
  // -----------------------------------------
  if (!identity || !userID || !token) {
    mark("Missing identity or token → HARD LOGOUT");
    hardLogout("missing_identity_or_token");
    return false;
  }

  // -----------------------------------------
  // 3. LOCAL INACTIVITY CHECK
  // -----------------------------------------
  const now       = nowMs();
  const lastLocal = Number(localStorage.getItem("tp_last_active_v4")) || 0;
  const diff      = now - lastLocal;

  const inactive15 = diff > 15 * 60 * 1000; // > 15 minutes

  if (inactive15 && !trusted) {
    if (!autologin) {
      mark("Inactive >15 min AND not autologin/trusted → HARD LOGOUT");
      hardLogout("inactive_and_not_remembered");
    } else {
      mark("Inactive >15 min AND autologin → SOFT LOGOUT");
      safeLogout();
    }
    return false;
  }

  // -----------------------------------------
  // 4. BACKEND AUTH REFRESH (THE ONLY REAL STEP)
  // -----------------------------------------
  const data = await getAuth(token);

  if (data.hardLogout) {
    mark("Backend flagged danger → HARD LOGOUT");
    hardLogout("backend_danger_flag");
    return false;
  }

  if (!data.identity) {
    mark("Backend returned no identity → HARD LOGOUT");
    hardLogout("missing_identity_from_backend");
    return false;
  }

  // Update JWT lineage if provided
  if (data.newJwtToken) {
    token = data.newJwtToken;
    localStorage.setItem("tp_token_v4", token);
    mark("Updated JWT lineage from backend");
  }

  // Update identity cache
  identity = data.identity;
  localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

  // -----------------------------------------
  // 5. UPDATE LAST ACTIVE
  // -----------------------------------------
  localStorage.setItem("tp_last_active_v4", now);

  return true;
}

window.attemptStripeRedirect = function (url) {
  // If redirecting to Stripe, ALWAYS allow it
  if (url.includes("stripe.com") || url.includes("connect.stripe.com")) {
    window.location.href = url;
    return;
  }

  // Otherwise use the confirmation row
  if (!formIsDirty) {
    window.location.href = url;
    return;
  }

  const row = document.getElementById("leaveConfirmRow");
  row.style.display = "flex";

  document.getElementById("leaveYesBtn").onclick = () => {
    row.style.display = "none";
    window.location.href = url;
  };

  document.getElementById("leaveNoBtn").onclick = () => {
    row.style.display = "none";
  };
};

// -----------------------------------------------------
// PHONE NORMALIZER
// -----------------------------------------------------
function normalizePhone(raw, row, coords = {}) {
  if (!raw) return null;

  // Clean weird whitespace + NBSP
  let v = String(raw)
    .replace(/\u00A0/g, " ")
    .trim();

  // Strip everything except digits and +
  v = v.replace(/[^\d+]/g, "");

  // Already valid E.164
  if (v.startsWith("+") && v.length >= 8 && v.length <= 15) {
    return v;
  }

  // Remove leading +
  if (v.startsWith("+")) v = v.slice(1);

  // Pure digits
  const digits = v.replace(/\D/g, "");

  // --- BELIZE LOGIC ---
  // 7‑digit local numbers → +501
  if (digits.length === 7) {
    return "+501" + digits;
  }

  // 501 + 7 digits → +501xxxxxxx
  if (digits.startsWith("501") && digits.length === 10) {
    return "+501" + digits.slice(3);
  }

  // --- US / CANADA ---
  if (digits.length === 10) {
    return "+1" + digits;
  }

  if (digits.length === 11 && digits.startsWith("1")) {
    return "+1" + digits.slice(1);
  }

  // --- INTERNATIONAL FALLBACK ---
  if (digits.length >= 8 && digits.length <= 15) {
    return "+" + digits;
  }

  // Reject everything else
  return null;
}

function isDesktop() {
  const ua = navigator.userAgent.toLowerCase();

  const mobileUA =
    ua.includes("iphone") ||
    ua.includes("android") ||
    ua.includes("ipad") ||
    ua.includes("mobile");

  const smallScreen = window.innerWidth < 900 || window.innerHeight < 700;
  const touch = navigator.maxTouchPoints > 1;

  // If UA says mobile AND screen is small AND touch exists → it's mobile
  if (mobileUA && smallScreen && touch) return false;

  // Otherwise → desktop
  return true;
}

  function sanitizeDisplayName(name) {
    if (!name) return "";

    // Convert middle dot to bullet dot (normalize everything)
    name = name.replace(/·/g, "•");

    // Allow letters, numbers, spaces, hyphens, underscores, and the bullet dot
    name = name.replace(/[^\p{L}\p{N}\s\-_•]/gu, "");

    // Convert spaces, hyphens, underscores → bullet dot
    name = name.replace(/[\s\-_]+/g, "•");

    // Collapse multiple dots
    name = name.replace(/•+/g, "•");

    // Trim dots from start/end
    name = name.replace(/^•|•$/g, "");

    // Capitalize each segment
    name = name
      .split("•")
      .map(w => w.charAt(0).toUpperCase() + w.slice(1))
      .join("•");

    return name;
  }

async function updateUserRecordFromUI() {
  try {
    mark("USER: UPDATE FROM UI");

    // -----------------------------------------
    // 1️⃣ Extract + normalize UI fields
    // -----------------------------------------
    const rawName        = document.getElementById("fullName").value.trim();
    const rawDisplayName = document.getElementById("displayNameInput").value.trim();
    const rawEmail       = document.getElementById("email").value.trim().toLowerCase();
    const rawPhone       = document.getElementById("phone").value.trim();
    const country        = document.getElementById("country").value;
    const role           = document.getElementById("role").value;

    const smsOpt   = document.getElementById("smsOpt").checked;
    const emailOpt = document.getElementById("emailOpt").checked;

    const cleanDisplayName = sanitizeDisplayName(rawDisplayName);
    const normalizedPhone  = normalizePhone(rawPhone, country);

    const token = localStorage.getItem("tp_token_v4");

    if (!token || !identity?.uid) {
      showMessage("Missing identity or token.", "error");
      return false;
    }

    // -----------------------------------------
    // 2️⃣ Send update request through Router → Backend
    // -----------------------------------------
    const data = await getHook({
      type: "updateUserRecord",
      token,
      uid: identity.uid,
      payload: {
        name: rawName,
        displayName: cleanDisplayName,
        email: rawEmail,
        phone: normalizedPhone,
        country,
        role,
        receiveSMS: smsOpt,
        receiveMassEmails: emailOpt,
        photoURL: identity.photoURL || ""
      }
    });

    // -----------------------------------------
    // 3️⃣ Handle backend response
    // -----------------------------------------
    if (!data?.success) {
      showMessage(data?.message || data?.error || "Unable to update profile.", "error");
      return false;
    }

    // -----------------------------------------
    // 4️⃣ Update local identity snapshot
    // -----------------------------------------
    identity = {
      ...identity,
      ...data.identity, // backend-normalized fields
      name: rawName,
      displayName: cleanDisplayName,
      email: rawEmail,
      phone: normalizedPhone,
      country,
      role
    };

    localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

    mark("USER: UPDATE COMPLETE");
    showMessage("Profile updated!", "success");
    return true;

  } catch (err) {
    console.error("updateUserRecordFromUI error:", err);
    showMessage("Unable to update profile.", "error");
    return false;
  }
}
