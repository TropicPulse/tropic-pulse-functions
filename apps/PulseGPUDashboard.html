<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Pulse GPU Dashboard — Render & Compute Control Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
/* GLOBAL */
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: radial-gradient(circle at top, #020617 0, #020617 40%, #000 100%);
    color: #e5e7eb;
}

/* HEADER */
header {
    backdrop-filter: blur(14px);
    background: linear-gradient(90deg, rgba(15,23,42,0.95), rgba(15,23,42,0.7));
    border-bottom: 1px solid rgba(148,163,184,0.4);
    padding: 18px 28px 12px 28px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    position: sticky;
    top: 0;
    z-index: 20;
}

.header-main {
    display: flex;
    align-items: center;
    gap: 18px;
}

header img {
    height: 52px;
    filter: drop-shadow(0 0 10px rgba(147,51,234,0.9));
}

h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: #f9fafb;
    text-shadow: 0 0 12px rgba(147,51,234,0.7);
}

/* PIPELINE BANNER */
.pipeline-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(148,163,184,0.5);
    background: radial-gradient(circle at left, rgba(52,211,153,0.18), rgba(15,23,42,0.95));
    color: #d1fae5;
}

.pipeline-banner.warning {
    background: radial-gradient(circle at left, rgba(234,179,8,0.18), rgba(15,23,42,0.95));
    color: #fef9c3;
    border-color: rgba(234,179,8,0.7);
}

.pipeline-banner.error {
    background: radial-gradient(circle at left, rgba(239,68,68,0.18), rgba(15,23,42,0.95));
    color: #fee2e2;
    border-color: rgba(239,68,68,0.7);
}

.pipeline-label {
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 11px;
}

.pipeline-status-text {
    opacity: 0.9;
}

/* LAYOUT */
.container {
    padding: 26px;
    max-width: 1320px;
    margin: 0 auto;
}

/* CONTROLS */
.controls {
    margin-bottom: 24px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
}

button {
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: white;
    border: none;
    padding: 11px 20px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 6px 18px rgba(236,72,153,0.6);
    transition: 0.2s ease;
}

button:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 26px rgba(236,72,153,0.8);
}

input[type="file"] {
    padding: 9px 12px;
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(148,163,184,0.6);
    border-radius: 999px;
    color: #e5e7eb;
    font-size: 13px;
}

/* SUMMARY CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-bottom: 26px;
}

.card {
    width: 260px;
    padding: 18px 18px 16px 18px;
    border-radius: 18px;
    background: radial-gradient(circle at top left, rgba(147,51,234,0.18), rgba(15,23,42,0.96));
    backdrop-filter: blur(12px);
    box-shadow: 0 14px 32px rgba(0,0,0,0.75);
    transition: 0.25s ease;
    border: 1px solid rgba(148,163,184,0.5);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    top: -40%;
    right: -40%;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle, rgba(236,72,153,0.35), transparent 70%);
    opacity: 0.7;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 20px 40px rgba(0,0,0,0.9);
}

.card.ok { border-left: 5px solid #22c55e; }
.card.warning { border-left: 5px solid #eab308; }
.card.error { border-left: 5px solid #ef4444; }

.card h3 {
    margin: 0 0 6px 0;
    font-size: 18px;
    color: #f9fafb;
}

.card p {
    margin: 0;
    font-size: 13px;
    color: #cbd5f5;
}

/* PANELS */
.panel {
    background: radial-gradient(circle at top left, rgba(15,23,42,0.9), rgba(15,23,42,0.98));
    padding: 20px 22px;
    border-radius: 18px;
    box-shadow: 0 14px 32px rgba(0,0,0,0.8);
    border: 1px solid rgba(148,163,184,0.5);
    margin-bottom: 24px;
}

.panel h2 {
    margin-top: 0;
    font-size: 18px;
    color: #e5e7eb;
}

/* GPU GRID */
.gpu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 14px;
}

.gpu-card {
    padding: 12px 14px;
    border-radius: 14px;
    background: radial-gradient(circle at top left, rgba(76,29,149,0.7), rgba(15,23,42,0.96));
    border: 1px solid rgba(192,132,252,0.7);
    box-shadow: 0 10px 24px rgba(15,23,42,0.9);
    font-size: 13px;
}

.gpu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
}

.gpu-name {
    font-weight: 600;
}

.gpu-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid rgba(148,163,184,0.7);
}

.gpu-badge.ok { color: #22c55e; border-color: rgba(34,197,94,0.7); }
.gpu-badge.warning { color: #eab308; border-color: rgba(234,179,8,0.7); }
.gpu-badge.error { color: #ef4444; border-color: rgba(239,68,68,0.7); }

/* EVENTS / DECISIONS / TRACE reuse OS styles */
.event-item,
.decision-item {
    padding: 10px 0;
    border-bottom: 1px solid rgba(55,65,81,0.8);
    font-size: 13px;
}

.event-item:last-child,
.decision-item:last-child {
    border-bottom: none;
}

.event-type {
    font-weight: 700;
    margin-right: 8px;
    text-transform: uppercase;
}

.event-type.heal { color: #22c55e; }
.event-type.drift { color: #f97373; }
.event-type.fallback { color: #eab308; }

.decision-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.decision-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid rgba(148,163,184,0.7);
    color: #cbd5f5;
}

/* TRACE */
.trace-box {
    background: #020617;
    color: #22c55e;
    padding: 16px 18px;
    border-radius: 14px;
    font-family: "Consolas", "Fira Code", monospace;
    white-space: pre-wrap;
    max-height: 260px;
    overflow-y: auto;
    box-shadow: inset 0 0 18px rgba(0,0,0,0.9);
    border: 1px solid rgba(34,197,94,0.4);
    font-size: 12px;
}

/* DETAILS */
details {
    margin-top: 4px;
}

details summary {
    list-style: none;
    cursor: pointer;
    color: #93c5fd;
    font-size: 12px;
}

details summary::-webkit-details-marker {
    display: none;
}

details summary::before {
    content: "▸";
    display: inline-block;
    margin-right: 6px;
    font-size: 10px;
    transform: translateY(-1px);
    color: #93c5fd;
}

details[open] summary::before {
    content: "▾";
}
</style>
</head>

<body>
<header>
    <div class="header-main">
        <img src="PulseBand.png" alt="Pulse GPU Logo" />
        <h1>PULSE GPU — RENDER & COMPUTE CONTROL ROOM</h1>
    </div>
    <div id="pipelineBanner" class="pipeline-banner">
        <span class="pipeline-label">GPU PIPELINE</span>
        <span class="pipeline-status-text" id="pipelineBannerText">
            Awaiting GPU snapshot…
        </span>
    </div>
</header>

<div class="container">

    <div class="controls">
        <input type="file" id="gpuSnapshotFile" accept="application/json" />
        <button onclick="loadGpuSnapshot()">Load Pulse GPU Snapshot</button>

        <!-- ⭐ Saved Snapshots Dropdown -->
        <select id="savedSnapshots" style="margin-left:10px;"></select>
        <button onclick="loadSavedSnapshot()">Load Saved Snapshot</button>
    </div>

    <div id="gpuSummaryCards" class="cards"></div>

    <div class="panel">
        <h2>GPU Workload & Health</h2>
        <div id="gpuGrid" class="gpu-grid"></div>
    </div>

    <div class="panel">
        <h2>GPU Events (Fallback, Drift, Heal)</h2>
        <div id="gpuEventsList"></div>
    </div>

    <div class="panel">
        <h2>GPU Decisions (Renderer, Path, Fallback)</h2>
        <div id="gpuDecisionsList"></div>
    </div>

    <div class="panel">
        <h2>GPU Trace</h2>
        <div id="gpuTraceBox" class="trace-box"></div>
    </div>

</div>

<!-- ⭐ Pulse OS Tilde Cooldown Notification -->
<div id="tildeCooldownMessage"
     style="
        display:none;
        position:fixed;
        bottom:20px;
        right:20px;
        background:rgba(15,23,42,0.9);
        color:#f9fafb;
        padding:12px 18px;
        border-radius:12px;
        border:1px solid rgba(148,163,184,0.5);
        font-size:13px;
        box-shadow:0 8px 20px rgba(0,0,0,0.6);
        z-index:9999;
     ">
</div>
<!-- Backend Connector Layer -->
<script type="module">
import { pulseband } from "./proxy/PulseBand.js";
import { identity } from "./PulseIdentity.js";
import { getAuth, getHook, getMap, callHelper, attachScanner } from "./lib/Connectors/PageScanner.js";


let gpuSnapshot = null;
let tildePressTimes = [];
let snapshotHotkeyEnabled = true;
let cooldownEndTime = 0;
// Pulse Snapshot Hotkey Config for GPU Dashboard
const CURRENT_SNAPSHOT_VAR = () => gpuSnapshot;
const RENDER_FN = (snapshot, trace) => renderGpuDashboard(snapshot, trace);

document.addEventListener("keydown", (e) => {
    if (e.key === "`") handleTildePress();
});

function handleTildePress() {
    const now = Date.now();

    // If disabled → show message
    if (!snapshotHotkeyEnabled) {
        showCooldownMessage();
        return;
    }

    // Track presses in last 2 seconds
    tildePressTimes.push(now);
    tildePressTimes = tildePressTimes.filter(t => now - t < 2000);

    // If spam detected → disable for 3 minutes
    if (tildePressTimes.length > 1) {
        snapshotHotkeyEnabled = false;
        cooldownEndTime = now + (3 * 60 * 1000);
        showCooldownMessage();
        return;
    }

    // Otherwise → capture snapshot
    saveCurrentSnapshot();
}

function showCooldownMessage() {
    const now = Date.now();
    const remaining = Math.max(0, cooldownEndTime - now);

    const seconds = Math.floor(remaining / 1000);
    const minutes = Math.floor(seconds / 60);
    const sec = seconds % 60;

    const msg = document.getElementById("tildeCooldownMessage");
    if (!msg) return;

    if (remaining <= 0) {
        snapshotHotkeyEnabled = true;
        msg.style.display = "none";
        return;
    }

    msg.style.display = "block";
    msg.innerHTML = `
        Tilde snapshot key disabled for ${minutes}m ${sec}s… done gaming 😉  
        <br>
        <a href="#" onclick="forceEnableTilde()" 
           style="color:#93c5fd;text-decoration:underline;cursor:pointer;">
           Click to re-enable now
        </a>
    `;

    setTimeout(showCooldownMessage, 1000);
}

function forceEnableTilde() {
    snapshotHotkeyEnabled = true;
    document.getElementById("tildeCooldownMessage").style.display = "none";
}

/* ---------- CORE HELPERS ---------- */

function safeArray(value) {
    if (!value) return [];
    return Array.isArray(value) ? value : [value];
}

function classifySource(raw) {
    if (!raw) return null;
    if (typeof raw === "string") return raw;
    if (typeof raw === "object") {
        return (
            raw.type ||
            raw.kind ||
            raw.mode ||
            raw.label ||
            raw.source ||
            raw.valueSource ||
            "unknown"
        );
    }
    return String(raw);
}

function formatSourceConfidence(source, confidence) {
    if (typeof source === "object" && source !== null) {
        source = source.type || source.kind || source.label || "unknown";
    }
    if (!source && confidence == null) return "";
    const src = source ? `source: ${source}` : "";
    const conf = confidence != null
        ? `confidence: ${Math.round(confidence * 100)}%`
        : "";
    return src && conf ? `${src} • ${conf}` : (src || conf);
}

function renderLineageDetails(lineage) {
    if (!Array.isArray(lineage) || !lineage.length) return "";
    const chain = lineage
        .map(x => {
            if (typeof x === "string") return x;
            if (x && typeof x === "object") {
                return x.name || x.key || x.id || JSON.stringify(x);
            }
            return String(x);
        })
        .join(" → ");
    return `
        <div><strong>Lineage:</strong></div>
        <div style="font-size:12px;color:#9ca3af;margin-left:4px;">
            <code>${chain}</code>
        </div>
    `;
}

function renderTransitionsDetails(transitions) {
    if (!Array.isArray(transitions) || !transitions.length) return "";
    const items = transitions
        .map(t => {
            if (typeof t === "string") return t;
            const time = t.time || t.t || "";
            const from = t.from ?? t.old ?? "?";
            const to = t.to ?? t.new ?? "?";
            const reason = t.reason || t.note || t.cause || "";
            return `${time} — ${from} → ${to}${reason ? ` (${reason})` : ""}`;
        })
        .join("<br/>");
    return `
        <div><strong>Transitions:</strong></div>
        <div style="font-size:12px;color:#9ca3af;margin-left:4px;">
            ${items}
        </div>
    `;
}

/* ---------- NORMALIZERS ---------- */

function normalizeGpuCore(core) {
    const source = classifySource(core.source || core.valueSource);
    const confidence =
        core.confidence != null
            ? Number(core.confidence)
            : core.signalConfidence != null
            ? Number(core.signalConfidence)
            : null;

    return {
        name: core.name || core.gpuName || "GPU",
        health: core.health || "ok",

        load: core.load ?? core.gpuLoad ?? null,
        tempC: core.tempC ?? core.temperature ?? null,
        clockMHz: core.clockMHz ?? core.clock ?? null,

        vramUsedMB: core.vramUsedMB ?? core.vramUsed ?? core.memoryUsedMB ?? null,
        vramTotalMB: core.vramTotalMB ?? core.vramTotal ?? core.memoryTotalMB ?? null,

        renderPasses: core.renderPasses ?? core.passes ?? null,
        frameTimeMs: core.frameTimeMs ?? core.frameMs ?? null,

        source,
        confidence,

        lineage: safeArray(core.lineage || core.lineageChain || core.derivedFrom),
        formula: core.formula || core.math || null,
        transitions: safeArray(
            core.transitions ||
            core.history ||
            core.transitionLog ||
            core.stateChanges
        )
    };
}

function normalizeGpuEvent(ev) {
    const source = classifySource(ev.source || ev.valueSource);
    const confidence =
        ev.confidence != null
            ? Number(ev.confidence)
            : ev.signalConfidence != null
            ? Number(ev.signalConfidence)
            : null;

    return {
        type: ev.type || ev.eventType || "fallback",
        subsystem: ev.subsystem || ev.system || "GPU",
        time: ev.time || ev.timestamp || ev.t || "unknown time",
        description: ev.description || ev.msg || ev.message || "",
        decision: ev.decision || ev.action || null,
        reason: ev.reason || ev.cause || null,
        source,
        confidence,
        lineage: safeArray(ev.lineage || ev.lineageChain || ev.derivedFrom),
        formula: ev.formula || ev.math || null,
        transitions: safeArray(
            ev.transitions ||
            ev.history ||
            ev.transitionLog ||
            ev.stateChanges
        )
    };
}

function normalizeGpuDecision(d) {
    const source = classifySource(d.source || d.valueSource);
    const confidence =
        d.confidence != null
            ? Number(d.confidence)
            : d.signalConfidence != null
            ? Number(d.signalConfidence)
            : null;

    const inputs = d.inputs || d.vars || d.parameters || {};

    return {
        subsystem: d.subsystem || d.system || "GPU",
        time: d.time || d.timestamp || d.t || "unknown time",
        decision: d.decision || d.action || "unknown decision",
        formula: d.formula || d.math || null,
        inputs,
        note: d.note || d.comment || null,
        source,
        confidence,
        lineage: safeArray(d.lineage || d.lineageChain || d.derivedFrom),
        transitions: safeArray(
            d.transitions ||
            d.history ||
            d.transitionLog ||
            d.stateChanges
        )
    };
}

/* ---------- SNAPSHOT LOADING ---------- */

async function loadGpuSnapshot() {
    const input = document.getElementById("gpuSnapshotFile");
    if (!input.files[0]) {
        alert("Please select a Pulse GPU snapshot JSON file.");
        return;
    }

    try {
        const text = await input.files[0].text();
        const json = JSON.parse(text);

        gpuSnapshot = json;

        const trace = [];
        trace.push("Pulse GPU snapshot loaded.");
        trace.push(`Version: ${gpuSnapshot.gpuVersion || gpuSnapshot.version || "unknown"}`);
        trace.push(`Snapshot time: ${gpuSnapshot.snapshotTime || "unknown"}`);

        if (gpuSnapshot.pipelineStatus) {
            trace.push(`GPU pipeline status: ${gpuSnapshot.pipelineStatus}`);
            updateGpuPipelineBanner(gpuSnapshot.pipelineStatus);
        } else {
            updateGpuPipelineBanner("unknown");
        }

        renderGpuDashboard(gpuSnapshot, trace);
    } catch (err) {
        console.error("Failed to parse GPU snapshot JSON", err);
        alert("Failed to parse GPU snapshot JSON.");
    }
}

/* ---------- SNAPSHOT SAVE / LOAD SYSTEM ---------- */

function saveCurrentSnapshot() {
    const snapshot = CURRENT_SNAPSHOT_VAR();
    if (!snapshot) {
        console.log("No snapshot loaded yet.");
        return;
    }

    const all = JSON.parse(localStorage.getItem("pulseSavedSnapshots") || "[]");

    all.push({
        time: new Date().toLocaleString(),
        data: snapshot
    });

    localStorage.setItem("pulseSavedSnapshots", JSON.stringify(all));

    refreshSnapshotDropdown();

    console.log("Snapshot saved via tilde hotkey.");
}

function refreshSnapshotDropdown() {
    const dropdown = document.getElementById("savedSnapshots");
    if (!dropdown) return;

    const all = JSON.parse(localStorage.getItem("pulseSavedSnapshots") || "[]");

    dropdown.innerHTML = all
        .map((s, i) => `<option value="${i}">${s.time}</option>`)
        .join("");
}

function loadSavedSnapshot() {
    const dropdown = document.getElementById("savedSnapshots");
    const index = dropdown.value;

    const all = JSON.parse(localStorage.getItem("pulseSavedSnapshots") || "[]");
    const snapshot = all[index].data;

    RENDER_FN(snapshot, ["Loaded saved snapshot"]);
}

function updateGpuPipelineBanner(status) {
    const banner = document.getElementById("pipelineBanner");
    const text = document.getElementById("pipelineBannerText");
    if (!banner || !text) return;

    banner.classList.remove("warning", "error");

    if (!status || status === "unknown") {
        text.textContent = "GPU pipeline status unknown";
        banner.classList.add("warning");
        return;
    }

    if (status === "ok" || status === "healthy" || status === "verified") {
        text.textContent = "GPU pipeline verified";
        return;
    }

    if (status === "warning") {
        text.textContent = "GPU pipeline warning";
        banner.classList.add("warning");
        return;
    }

    text.textContent = `GPU pipeline error: ${status}`;
    banner.classList.add("error");
}

function renderGpuDashboard(snapshot, trace) {
    renderGpuSummaryCards(snapshot);
    renderGpuCore(snapshot);
    renderGpuEvents(snapshot);
    renderGpuDecisions(snapshot);
    renderGpuTrace(trace);
}

/* ---------- SUMMARY CARDS ---------- */

function renderGpuSummaryCards(snapshot) {
    const root = document.getElementById("gpuSummaryCards");
    root.innerHTML = "";

    const core = normalizeGpuCore(snapshot.core || snapshot);
    const events = (snapshot.events || []).map(normalizeGpuEvent);
    const decisions = (snapshot.decisions || []).map(normalizeGpuDecision);

    const fallbackEvents = events.filter(e => e.type === "fallback").length;
    const driftEvents = events.filter(e => e.type === "drift").length;
    const healEvents = events.filter(e => e.type === "heal").length;

    const pipelineStatus = snapshot.pipelineStatus || "unknown";
    const pipelineSeverity =
        pipelineStatus === "ok" || pipelineStatus === "healthy" ? "ok" :
        pipelineStatus === "warning" || pipelineStatus === "unknown" ? "warning" :
        "error";

    const healthSeverity = core.health || "ok";

    const cards = [
        {
            title: "GPU Health",
            severity: healthSeverity,
            description: `Load: ${core.load != null ? Math.round(core.load * 100) + "%" : "n/a"} • Temp: ${core.tempC != null ? core.tempC + "°C" : "n/a"}`
        },
        {
            title: "GPU Pipeline",
            severity: pipelineSeverity,
            description: `Status: ${pipelineStatus}`
        },
        {
            title: "Frame & Render",
            severity: "ok",
            description: `Frame time: ${core.frameTimeMs != null ? core.frameTimeMs + " ms" : "n/a"} • Passes: ${core.renderPasses != null ? core.renderPasses : "n/a"}`
        },
        {
            title: "Events & Decisions",
            severity: events.length ? "warning" : "ok",
            description: `${events.length} events • ${healEvents} heal • ${driftEvents} drift • ${fallbackEvents} fallback • ${decisions.length} decisions`
        }
    ];

    cards.forEach(c => {
        const div = document.createElement("div");
        div.className = `card ${c.severity}`;
        div.innerHTML = `
            <h3>${c.title}</h3>
            <p>${c.description}</p>
        `;
        root.appendChild(div);
    });
}

/* ---------- GPU CORE PANEL ---------- */

function renderGpuCore(snapshot) {
    const root = document.getElementById("gpuGrid");
    root.innerHTML = "";

    const core = normalizeGpuCore(snapshot.core || snapshot);
    const severity = core.health || "ok";
    const srcConf = formatSourceConfidence(core.source, core.confidence);

    const vramText =
        core.vramUsedMB != null && core.vramTotalMB != null
            ? `${core.vramUsedMB} / ${core.vramTotalMB} MB`
            : "n/a";

    const detailsBlock =
        (core.formula || core.lineage.length || core.transitions.length)
            ? `
        <details style="margin-top:6px;font-size:12px;color:#cbd5f5;">
            <summary>Details</summary>
            ${core.formula ? `<div><strong>Formula:</strong> <code>${core.formula}</code></div>` : ""}
            ${renderLineageDetails(core.lineage)}
            ${renderTransitionsDetails(core.transitions)}
        </details>
    `
            : "";

    const div = document.createElement("div");
    div.className = "gpu-card";
    div.innerHTML = `
        <div class="gpu-header">
            <div class="gpu-name">${core.name}</div>
            <div class="gpu-badge ${severity}">
                ${severity.toUpperCase()}
            </div>
        </div>
        <div><strong>Load:</strong> ${core.load != null ? Math.round(core.load * 100) + "%" : "n/a"}</div>
        <div><strong>Temperature:</strong> ${core.tempC != null ? core.tempC + "°C" : "n/a"}</div>
        <div><strong>Clock:</strong> ${core.clockMHz != null ? core.clockMHz + " MHz" : "n/a"}</div>
        <div><strong>VRAM:</strong> ${vramText}</div>
        <div><strong>Frame time:</strong> ${core.frameTimeMs != null ? core.frameTimeMs + " ms" : "n/a"}</div>
        <div><strong>Render passes:</strong> ${core.renderPasses != null ? core.renderPasses : "n/a"}</div>
        ${
            srcConf
                ? `<div style="margin-top:4px;font-size:12px;color:#9ca3af;"><strong>Signal:</strong> ${srcConf}</div>`
                : ""
        }
        ${detailsBlock}
    `;
    root.appendChild(div);
}

/* ---------- GPU EVENTS PANEL ---------- */

function renderGpuEvents(snapshot) {
    const root = document.getElementById("gpuEventsList");
    root.innerHTML = "";

    const eventsRaw = snapshot.events || [];
    if (!eventsRaw.length) {
        root.innerHTML = `<p style="font-size:13px;color:#9ca3af;">No GPU fallback, drift, or heal events in this snapshot.</p>`;
        return;
    }

    const events = eventsRaw.map(normalizeGpuEvent);

    events.forEach(ev => {
        const typeClass =
            ev.type === "heal" ? "heal" :
            ev.type === "drift" ? "drift" :
            "fallback";

        const srcConf = formatSourceConfidence(ev.source, ev.confidence);

        const detailsBlock =
            (ev.formula || ev.lineage.length || ev.transitions.length)
                ? `
            <details style="margin-top:4px;font-size:12px;color:#cbd5f5;">
                <summary>Details</summary>
                ${ev.formula ? `<div><strong>Formula:</strong> <code>${ev.formula}</code></div>` : ""}
                ${renderLineageDetails(ev.lineage)}
                ${renderTransitionsDetails(ev.transitions)}
            </details>
        `
                : "";

        root.innerHTML += `
            <div class="event-item">
                <div>
                    <span class="event-type ${typeClass}">${ev.type.toUpperCase()}</span>
                    <strong>${ev.subsystem}</strong>
                    <span style="font-size:11px;color:#9ca3af;">@ ${ev.time}</span>
                </div>
                <div>${ev.description}</div>
                ${
                    ev.decision
                        ? `<div><strong>Decision:</strong> ${ev.decision}</div>`
                        : ""
                }
                ${
                    ev.reason
                        ? `<div><strong>Reason:</strong> ${ev.reason}</div>`
                        : ""
                }
                ${
                    srcConf
                        ? `<div style="margin-top:4px;font-size:12px;color:#9ca3af;"><strong>Signal:</strong> ${srcConf}</div>`
                        : ""
                }
                ${detailsBlock}
            </div>
        `;
    });
}

/* ---------- GPU DECISIONS PANEL ---------- */

function renderGpuDecisions(snapshot) {
    const root = document.getElementById("gpuDecisionsList");
    root.innerHTML = "";

    const decisionsRaw = snapshot.decisions || [];
    if (!decisionsRaw.length) {
        root.innerHTML = `<p style="font-size:13px;color:#9ca3af;">No GPU routing or renderer decisions in this snapshot.</p>`;
        return;
    }

    const decisions = decisionsRaw.map(normalizeGpuDecision);

    decisions.forEach(d => {
        const inputs = d.inputs || {};
        const inputsStr = Object.keys(inputs).length
            ? Object.entries(inputs)
                .map(([k, v]) => `${k}=${JSON.stringify(v)}`)
                .join(", ")
            : "none";

        const srcConf = formatSourceConfidence(d.source, d.confidence);

        const detailsBlock =
            (d.formula || d.lineage.length || d.transitions.length)
                ? `
            <details style="margin-top:4px;font-size:12px;color:#cbd5f5;">
                <summary>Details</summary>
                ${d.formula ? `<div><strong>Formula:</strong> <code>${d.formula}</code></div>` : ""}
                ${renderLineageDetails(d.lineage)}
                ${renderTransitionsDetails(d.transitions)}
            </details>
        `
                : "";

        root.innerHTML += `
            <div class="decision-item">
                <div class="decision-header">
                    <div>
                        <strong>${d.subsystem}</strong>
                        <span style="font-size:11px;color:#9ca3af;">@ ${d.time}</span>
                    </div>
                    <div class="decision-badge">${d.decision}</div>
                </div>
                <div><strong>Inputs:</strong> <code>${inputsStr}</code></div>
                ${
                    d.note
                        ? `<div><strong>Note:</strong> ${d.note}</div>`
                        : ""
                }
                ${
                    srcConf
                        ? `<div style="margin-top:4px;font-size:12px;color:#9ca3af;"><strong>Signal:</strong> ${srcConf}</div>`
                        : ""
                }
                ${detailsBlock}
            </div>
        `;
    });
}

/* ---------- GPU TRACE PANEL ---------- */

function renderGpuTrace(trace) {
    const box = document.getElementById("gpuTraceBox");
    const extra = [];

    if (gpuSnapshot) {
        if (gpuSnapshot.pipelineStatus) {
            extra.push(`GPU pipeline: ${gpuSnapshot.pipelineStatus}`);
        }
        if (gpuSnapshot.renderer) {
            extra.push(`Renderer: ${gpuSnapshot.renderer}`);
        }
        if (gpuSnapshot.profileName) {
            extra.push(`Profile: ${gpuSnapshot.profileName}`);
        }
    }

    const lines = trace.concat(extra);
    box.textContent = lines.join("\n");
}
</script>
</body>
</html>
