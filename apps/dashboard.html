function normalizeUserRecord(user = {}) {
  const clean = (v, fallback = null) => {
    if (v === undefined || v === null) return fallback;
    const s = String(v).trim();
    if (
      s === "" ||
      s.includes("{{") ||
      s.includes("add_more_field") ||
      s.includes("fieldLebal") ||
      s.includes("fieldValue") ||
      s.includes("*")
    ) return fallback;
    return s;
  };

  const normalizeBool = (v, fallback = false) => {
    if (v === undefined || v === null) return fallback;
    const s = String(v).toLowerCase().trim();
    return s === "true" || s === "1";
  };

  const normalizeNumber = (v, fallback = 0) => {
    const n = Number(v);
    return isNaN(n) ? fallback : n;
  };

  const normalizeDateMs = (value) => {
    if (!value) return null;

    if (value.toMillis) return value.toMillis();
    if (value instanceof Date) return value.getTime();

    if (typeof value === "object" && typeof value._seconds === "number") {
      return value._seconds * 1000 + Math.floor((value._nanoseconds || 0) / 1e6);
    }

    if (typeof value === "string") {
      let ms = Date.parse(value);
      if (!isNaN(ms)) return ms;

      const cleaned = value.replace(" at ", " ").replace("UTC", "GMT");
      ms = Date.parse(cleaned);
      if (!isNaN(ms)) return ms;

      return null;
    }

    if (typeof value === "number") return value > 0 ? value : null;

    return null;
  };

  // ---------------------------------------------------------
  // NON‑DESTRUCTIVE MERGE HELPERS
  // ---------------------------------------------------------
  const mergeMap = (existing = {}, incoming = {}) => {
    return { ...existing, ...incoming };
  };

  // ---------------------------------------------------------
  // REFERRAL CODE (AUTHORITATIVE IN TPIdentity ONLY)
  // ---------------------------------------------------------
  let referralCode =
    clean(user.TPIdentity?.referralCode) || // primary source
    clean(user.referralCode) ||             // legacy fallback
    null;

  if (!referralCode) {
    const base = clean(user.TPIdentity?.name || user.Name || user.name, "USER")
      .split(" ")[0]
      .toUpperCase();
    referralCode = `${base}-${Math.random().toString(36).substring(2, 6).toUpperCase()}`;
  }

  // ---------------------------------------------------------
  // BUILD NON‑DESTRUCTIVE NORMALIZED PATCH
  // ---------------------------------------------------------
  const patch = {
    // TOP‑LEVEL LEGACY FIELDS (SAFE)
    Name: clean(user.Name || user.name, user.Name || user.name || ""),
    Email: clean(user.Email || user.email, user.Email || user.email || ""),
    DisplayName: clean(user.DisplayName || user.displayName, user.DisplayName || user.displayName || ""),

    // NESTED MAP PATCHES (ONLY FILL MISSING FIELDS)
    TPIdentity: {
      name: clean(user.TPIdentity?.name || user.Name || user.name, user.TPIdentity?.name),
      displayName: clean(user.TPIdentity?.displayName || user.DisplayName || user.displayName, user.TPIdentity?.displayName),
      email: clean(user.TPIdentity?.email || user.Email || user.email, user.TPIdentity?.email),
      phone: clean(user.TPIdentity?.phone || user.Phone || user.phone, user.TPIdentity?.phone),
      country: clean(user.TPIdentity?.country || user.Country || user.country, user.TPIdentity?.country),
      role: clean(user.TPIdentity?.role || user.Role || user.role, user.TPIdentity?.role),
      photoURL: clean(
        user.TPIdentity?.photoURL ||
        user.photoURL ||
        user.PhotoURL,
        user.TPIdentity?.photoURL
      ),
      stripeAccountID: clean(
        user.TPIdentity?.stripeAccountID ||
        user.stripeAccountID ||
        user.stripeId ||
        user.stripe_account_id,
        user.TPIdentity?.stripeAccountID
      ),
      referralCode,
      createdAt: normalizeDateMs(user.TPIdentity?.createdAt || user.createdAt),
      updatedAt: normalizeDateMs(user.TPIdentity?.updatedAt || user.updatedAt)
    },

    TPLoyalty: {
      pointsBalance: normalizeNumber(user.TPLoyalty?.pointsBalance ?? user.pointsBalance ?? user.pulsepoints, user.TPLoyalty?.pointsBalance),
      lifetimePoints: normalizeNumber(user.TPLoyalty?.lifetimePoints ?? user.lifetimePoints, user.TPLoyalty?.lifetimePoints),
      streakCount: normalizeNumber(user.TPLoyalty?.streakCount ?? user.streakCount, user.TPLoyalty?.streakCount),
      streakMultiplier: normalizeNumber(user.TPLoyalty?.streakMultiplier ?? user.streakMultiplier, user.TPLoyalty?.streakMultiplier),
      lastEarnedDate: normalizeDateMs(user.TPLoyalty?.lastEarnedDate ?? user.lastEarnedDate),
      lastVaultVisit: normalizeDateMs(user.TPLoyalty?.lastVaultVisit ?? user.lastVaultVisit),
      referralCode,
      updatedAt: normalizeDateMs(user.TPLoyalty?.updatedAt ?? user.updatedAt)
    },

    TPNotifications: {
      smsOptIn: normalizeBool(user.TPNotifications?.smsOptIn ?? user.smsOptIn ?? user.receiveSMS, user.TPNotifications?.smsOptIn),
      emailOptIn: normalizeBool(user.TPNotifications?.emailOptIn ?? user.emailOptIn ?? user.receiveMassEmails, user.TPNotifications?.emailOptIn),
      freeMassNotificationsUsed: normalizeNumber(user.TPNotifications?.freeMassNotificationsUsed ?? user.freeMassNotificationsUsed, user.TPNotifications?.freeMassNotificationsUsed),
      freeMassNotificationsLimit: normalizeNumber(user.TPNotifications?.freeMassNotificationsLimit ?? user.freeMassNotificationsLimit, user.TPNotifications?.freeMassNotificationsLimit),
      paidMassNotificationCredits: normalizeNumber(user.TPNotifications?.paidMassNotificationCredits ?? user.paidMassNotificationCredits, user.TPNotifications?.paidMassNotificationCredits),
      updatedAt: normalizeDateMs(user.TPNotifications?.updatedAt ?? user.updatedAt)
    },

    TPWallet: {
      payouts: mergeMap(
        user.TPWallet?.payouts,
        {
          frequency: clean(user.TPWallet?.payouts?.frequency ?? user.payoutFrequency, user.TPWallet?.payouts?.frequency),
          day: clean(user.TPWallet?.payouts?.day ?? user.payoutDay, user.TPWallet?.payouts?.day),
          updatedAt: normalizeDateMs(user.TPWallet?.payouts?.updatedAt ?? user.updatedAt)
        }
      ),
      updatedAt: normalizeDateMs(user.TPWallet?.updatedAt ?? user.updatedAt)
    },

    TPSecurity: {
      lastActive: normalizeDateMs(user.TPSecurity?.lastActive ?? user.lastActive),
      lastVaultVisit: normalizeDateMs(user.TPSecurity?.lastVaultVisit ?? user.lastVaultVisit),
      updatedAt: normalizeDateMs(user.TPSecurity?.updatedAt ?? user.updatedAt)
    }
  };

  // ---------------------------------------------------------
  // RETURN ONLY THE PATCH (NON‑DESTRUCTIVE)
  // ---------------------------------------------------------
  return patch;
}

    function isDesktop() {
  const ua = navigator.userAgent.toLowerCase();

  const mobileUA =
    ua.includes("iphone") ||
    ua.includes("android") ||
    ua.includes("ipad") ||
    ua.includes("mobile");

  const smallScreen = window.innerWidth < 900 || window.innerHeight < 700;
  const touch = navigator.maxTouchPoints > 1;

  // If UA says mobile AND screen is small AND touch exists → it's mobile
  if (mobileUA && smallScreen && touch) return false;

  // Otherwise → desktop
  return true;
}

async function sessionCheck() {
  mark("sessionCheck");

  // -----------------------------------------
  // 1. LOAD LOCAL VARIABLES
  // -----------------------------------------
  autologin = localStorage.getItem("tp_stay_signed_v4") === "1";
  trusted   = localStorage.getItem("tp_device_token_v4") === "1";

  try {
    identity = JSON.parse(localStorage.getItem("tp_identity_v4") || "{}");
  } catch {
    identity = null;
  }

  token     = localStorage.getItem("tp_token_v4");
  userID    = identity?.uid   || null;
  userEmail = identity?.email || null;
  userName  = identity?.displayName || null;

  // -----------------------------------------
  // 2. IDENTITY + TOKEN MUST EXIST
  // -----------------------------------------
  if (!identity || !userID || !token) {
    mark("Missing identity or token → HARD LOGOUT");
    hardLogout("missing_identity_or_token");
    return false;
  }

  // -----------------------------------------
  // 3. LOCAL INACTIVITY CHECK
  // -----------------------------------------
  const now       = nowMs();
  const lastLocal = Number(localStorage.getItem("tp_last_active_v4")) || 0;
  const diff      = now - lastLocal;

  const inactive15 = diff > 15 * 60 * 1000; // > 15 minutes

  if (inactive15 && !trusted) {
    if (!autologin) {
      mark("Inactive >15 min AND not autologin/trusted → HARD LOGOUT");
      hardLogout("inactive_and_not_remembered");
    } else {
      mark("Inactive >15 min AND autologin → SOFT LOGOUT");
      safeLogout();
    }
    return false;
  }

  // -----------------------------------------
  // 4. BACKEND AUTH REFRESH (THE ONLY REAL STEP)
  // -----------------------------------------
  const data = await getAuth(token);

  if (data.hardLogout) {
    mark("Backend flagged danger → HARD LOGOUT");
    hardLogout("backend_danger_flag");
    return false;
  }

  if (!data.identity) {
    mark("Backend returned no identity → HARD LOGOUT");
    hardLogout("missing_identity_from_backend");
    return false;
  }

  // Update JWT lineage if provided
  if (data.newJwtToken) {
    token = data.newJwtToken;
    localStorage.setItem("tp_token_v4", token);
    mark("Updated JWT lineage from backend");
  }

  // Update identity cache
  identity = data.identity;
  localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

  // -----------------------------------------
  // 5. UPDATE LAST ACTIVE
  // -----------------------------------------
  localStorage.setItem("tp_last_active_v4", now);

  return true;
}
