/************************************************************
 * SESSION CHECK (ALL PAGES EXCEPT LOGIN)
 ************************************************************/
async function sessionCheck() {
  mark("sessionCheck");

  // -----------------------------------------
  // 1. LOAD LOCAL VARIABLES
  // -----------------------------------------
  autologin = localStorage.getItem("tp_stay_signed_v4") === "1";
  trusted   = localStorage.getItem("tp_device_token_v4") === "1";

  try {
    identity = JSON.parse(localStorage.getItem("tp_identity_v4") || "{}");
  } catch {
    identity = null;
  }

  token     = localStorage.getItem("tp_token_v4");
  userID    = identity?.uid   || null;
  userEmail = identity?.email || null;
  userName  = identity?.displayName || null;

  // -----------------------------------------
  // 2. IDENTITY + TOKEN MUST EXIST
  // -----------------------------------------
  if (!identity || !userID || !token) {
    mark("Missing identity or token → HARD LOGOUT");
    hardLogout("missing_identity_or_token");
    return false;
  }

  // -----------------------------------------
  // 3. LOCAL INACTIVITY CHECK
  // -----------------------------------------
  const now       = nowMs();
  const lastLocal = Number(localStorage.getItem("tp_last_active_v4")) || 0;
  const diff      = now - lastLocal;

  const inactive15 = diff > 15 * 60 * 1000; // > 15 minutes

  if (inactive15 && !trusted) {
    if (!autologin) {
      mark("Inactive >15 min AND not autologin/trusted → HARD LOGOUT");
      hardLogout("inactive_and_not_remembered");
    } else {
      mark("Inactive >15 min AND autologin → SOFT LOGOUT");
      safeLogout();
    }
    return false;
  }

  // -----------------------------------------
  // 4. BACKEND AUTH REFRESH (THE ONLY REAL STEP)
  // -----------------------------------------
  const data = await getAuth(token);

  if (data.hardLogout) {
    mark("Backend flagged danger → HARD LOGOUT");
    hardLogout("backend_danger_flag");
    return false;
  }

  if (!data.identity) {
    mark("Backend returned no identity → HARD LOGOUT");
    hardLogout("missing_identity_from_backend");
    return false;
  }

  // Update JWT lineage if provided
  if (data.newJwtToken) {
    token = data.newJwtToken;
    localStorage.setItem("tp_token_v4", token);
    mark("Updated JWT lineage from backend");
  }

  // Update identity cache
  identity = data.identity;
  localStorage.setItem("tp_identity_v4", JSON.stringify(identity));

  // -----------------------------------------
  // 5. UPDATE LAST ACTIVE
  // -----------------------------------------
  localStorage.setItem("tp_last_active_v4", now);

  return true;
}

        ],
        adj: [

        ]
      }
    };

    const alias = {
      "damn": "word_d",
      "darn": "word_d",

      // profanity categories mapped safely:
      "fuck": "word_f",

    function detectPOS(words, index) {
      const prev = words[index - 1]?.toLowerCase();
      const next = words[index + 1]?.toLowerCase();

      if (prev && ["a","an","the","my","your","his","her","this","that"].includes(prev)) {
        return "adj";
      }
      if (prev && ["i","you","we","they","he","she","it"].includes(prev)) {
        return "verb";
      }
      return "noun";

      const stripped = lower.replace(/[.,!?]/g, "");
      const key = alias[stripped];
      
      if (!key) return word;

      const pos = detectPOS(words, i);
      const options = dictionary[key][pos] || dictionary[key].noun;
      const replacement = options[Math.floor(Math.random() * options.length)];

      if (word[0] === word[0].toUpperCase()) {
        return replacement.charAt(0).toUpperCase() + replacement.slice(1);
      }

      return replacement;
    });

    return cleaned.join("");
  }

  function sanitizeTitle(str) {
    const cleaned = str.trim().replace(/[<>]/g, "");

    // Allow letters, numbers, spaces, and approved icons
    const pattern = new RegExp(
      `^[A-Za-z0-9\\s${allowedIcons.join("")}]{1,80}$`
    );

    if (!pattern.test(cleaned)) return null;

    return cleaned;
  }

  
  function showFloatingCategoryIcon(catKey) {
    const icon = eventCategoryIconMap[catKey];
    if (!icon) return;

    const bubble = document.getElementById("floatingCategoryBubble");

    // Set icon
    document.getElementById("floatingCategoryIcon").src = icon;

    // 🌴 Everything EXCEPT businesses/events = platinum
    if (catKey === "businesses" || catKey === "events") {
      bubble.classList.remove("platinum");   // keep tropical
    } else {
      bubble.classList.add("platinum");      // platinum for all others
    }

    bubble.classList.remove("hidden");
  }

  function sanitizeLanguage(input) {
    const cleaned = input.trim();

    // Allow letters, spaces, hyphens only
    if (!/^[A-Za-z\s\-]{2,30}$/.test(cleaned)) {
      return null;
    }

    // Capitalize first letter
    return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
  }

  /* -----------------------------
     UPLOAD IMAGES (NO AUTH REQUIRED)
  ----------------------------- */
  async function uploadNewImages(files) {
    const urls = [];

    for (const file of files) {
      const storageRef = ref(storage, `events/${crypto.randomUUID()}-${file.name}`);

      await uploadBytes(storageRef, file, {
        contentType: file.type,
        cacheControl: "public, max-age=31536000, immutable"
      });

      const url = await getDownloadURL(storageRef);
      urls.push(url);
    }

    return urls;
  }


/* -------------------------------------------------
   MAP OVERLAY HANDLER — GUARDED
-------------------------------------------------- */
function attachMapOverlayHandler(name, iconUrl = null) {
  const mapImage = document.getElementById("mapImage");

  if (!mapImage) {
    console.warn("❌ No #mapImage found — overlay cannot attach");
    return;
  }

  if (mapImage.complete) {
    applyTropicOverlay(name, iconUrl);
    return;
  }

  mapImage.onload = () => {
    applyTropicOverlay(name, iconUrl);
  };
}

// Global timeout holder for overlay resize
let __tp_overlay_resize_timeout = null;

function applyTropicOverlay(name, iconUrl = null) {
  const overlay   = document.getElementById("tpOverlay");
  const dot       = document.getElementById("tpDot");
  const label     = document.getElementById("tpLabel");
  const labelText = document.getElementById("tpLabelText");
  const icon      = document.getElementById("tpIcon");
  const mapImg    = document.getElementById("mapImage");

  if (!overlay || !dot || !label || !mapImg || !labelText) {
    console.warn("❌ Missing overlay elements — cannot apply overlay");
    return;
  }

  const rect = mapImg.getBoundingClientRect();
  const cx = rect.width / 2;
  const cy = rect.height / 2;

  dot.style.left = `${cx - 9}px`;
  dot.style.top  = `${cy - 9}px`;

  labelText.textContent = name || "Location";
  label.style.left = `${cx}px`;
  label.style.top  = `${cy - 22}px`;

  if (iconUrl) {
    icon.src = iconUrl;
    icon.style.display = "block";
  } else {
    icon.style.display = "none";
  }

  overlay.style.display = "block";

  // 🔒 Global guard for resize listener
  if (!window.__tp_overlay_resize_bound) {
    window.__tp_overlay_resize_bound = true;

    window.addEventListener("resize", () => {
      clearTimeout(__tp_overlay_resize_timeout);
      __tp_overlay_resize_timeout = setTimeout(() => {
        applyTropicOverlay(labelText.textContent, icon.src || null);
      }, 150);
    });
  }
}

(async () => {
    function mark(label, position = false) {
      const now = nowMs();
      if (position) {
        console.log(`${label}: +${(now - firstTime).toFixed(1)}ms`);
      } else {
        console.log(`${label}: +${(now - lastTime).toFixed(1)}ms`);
      }
      lastTime = now;
    }
    mark("EVENT DOM STARTS");
    
    await sessionCheck();

    mark("EVENT LOCATION READY");
    
    await loadEvent();
    mark("EVENT LOADED");
  
    initiateEvent();
    mark("EVENT OVERLAYS LOADED");
    // -----------------------------
  // LIVE PULSEBAND UPDATE LOOP
  // -----------------------------
  setInterval(async () => {
    const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
    const disabled = (window.isIdle === true && inactiveFlag === true);
    if (disabled) return;

    const status = pulseband.getStatus();
    const data = await window.getPulseBandRate();

    pulseband.setStatus({
      ...status,
      ...data,
      lastSyncTimestamp: nowMs(),
      lastSyncSeconds: 0
    });
  }, 3000);

  // -----------------------------
  // LAST SYNC COUNTER LOOP
  // -----------------------------
  setInterval(() => {
    const inactiveFlag = localStorage.getItem("pulseband_disabled") === "1";
    const disabled = (window.isIdle === true && inactiveFlag === true);

    const status = pulseband.getStatus();
    const ts = getSafeTimestamp(status);
    const seconds = safeSeconds((nowMs() - ts) / 1000);

    pulseband.setStatus({
      ...status,
      lastSyncTimestamp: ts,
      lastSyncSeconds: seconds
    });
  }, 1000);
    hideTPLoader();
    mark("EVENT DOM ENDS", true);
  })();
