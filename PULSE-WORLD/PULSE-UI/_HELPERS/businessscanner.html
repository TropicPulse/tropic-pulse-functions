  <button id="run">Run Sweep</button>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    

    const logEl = document.getElementById("log");
    const btnRun = document.getElementById("run");
    const btnStop = document.getElementById("stop");

    let STOP_REQUESTED = false;

    btnStop.onclick = () => {
      STOP_REQUESTED = true;
      log("🛑 STOP REQUESTED — finishing current batch...", "warn");
    };

    function log(msg, type = "info") {
      const c =
        type === "error" ? "#ff4444" :
        type === "warn"  ? "#ffbb33" :
                           "#00ff66";
      logEl.innerHTML += `<div style="color:${c}">${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    const SERPER_KEY = "e37be7342ffd6445f1f3785aa4b46bd116ff2a41";

    // ---------------- SERPER CATEGORY FETCH ----------------
    async function fetchCategory(query) {
      const url = "https://google.serper.dev/maps";

      log(`🌐 Fetching Serper results for: ${query}`);

      try {
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "X-API-KEY": SERPER_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ q: query })
        });

        if (!res.ok) {
          log(`❌ Serper HTTP ${res.status}`, "error");
          return null;
        }

        const json = await res.json();
        return json.places || [];

      } catch (err) {
        log(`❌ Serper error: ${err.message}`, "error");
        return null;
      }
    }

    // ---------------- MAIN SWEEP ----------------
    async function runSweep() {
      STOP_REQUESTED = false;
      btnRun.disabled = true;

      const select = document.getElementById("category");
      const selectedOption = select.options[select.selectedIndex];
      const query = selectedOption.value;

      // NEW: detect last-resort mode
      const isLastResort = selectedOption.dataset.lastresort === "true";

      log(`\n🚀 Starting sweep for: ${query}`);
      if (isLastResort) log("⚠️ Last-Resort Mode Enabled — results may be low-quality or weird", "warn");

      const places = await fetchCategory(query);
      if (!places || places.length === 0) {
        log("⚠️ No results returned from Serper.", "warn");
        btnRun.disabled = false;
        return;
      }

      log(`📦 Serper returned ${places.length} places.`);

      for (const place of places) {
        if (STOP_REQUESTED) break;

        const placeId = place.placeId;
        if (!placeId) {
          log("⚠️ Skipping item with no placeId", "warn");
          continue;
        }

        log(`\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`);
        log(`📍 Checking: ${place.title} (${placeId})`);

        // Check Businesses by placeId field (NOT doc ID)
        const match = await db.collection("Businesses")
          .where("placeId", "==", placeId)
          .get();

        if (!match.empty) {
          log("   ✔ Already in Businesses (matched by placeId) — skipping");
          continue;
        }

        // Check PendingBusinesses
        const pendingDoc = await db.collection("PendingBusinesses").doc(placeId).get();
        if (pendingDoc.exists) {
          log("   ✔ Already in PendingBusinesses — skipping");
          continue;
        }

        // Build PendingBusiness object
        const pending = {
          placeId,
          title: place.title || null,
          address: place.address || null,
          lat: place.lat || null,
          lng: place.lng || null,

          phoneNumber: place.phoneNumber || null,
          website: place.website || null,
          menu: place.menu || null,

          rating: place.rating ?? null,
          ratingCount: place.ratingCount ?? null,
          priceLevel: place.priceLevel ?? null,

          types: place.types || [],
          category: place.category || null,

          openingHours: place.openingHours || null,
          hoursText: place.hours || null,
          open_state: place.open_state || null,
          openNow: place.openNow ?? null,

          thumbnailUrl: place.thumbnailUrl || null,
          googleUrl: place.link || null,
          reviewsLink: place.reviewsLink || null,

          cid: place.cid || null,
          fid: place.fid || null,

          raw: place,

          // NEW FLAG
          isLastResort: isLastResort
        };

        log("   💾 Saving to PendingBusinesses...");
        await db.collection("PendingBusinesses").doc(placeId).set(pending);

        log("   ✅ Added to PendingBusinesses");
      }

      log("\n🎉 Sweep complete.");
      btnRun.disabled = false;
    }

    btnRun.addEventListener("click", runSweep);
  </script>
