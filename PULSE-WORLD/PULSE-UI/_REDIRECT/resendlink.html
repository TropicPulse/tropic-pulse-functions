<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tropic Pulse - Resending Link</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #fff7b3, #ffe066);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loader-container {
      text-align: center;
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
    }

    .loader-image img {
      width: 110px;
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.25));
      animation: float 2.4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="loader-container">
    <div class="loader-image">
      <img src="./_PICTURES/ToucanLogo-Mini.png?v4" alt="Tropic Pulse Logo">
    </div>
  </div>

<script type="module">
  import { VitalsLogger as PulseLogger }        from "../_BACKEND/PulseProofLogger.js";
import { VitalsMonitor as PulseVitalsMonitor } from "../_BACKEND/PulseProofMonitor.js";
import PulseUIErrors from "../_FRONTEND/PulseUIErrors-v12-EVO.js";
import { initUIFlow as PulseUIFlow } from "../_FRONTEND/PulseUIFlow-v12-EVO.js";
/* 1. SKIN REFLEX — SIDE‑EFFECT IMPORT, AUTO‑ATTACHES */
import * as PulseSkinReflex from "../_BACKEND/PulseSkinReflex.js"; // PageScannerV12 auto hooks window here
import PulseChunks from "../PulsePresence-v2.js";
/* 0. BOOT MEMBRANE — MUST BE FIRST */

// Expose PulseChunks
    window.PulseChunks = window.PulseChunks || PulseChunks;
  window.__SERVER_HAS_TOKEN__ = true;

    document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);

  // ⭐ Use displayName — the official public identity layer
  const displayName = params.get("displayName") || "Friend";

  // Server-side token presence check
  if (!window.__SERVER_HAS_TOKEN__) {
    window.location.href = "/error.html";
    return;
  }

  // Browser sends NO TOKEN — only a trigger
  fetch("/resendlink-trigger", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ request: true })
  })
  .then(() => {
    window.location.href =
      "/success.html?displayName=" +
      encodeURIComponent(displayName);
  })
  .catch(() => {
    window.location.href = "/error.html";
  });
});

  </script>

</body>
</html>
