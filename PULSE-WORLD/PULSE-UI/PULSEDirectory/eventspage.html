async function sessionCheck() {
  let id = null;

  try {
    const raw = localStorage.getItem("tp_identity_v9");
    if (raw) {
      id = JSON.parse(raw);
    }
  } catch (e) {
    // Corrupt identity → treat as missing
    id = null;
  }

  // Fallback: if some global understanding layer identity() exists,
  // we can try to hydrate from there once, but we do NOT depend on it.
  if (!id && typeof identity === "function") {
    try {
      id = await identity();
    } catch (e) {
      id = null;
    }
  }

  // No identity or not trusted → go to login
  if (!id || !id.trustedDevice) {
    const here = encodeURIComponent(location.pathname + location.search);
    window.location.href = `/CheckEmail.html?returnTo=${here}`;
    return null;
  }

  // Expose canonical identity for the rest of the page
  window.PulseIdentity = id;
  return id;
}

  function normalizePriceSymbol(symbol) {
    if (!symbol) return "";

  function saveLocation(lat, lng) {

  function getSavedLocation() {

      return obj;
    } catch {
      return null;
    }
  }

  function fetchLowAccuracyInBackground(onUpdate) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        log("Background low accuracy:", loc);
        saveLocation(loc.lat, loc.lng);
        onUpdate(loc);
      },
      err => {
        warn("Background low accuracy failed:", err);

        // Retry once after 2 seconds
        setTimeout(() => {
          navigator.geolocation.getCurrentPosition(
            pos2 => {
              const loc2 = { lat: pos2.coords.latitude, lng: pos2.coords.longitude };
              log("Retry low accuracy:", loc2);
              saveLocation(loc2.lat, loc2.lng);
              onUpdate(loc2);
            },
            err2 => {
              warn("Retry low accuracy failed:", err2);
            },
            { enableHighAccuracy: false, timeout: 5000 }
          );
        }, 2000);
      },
      { enableHighAccuracy: false, timeout: 5000 }
    );
  }

  function getNextToucan() {

    emptyStateIndex = (emptyStateIndex + 1) % emptyStateImages.length;
    return img;

  async function getInstantLocationWithBackgroundUpdate(onSignificantChange) {
    const saved = getSavedLocation();

    // 1️⃣ Return cached location immediately
    if (saved) {
      log("Using cached location:", saved);
      setTimeout(() => {
        fetchLowAccuracyInBackground(newLoc => {
          const dist = getDistanceMiles(saved, newLoc);
          if (dist > 50) {
            log("📍 Significant movement:", dist, "m");
            onSignificantChange(newLoc);
          }
        });
      }, 0);
      return saved;
    }

    // 2️⃣ No saved location → try low accuracy immediately
    return new Promise(resolve => {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          log("Initial low accuracy:", loc);
          saveLocation(loc.lat, loc.lng);
          resolve(loc);

          // Background refresh
          fetchLowAccuracyInBackground(newLoc => {
            const dist = getDistanceMiles(loc, newLoc);
            if (dist > 50) onSignificantChange(newLoc);
          });
        },
        err => {
          warn("Initial low accuracy failed:", err);
          resolve(null);

          // Still try background update
          fetchLowAccuracyInBackground(newLoc => {
            onSignificantChange(newLoc);
          });
        },
        { enableHighAccuracy: false, timeout: 7000 }
      );
    });
  }

  function sortEventsByDistance(list) {
  const userLat = currentUserLocation?.lat;
  const userLng = currentUserLocation?.lng;

  if (!userLat || !userLng) {
    warn("[sortEventsByDistance] No user location → returning unsorted list");
    return list;
  }

  const withDist = list.map(evt => {
    const lat = normalizeLatLng(evt.lat);
    const lng = normalizeLatLng(evt.lng);

    return {
      ref: evt,
      dist: (lat !== null && lng !== null)
        ? getDistanceMiles(userLat, userLng, lat, lng)
        : Infinity
    };
  });

  withDist.sort((a, b) => a.dist - b.dist);

  return withDist.map(x => x.ref);
}

  
function getDistanceMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8; // Earth radius in miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) ** 2;

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}

function filterEventsByDistance(list, maxMiles) {
  if (!maxMiles) {
    return list ? sortEventsByDistance(list) : [];
  }

  if (!currentUserLocation) {
    warn("User location not available yet.");
    return [];
  }

  const userLat = currentUserLocation.lat;
  const userLng = currentUserLocation.lng;

  const filtered = list.filter(evt => {
    if (!evt.lat || !evt.lng) return false;

    const dist = getDistanceMiles(userLat, userLng, evt.lat, evt.lng);

    // Do NOT mutate evt — store distance separately
    evt._tempDistance = dist;

    return dist <= maxMiles;
  });

  const sorted = filtered.sort((a, b) => a._tempDistance - b._tempDistance);

  // Clean up temp field
  sorted.forEach(evt => delete evt._tempDistance);

  return sorted;
}

async function loadEventCategories() {
  mark("EVENT CATEGORIES: START");

  // -----------------------------------------
  // 1. Try localStorage cache
  // -----------------------------------------
  const cachedCategories     = localStorage.getItem("eventCategories");
  const cachedSubcategories  = localStorage.getItem("eventSubcategories");
  const cachedCatMap         = localStorage.getItem("eventCategoryIconMap");
  const cachedSubMap         = localStorage.getItem("eventSubcategoryIconMap");

  const hasCategories =
    cachedCategories && cachedCategories !== "[]" &&
    cachedSubcategories && cachedSubcategories !== "[]";

  const hasMaps =
    cachedCatMap && cachedCatMap !== "{}" &&
    cachedSubMap && cachedSubMap !== "{}";

  if (hasCategories && hasMaps) {
    mark("EVENT CATEGORIES: Loaded from cache");

    eventCategories        = JSON.parse(cachedCategories);
    eventSubcategories     = JSON.parse(cachedSubcategories);
    eventCategoryIconMap   = JSON.parse(cachedCatMap);
    eventSubcategoryIconMap= JSON.parse(cachedSubMap);

    return;
  }

  // -----------------------------------------
  // 2. Cache missing → fetch from Firestore
  // -----------------------------------------
  mark("EVENT CATEGORIES: Fetching from Firestore");

  const q = query(
    collection(db, "CategoryIconCache"),
    where("source", "array-contains", "events")
  );

  const snap = await getDocs(q);

  eventCategories = [];
  eventSubcategories = [];
  eventCategoryIconMap = {};
  eventSubcategoryIconMap = {};

  snap.forEach(doc => {
    const data = doc.data() || {};

    const category = (data.category || "").toLowerCase().trim();
    const icon     = data.migratedUrl || data.icon || null;
    const isSub    = data.subcategory === true;
    const parent   = data.parentCategory
      ? data.parentCategory.toLowerCase().trim()
      : null;

    const entry = { category, icon, subcategory: isSub, parentCategory: parent };

    if (isSub) {
      eventSubcategories.push(entry);
      if (icon) eventSubcategoryIconMap[category] = icon;
    } else {
      eventCategories.push(entry);
      if (icon) eventCategoryIconMap[category] = icon;
    }
  });

  // -----------------------------------------
  // 3. Sort for UI
  // -----------------------------------------
  eventCategories.sort((a, b) => a.category.localeCompare(b.category));
  eventSubcategories.sort((a, b) => a.category.localeCompare(b.category));

  // -----------------------------------------
  // 4. Save to localStorage
  // -----------------------------------------
  localStorage.setItem("eventCategories", JSON.stringify(eventCategories));
  localStorage.setItem("eventSubcategories", JSON.stringify(eventSubcategories));
  localStorage.setItem("eventCategoryIconMap", JSON.stringify(eventCategoryIconMap));
  localStorage.setItem("eventSubcategoryIconMap", JSON.stringify(eventSubcategoryIconMap));

  mark("EVENT CATEGORIES: Saved to cache");
}

function isWithinThisWeek(d) {
  const now = new Date(nowMs());
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  const dow = today.getDay();
  const mondayOffset = dow === 0 ? -6 : 1 - dow;

  const weekStart = new Date(today);
  weekStart.setDate(today.getDate() + mondayOffset);

  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);

  return d >= weekStart && d <= weekEnd;
}

function getWeekendLabel(d) {
  const now = new Date(nowMs());
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  // This week's Saturday/Sunday
  const thisSat = new Date(today);
  thisSat.setDate(today.getDate() - today.getDay() + 6);
  const thisSun = new Date(thisSat);
  thisSun.setDate(thisSat.getDate() + 1);

  // Last weekend
  const lastSat = new Date(thisSat);
  lastSat.setDate(thisSat.getDate() - 7);
  const lastSun = new Date(lastSat);
  lastSun.setDate(lastSat.getDate() + 1);

  // Next weekend
  const nextSat = new Date(thisSat);
  nextSat.setDate(thisSat.getDate() + 7);
  const nextSun = new Date(nextSat);
  nextSun.setDate(nextSat.getDate() + 1);

  if (d >= lastSat && d <= lastSun) return "Last Wknd";
  if (d >= thisSat && d <= thisSun) return "This Wknd";
  if (d >= nextSat && d <= nextSun) return "Next Wknd";

  return null;
}

function parseLocalDate(dateStr) {
  if (!dateStr) return null;
  const [y, m, d] = dateStr.split("-").map(Number);
  return new Date(y, m - 1, d); // ALWAYS local midnight
}

function formatFriendlyDate(dateStr) {
  if (!dateStr) return "";
  const now = new Date(nowMs());
  const d = parseLocalDate(dateStr);
  
  // Normalize today to midnight
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);

  const dDay = d.toDateString();
  const tDay = today.toDateString();
  const tmDay = tomorrow.toDateString();
  const yDay = yesterday.toDateString();

  // Today / Tomorrow / Yesterday
  if (dDay === tDay) return "Today";
  if (dDay === tmDay) return "Tomorrow";
  if (dDay === yDay) return "Yesterday";

  // Weekend logic (Last / This / Next)
  const weekendLabel = getWeekendLabel(d);
  if (weekendLabel) return weekendLabel;

  // Weekday name if within this week (Mon, Tue, Wed…)
  if (isWithinThisWeek(d)) {
    return d.toLocaleDateString("en-US", { weekday: "short" });
  }

  // Default: Mar 18
  return d.toLocaleDateString("en-US", {
    month: "short",
    day: "numeric"
  });
}

function openCategoryOrSubcategory(key, isSub = false) {
  scrollToTopSmooth();

  const keyNorm = key.toLowerCase().trim();
  showFloatingCategoryIcon(keyNorm);

  const source = allEvents;

  // ---------------------------------------
  // SUBCATEGORY MODE
  // ---------------------------------------
  if (isSub) {
    activeCategory = null;
    activeSubcategory = key;
    activeSubcategoryIcon =
      eventSubcategoryIconMap[keyNorm] ||
      eventSubcategoryIconMap[key] ||
      null;

    categoriesMode = false;

    const filtered = source.filter(evt => {
    // Normalize array verson
    const arr = Array.isArray(evt.subcategories)
      ? evt.subcategories.map(s => s.toLowerCase().trim())
      : [];

    const hasArrayMatch = arr.includes(keyNorm);

    // Normalize string verson
    const hasStringMatch =
      typeof evt.subcategory === "string" &&
      evt.subcategory.toLowerCase().trim() === keyNorm;

    return hasArrayMatch || hasStringMatch;
  });

    currentList = sortEventsByDistance(filtered);
    renderEvents(currentList);
    updateLocationChip();
    updateClearFilterVisibility();
    return;
  }

  // ---------------------------------------
  // CATEGORY MODE
  // ---------------------------------------
  activeCategory = key;
  activeSubcategory = null;
  activeCategoryIcon =
    eventCategoryIconMap[keyNorm] ||
    eventCategoryIconMap[key] ||
    null;

  // Check for subcategories under this category
  const subcats = eventSubcategories.filter(
    sc => sc.parentCategory === keyNorm
  );

  if (subcats.length > 0) {
    categoriesMode = true;
    currentList = null;
    renderEventsubCategoryCards(subcats, key);
    updateLocationChip();
    updateClearFilterVisibility();
    return;
  }

  // No subcategories → show businesses in this category
  categoriesMode = false;

  const filtered = source.filter(evt => {
    const cats = evt.categories || [];
    const hasArrayMatch = cats
      .map(s => s.toLowerCase().trim())
      .includes(keyNorm);

    const hasStringMatch =
      typeof evt.category === "string" &&
      evt.category.toLowerCase().trim() === keyNorm;

    return hasArrayMatch || hasStringMatch;
  });

  currentList = sortEventsByDistance(filtered);
  renderEvents(currentList);
  updateLocationChip();
  updateClearFilterVisibility();
}

function normalizeDate(d) {
  if (!d) return null;

  // Already ISO YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;

  // MM/DD/YYYY
  const md = d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (md) {
    let [_, m, day, y] = md;
    return `${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }

  // DD-MM-YYYY
  const dm = d.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
  if (dm) {
    let [_, day, m, y] = dm;
    return `${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }

  // YYYY/MM/DD
  const ymd = d.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if (ymd) {
    let [_, y, m, day] = ymd;
    return `${y}-${String(m).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
  }

  // DD-MMM-YYYY (19-FEB-2026)
  const mmm = d.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{4})$/);
  if (mmm) {
    const months = {
      JAN:"01", FEB:"02", MAR:"03", APR:"04",
      MAY:"05", JUN:"06", JUL:"07", AUG:"08",
      SEP:"09", OCT:"10", NOV:"11", DEC:"12"
    };
    let [_, day, mon, y] = mmm;
    mon = mon.toUpperCase();
    if (!months[mon]) return null;
    return `${y}-${months[mon]}-${String(day).padStart(2,"0")}`;
  }

  return null;
}

function normalizeTime(t) {
  if (!t) return "00:00";
  if (/^\d{2}:\d{2}$/.test(t)) return t;
  return "00:00";
}

function isFreePrice(value) {
  // ❗ If there's no price, it's NOT free
  if (value === null || value === undefined) return false;

  const v = String(value).trim().toLowerCase();

  if (v === "") return true;
  if (v === "0" || v === "0.0" || v === "0.00") return true;

  const cleaned = v.replace(/[^a-z0-9 ]/g, "").trim();

  const freeWords = [
    "free",
    "no cost",
    "nocost",
    "gratis",
    "complimentary",
    "free entry",
    "free admission",
    "free for locals",
    "free for everyone"
  ];
  if (freeWords.some(w => cleaned.includes(w))) return true;

  if (/^(bz\$|bzd|\$)?0(\.0+)?$/.test(cleaned)) return true;

  return false;
}

  // Helper: convert "11-MAR-2026" → Date object
  function parseDate(d) {
    // Format: DD-MMM-YYYY
    const [day, mon, year] = d.split("-");
    return new Date(`${mon} ${day}, ${year}`);
  }

  // Helper: convert "11:00 AM" → { hours, minutes }
  function parseTime(t) {
    const [time, modifier] = t.split(" ");
    let [hours, minutes] = time.split(":").map(Number);

    if (modifier === "PM" && hours !== 12) hours += 12;
    if (modifier === "AM" && hours === 12) hours = 0;

    return { hours, minutes };
  }

function getClosestUpcomingEvent(allEvents) {
  const now = nowMs();


  // Build a list of ALL daily occurrences
  const occurrences = [];

  for (const evt of allEvents) {
    const startDate = parseDate(evt.fromDate);
    const endDate = parseDate(evt.toDate);

    const fromT = parseTime(evt.fromTime);
    const toT = parseTime(evt.toTime);

    // Loop each day from start → end
    for (
      let d = new Date(startDate);
      d <= endDate;
      d.setDate(d.getDate() + 1)
    ) {
      const dayStart = new Date(d);
      dayStart.setHours(fromT.hours, fromT.minutes, 0, 0);

      const dayEnd = new Date(d);
      dayEnd.setHours(toT.hours, toT.minutes, 0, 0);

      // Only future occurrences matter
      if (dayEnd.getTime() > now) {
        occurrences.push({
          event: evt,
          startDateTime: dayStart.getTime(),
          endDateTime: dayEnd.getTime()
        });
      }
    }
  }

  // Sort by soonest start time
  occurrences.sort((a, b) => a.startDateTime - b.startDateTime);

  return occurrences[0] || null;
}

function getTimeUntil(startTime) {
  const now = nowMs();
  const diff = startTime - now;

  const mins = Math.floor(diff / 60000);
  const hrs = Math.floor(mins / 60);
  const days = Math.floor(hrs / 24);

  if (days > 0) return `${days} day${days > 1 ? "s" : ""}`;
  if (hrs > 0) return `${hrs} hour${hrs > 1 ? "s" : ""}`;
  return `${mins} minute${mins > 1 ? "s" : ""}`;
}

  // ⭐ DATE FILTER LOGIC
  function applyDateFilter(list) {
  const selected = dateFilter.value;
  if (!selected) return list;

  const selectedStart = new Date(selected + "T00:00:00");
  const selectedEnd   = new Date(selected + "T23:59:59");

  const filtered = list.filter(ev => {
    const rawFromDate = ev.fromDate || selected;
    const rawToDate   = ev.toDate   || rawFromDate;

    const fromDate = normalizeDate(rawFromDate);
    const toDate   = normalizeDate(rawToDate);

    const fromTime = normalizeTime(ev.fromTime);
    const toTime   = normalizeTime(ev.toTime);

    const start = new Date(`${fromDate}T${fromTime}`);
    let end     = new Date(`${toDate}T${toTime}`);

    if (isNaN(start) || isNaN(end)) return false;
    if (end < start) end = start;

    return start <= selectedEnd && end >= selectedStart;
  });

  if (noFiltersActive("date")) {
    filtered.sort((a, b) => a.title.localeCompare(b.title));
  }

  return filtered;
}

function punchBackdropHole(shell, panel, backdrop) {
  if (!shell || !panel || !backdrop) return;

  // Ensure shell is the stacking context
  shell.style.position = "relative";
  shell.style.zIndex = "1";

  // Append backdrop + panel into the shell
  if (!backdrop.parentElement) shell.appendChild(backdrop);
  if (!panel.parentElement) shell.appendChild(panel);

  // Ensure correct layering
  backdrop.style.position = "absolute";
  backdrop.style.inset = "0";
  backdrop.style.zIndex = "100";

  panel.style.position = "absolute";
  panel.style.zIndex = "200";

  // Wait for layout before measuring
  requestAnimationFrame(() => {
    const rect = panel.getBoundingClientRect();

    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;

    backdrop.style.setProperty("--px", `${cx}px`);
    backdrop.style.setProperty("--py", `${cy}px`);
  });
}

  function isFree(ev) {
    if (ev.price === 0) return true;                 // numeric zero
    if (ev.price === "0") return true;               // string zero
    if (ev.price === "") return true;                // empty string
    if (!ev.price) return true;                      // null/undefined/empty
    if (typeof ev.price === "string" && ev.price.trim().toLowerCase() === "free") return true;

    return false;
  }

  const DISTANCE_BUCKETS = {
    walk: 0.5,     // within half a mile
    close: 2,      // within 2 miles
    island: 25     // whole island
  };
async function detectEnvironment(ev) {
  // Build text from ALL event fields
  const text = (
    (ev.description || "") + " " +
    (ev.summary || "") + " " +
    (ev.title || "") + " " +
    (ev.venue || "") + " " +
    (ev.locationName || "") + " " +
    (ev.address || "") + " " +
    (ev.placeName || "") + " " +
    (ev.businessName || "") + " " +
    (ev.hostName || "")
  ).toLowerCase();

  // Outdoor keywords
  const outdoorHints = [
    "beach", "beachfront", "dock", "pier",
    "snorkel", "snorkeling", "diving",
    "fishing", "charter", "boat", "sailing", "catamaran",
    "parasail", "jet ski", "jetski", "kayak",
    "open air", "patio", "rooftop",
    "pool party", "beach party", "sunset cruise",
    "sunset sail", "full moon party", "secret beach"
  ];

  const isOutdoor = outdoorHints.some(h => text.includes(h));

  // ⭐ Correct event logic:
  // Outdoor is the only differentiator.
  // Otherwise → default to BOTH.
  const env = isOutdoor ? "outdoor" : "both";

  ev.environment = env;
  return env;
}

  async function attachPriceRatingsToEvents() {
    for (let ev of allEvents) {
      const rating = await computeEventPriceRating(ev);
      ev.priceRating = rating;

  async function computeEventPriceRating(ev) {

    // FREE always wins
    if (isFree(ev)) {
      return "free";
    }

    const p = parseFloat(ev.price);

    if (!isNaN(p)) {
      let derived;
      if (p <= 10) derived = "$";
      else if (p <= 30) derived = "$$";
      else derived = "$$$";
      return derived;
    }

    return null;
  }

  function noFiltersActive(except = null) {
    return !(
      (except !== "price"  && activePrice)  ||
      (except !== "distance"  && activeDistance)  ||
      (except !== "env"    && activeEnv) ||
      (except !== "date"  && activeDate)   ||
      (except !== "search"  && activeSearch)   ||
      (except !== "all"  && activeAll)   ||
      (except !== "my"  && activeMy)   ||
      (except !== "saved"    && showingSaved)
    );
  }
  
  function noTPFiltersActive(except = null) {
    return !(
      (except !== "price"   && activePrice)      ||
      (except !== "distance"  && activeDistance)  ||
      (except !== "env" && activeEnv)
    );
  }

  function runTropicPulseSearch(list, query, fields) {
    const q = query.toLowerCase();

    return list.filter(ev => {
      return fields.some(field => {

        // NAME
        if (field === "title") {
          return (ev.title || "").toLowerCase().includes(q);
        }

        // CATEGORIES ARRAY
        if (field === "category") {
          const category = (ev.category || "").toLowerCase();
          const subcategory     = (ev.subcategory || "").toLowerCase();
          return category.includes(q) || subcategory.includes(q);
        }

        // DESCRIPTION + SUMMARY
        if (field === "description") {
          const description = (ev.description || "").toLowerCase();
          const summary     = (ev.summary || "").toLowerCase();
          return description.includes(q) || summary.includes(q);
        }
        return false;
      });
    });
  }

  function getBusinessByPlaceId(placeId) {
  if (!placeId) return null;
  return allBusinesses.find(b => b.placeId === placeId) || null;
}

  function applyTPFilters() {
  let baseList;

  if (activeMy) {
    baseList = allEvents.filter(ev => ev.email === userEmail);
  } else if (showingSaved) {
    baseList = savedEvents || [];
  } else {
    baseList = allEvents;
  }

  let filtered = [...baseList];

  // 1️⃣ SEARCH
  if (activeSearch) {
    const fields = getSelectedSearchFields();
    filtered = runTropicPulseSearch(filtered, activeSearch, fields);
  }

  // 2️⃣ DATE
  if (activeDate) {
    filtered = handleDateChange(activeDate, filtered);
  }

  // ⭐ 3️⃣ BUSINESS INHERITANCE (NEW)
  filtered = filtered.map(ev => {
    if (!ev.placeId) return ev;

    const biz = getBusinessByPlaceId(ev.placeId);
    if (!biz) return ev;

    if (!ev.lat && biz.lat) {
      ev.lat = biz.lat;
      ev.lng = biz.lng;
    }

    if (!ev.environment && biz.environment) {
      ev.environment = biz.environment;
    }

    if (!ev.priceRating && biz.priceRating) {
      ev.priceRating = biz.priceRating;
    }

    if (!ev.category && biz.category) {
      ev.category = biz.category;
    }

    return ev;
  });

  // 4️⃣ DISTANCE
  if (activeDistance) {
    let maxMiles = typeof activeDistance === "number"
      ? activeDistance
      : DISTANCE_BUCKETS[activeDistance];

    if (maxMiles != null) {
      filtered = filterEventsByDistance(filtered, maxMiles);
    }
  }

  // 5️⃣ PRICE
  if (activePrice) {
    if (tpPrice === "free") {
      filtered = filtered.filter(ev => isFreePrice(ev.price));
    } else {
      filtered = filtered.filter(ev => {
        const p = parseFloat(ev.price);
        if (isNaN(p)) return false;

        if (tpPrice === "$") return p > 0 && p <= 10;
        if (tpPrice === "$$") return p > 10 && p <= 30;
        if (tpPrice === "$$$") return p > 30;

        return false;
      });
    }

    if (noTPFiltersActive("price")) {
      filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
    }
  }

  // 6️⃣ ENVIRONMENT
  if (activeEnv) {
    filtered = filtered.filter(ev => {
      let env = ev.environment || detectEnvironment(ev);
      if (!env) env = "both";
      ev.environment = env;

      if (tpEnv === "both") return true;
      if (tpEnv === "indoor") return env === "indoor" || env === "both";
      if (tpEnv === "outdoor") return env === "outdoor";

      return true;
    });

    if (noTPFiltersActive("env")) {
      filtered.sort((a, b) => a.title.localeCompare(b.title));
    }
  }

  // 7️⃣ NO FILTERS → CATEGORY CARDS
  if (noFiltersActive()) {
    clearFilters();
    return;
  }

  // 8️⃣ FINALIZE
  currentList = filtered;

  if (activeDate) {
    renderEvents(currentList, true);
  } else {
    renderEvents(currentList);
  }

  updateLocationChip();
  updateClearFilterVisibility();
}
