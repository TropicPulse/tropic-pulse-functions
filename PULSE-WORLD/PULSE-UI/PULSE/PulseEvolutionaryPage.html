<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1,
                 maximum-scale=1,
                 minimum-scale=1,
                 user-scalable=no">

  <title>Pulse EvolutionaryTrustedPage — v13-EVO-PRIME</title>
<script src="../_FRONTEND/PULSE-TOUCH.js"></script>
  <!-- ============================================================================
       PULSE UI SKIN ORGAN (BASE)
       ============================================================================ -->
  <link rel="stylesheet" href="../PulseEvolutionaryStyles.css" />

  <!-- ============================================================================
       PULSE UI ANIMATION ORGAN (MOTION)
       ============================================================================ -->
  <link rel="stylesheet" href="../PulseEvolutionaryAnimations.css" />

  <!-- ============================================================================
       DYNAMIC CSS LAYER (EMPTY — JS will inject evolution rules)
       ============================================================================ -->
  <style id="evo-dynamic-style"></style>
</head>

<body>
  <!-- ============================================================================
       HTML LAYER (SKELETON)
       ----------------------------------------------------------------------------
       PulseEvolutionaryPage Skeleton
       --------------------------------
       This single wrapper can reconstruct into:
         • Any internal page (trusted intent)
         • The portal boundary (untrusted intent)
       The organism grows its own body dynamically.
       ============================================================================ -->
  <div id="evo-wrapper"></div>

  <!-- ============================================================================
       JS LAYER (CORTEX)
       ============================================================================ -->
  <script type="module">
import { VitalsLogger as PulseLogger }        from "../_BACKEND/PulseProofLogger.js";
import { VitalsMonitor as PulseVitalsMonitor } from "../_BACKEND/PulseProofMonitor.js";
import PulseUIErrors from "../_FRONTEND/PulseUIErrors-v12-EVO.js";
import { initUIFlow as PulseUIFlow } from "../_FRONTEND/PulseUIFlow-v12-EVO.js";
/* 1. SKIN REFLEX — SIDE‑EFFECT IMPORT, AUTO‑ATTACHES */
import * as PulseSkinReflex from "../_BACKEND/PulseSkinReflex.js"; // PageScannerV12 auto hooks window here
import PulseChunks from "../PulsePresence-v2.js";
/* 0. BOOT MEMBRANE — MUST BE FIRST */
import * as PulseWindow from "../PulseNetEvolutionaryWindow.js";

// Expose PulseChunks
    window.PulseChunks = window.PulseChunks || PulseChunks;
  function mark(label) {
    console.log("[INDEX]", label);
  }

  // Icons
  import { PulseIcons } from "../_BACKEND/PulseEvolutionaryIcons.js";

  // UI organism organs
  import { createPulseEvolutionaryCode } from "../_BACKEND/PulseEvolutionaryCode.js";
  import { createPulseEvolutionaryMemory } from "../_BACKEND/PulseEvolutionaryMemory.js";
  import { createPulseEvolutionaryBrain } from "../_BACKEND/PulseEvolutionaryBrain.js";
  import { createPulseEvolutionaryImpulse } from "../_BACKEND/PulseEvolutionaryImpulse.js";
  import { createPulseEvolutionaryRouter } from "../_BACKEND/PulseEvolutionaryRouter.js";
  import { createPulseEvolutionaryBinary } from "../_BACKEND/PulseEvolutionaryBinary.js";

  // AI organs (example: aiEarn)
  import * as aiEarn from "../../PULSE-BAND/PULSE-AI/aiEarn.js";

  // Mock CNS (replace with real CNS when wired)
  const CNS = {
    emitImpulse(source, impulse) {
      console.log("[CNS] Impulse:", source, impulse);
    }
  };

  const Evolution = {
    getPageLineage() {
      return {
        lineage: "v13-evo-prime",
        stable: true,
        page: window.location.pathname
      };
    },
    recordPageLineage(model) {
      console.log("[Evolution] Lineage recorded:", model);
    }
  };

  // ------------------------------------------------------------------------
  // ACTNOW + MULTI‑INSTANCE FORMULA — INLINE, NO NEW STRUCTURES
  //  • ACTNOW: keep user on same spot after evolution/route
  //  • Multi‑Formula: align intents to prevent drift (forward/backward/engines)
  // ------------------------------------------------------------------------
  function capturePageState() {
    return {
      scrollX: window.scrollX,
      scrollY: window.scrollY,
      anchor:
        document.activeElement &&
        (document.activeElement.id ||
          document.activeElement.name ||
          null)
    };
  }

  function actNowRestore(state) {
    if (!state) return;

    // Pure reflex: no cognition, no async, no timers
    try {
      if (typeof window.scrollTo === "function") {
        window.scrollTo(state.scrollX || 0, state.scrollY || 0);
      }

      if (state.anchor) {
        const el =
          document.getElementById(state.anchor) ||
          document.getElementsByName(state.anchor)[0];
        if (el && typeof el.focus === "function") {
          el.focus();
        }
      }
    } catch {
      // ACTNOW must never break page
    }
  }

  // Multi‑instance formula: drift‑proof alignment of intents
  // v13+ — inline governor, no new organ
  function alignEvolutionIntent(intent) {
    if (!intent || typeof intent !== "object") return intent;

    // Ensure deterministic shape + band tagging
    const base = {
      type: intent.type || "page:update",
      payload: intent.payload || {},
      __band: intent.payload?.__band || "symbolic",
      __dnaTag: intent.payload?.__dnaTag || null
    };

    // Here is where forward/backward/engine alignment rules would live.
    // For now, we keep it deterministic and pass through with normalized shape.
    return base;
  }

  function alignRouteIntent(route, opts) {
    const normalized = {
      route: route || "/",
      opts: opts || {}
    };

    // Same idea: normalize + tag for dual‑band / drift‑proof routing.
    normalized.opts.__band =
      typeof normalized.opts.__band === "string"
        ? normalized.opts.__band
        : "symbolic";

    return normalized;
  }

  // ------------------------------------------------------------------------
  // INSTANTIATE UI ORGANS — v13‑EVO‑PRIME wiring order
  // ------------------------------------------------------------------------

  // 1) Long‑term memory (route‑aware)
  const MemoryOrgan = createPulseEvolutionaryMemory({
    routeId: window.location.pathname || "PulseEvolutionaryPage"
  });

  // 2) Code organ (needs Evolution + Memory + CNS)
  const CodeOrgan = createPulseEvolutionaryCode({
    Evolution,
    LongTermMemory: MemoryOrgan,
    CNS
  });

  // 3) Brain organ (coordinates Code + Memory + CNS)
  const BrainOrgan = createPulseEvolutionaryBrain({
    Evolution,
    LongTermMemory: MemoryOrgan,
    CNS,
    createCode: () => CodeOrgan,
    createMemory: () => MemoryOrgan
  });

  // 4) Router organ (needs CNS + Evolution + Code + Brain)
  const RouterOrgan = createPulseEvolutionaryRouter({
    CNS,
    Evolution,
    CodeOrgan,
    BrainOrgan
  });

  // 5) Impulse organ (route‑aware, lineage‑aware)
  const ImpulseOrgan = createPulseEvolutionaryImpulse({
    CNS,
    Evolution,
    RouteOrgan: RouterOrgan
  });

  // 6) Binary organ (route‑aware, lineage‑aware, chunk/dechunk)
  const BinaryOrgan = createPulseEvolutionaryBinary({
    Evolution,
    RouteOrgan: RouterOrgan,
    MemoryOrgan
  });

  // ------------------------------------------------------------------------
  // PREWARM / PRE‑CHUNK — v13‑EVO‑PRIME
  // ------------------------------------------------------------------------
  async function prewarmEvolutionaryMembrane() {
    try {
      // Memory prewarm (route‑aware)
      if (typeof MemoryOrgan.prewarm === "function") {
        await MemoryOrgan.prewarm();
      }

      // Binary prewarm (chunk/dechunk paths)
      if (typeof BinaryOrgan.prewarm === "function") {
        await BinaryOrgan.prewarm();
      }

      // Brain prewarm (restore + minimal evolve)
      if (typeof BrainOrgan.prewarm === "function") {
        await BrainOrgan.prewarm();
      }

      console.log("[PREWARM] Evolutionary membrane prewarmed.");
    } catch (err) {
      console.warn("[PREWARM] Evolutionary membrane prewarm failed:", err);
    }
  }

  // ------------------------------------------------------------------------
  // BACKGROUND EVOLUTIONARY WORKER HOOK (for second page / loop)
  // ------------------------------------------------------------------------
  async function runBackgroundEvolutionaryTick() {
    if (
      typeof BinaryOrgan.chunk === "function" &&
      typeof BinaryOrgan.dechunk === "function"
    ) {
      const sampleBits = BinaryOrgan.encode
        ? BinaryOrgan.encode({ intent: "evo-tick", ts: Date.now() })
        : "0";

      const chunks = BinaryOrgan.chunk(sampleBits);
      const recombined = BinaryOrgan.dechunk(chunks);

      if (BinaryOrgan.decode) {
        const decoded = BinaryOrgan.decode(recombined);
        console.log("[EVOTICK] decoded payload:", decoded);
      }
    }

    // Worker page can expand this into full 250‑line compute loop.
  }

  // ------------------------------------------------------------------------
  // BOOT SEQUENCE — EvolutionaryTrustedPage (TRUSTED / UNTRUSTED INTENTS)
  // ------------------------------------------------------------------------
  (async () => {
    console.log("[BOOT] PulseEvolutionaryPage starting…");

    await prewarmEvolutionaryMembrane();

    const trust =
      typeof PulseSkinReflex.checkTrust === "function"
        ? await PulseSkinReflex.checkTrust()
        : true; // default to trusted if not wired yet

    if (!trust) {
      console.log("[BOOT] Untrusted session → loading OUTSIDE intent…");

      await BrainOrgan.freshEvolve({
        type: "portal:outside",
        payload: {
          mode: "outside",
          title: "Portal Boundary",
          message: "Please authenticate to continue."
        }
      });

      // OUTSIDE mode: minimal interface, no internal routing
      window.PulseEvolutionaryPage = {
        evolve: async (payload) => {
          const pre = capturePageState();

          const aligned = alignEvolutionIntent({
            type: "portal:update",
            payload
          });

          const result = await CodeOrgan.evolve(aligned);

          actNowRestore(pre);
          return result;
        },

        ai: async (intent) => {
          if (intent === "earn") {
            const data = await aiEarn.readAll?.();
            const pre = capturePageState();

            const aligned = alignEvolutionIntent({
              type: "page:update",
              payload: {
                mode: "inside",
                title: "AI Earn Diagnostics",
                content: JSON.stringify(data ?? {}, null, 2)
              }
            });

            const result = await CodeOrgan.evolve(aligned);

            actNowRestore(pre);
            return result;
          }

          console.warn("[AI] Unknown AI intent:", intent);
        },

        memory: MemoryOrgan,
        brain: BrainOrgan,
        router: RouterOrgan,
        binary: BinaryOrgan,
        impulse: ImpulseOrgan,
        icons: PulseIcons
      };

      console.log("[BOOT] EvolutionaryTrustedPage ready in OUTSIDE mode.");
      return;
    }

    console.log("[BOOT] Trusted session → loading INSIDE intent…");

    const restored = await BrainOrgan.restore?.();

    if (!restored?.ok) {
      await BrainOrgan.freshEvolve({
        type: "page:inside",
        payload: {
          mode: "inside",
          title: "PulseOS",
          content: "Trusted session restored."
        }
      });
    }

    // INSIDE mode: full internal interface
    window.PulseEvolutionaryPage = {
      evolve: async (payload) => {
        const pre = capturePageState();

        const aligned = alignEvolutionIntent({
          type: "page:update",
          payload
        });

        const result = await CodeOrgan.evolve(aligned);

        actNowRestore(pre);
        return result;
      },

      route: async (route, opts) => {
        const pre = capturePageState();

        const aligned = alignRouteIntent(route, opts);
        const result = await RouterOrgan.go(aligned.route, aligned.opts);

        actNowRestore(pre);
        return result;
      },

      encode: (payload) => BinaryOrgan.encode?.(payload),
      decode: (compressed) => BinaryOrgan.decode?.(compressed),

      // Binary chunk/dechunk exposure for evo loops
      chunk: (bits) => BinaryOrgan.chunk?.(bits),
      dechunk: (chunks) => BinaryOrgan.dechunk?.(chunks),

      // Background evolutionary tick hook (for worker variant)
      evoTick: () => runBackgroundEvolutionaryTick(),

      memory: MemoryOrgan,
      brain: BrainOrgan,
      router: RouterOrgan,
      binary: BinaryOrgan,
      impulse: ImpulseOrgan,
      icons: PulseIcons
    };

    console.log("[BOOT] EvolutionaryTrustedPage ready in INSIDE mode.");
  })();
</script>

</body>
</html>
