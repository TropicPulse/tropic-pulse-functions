<script type="module">


/* -----------------------------
   GLOBAL STATE (UI ONLY)
----------------------------- */
let identityUser = PulseIdentity;
let currentUser  = null;
let isAdmin      = identityUser.role === "Admin";
let formIsDirty  = false;
const markDirty  = () => formIsDirty = true;

/* -----------------------------
   DOM ELEMENTS (UNCHANGED)
----------------------------- */
const img             = document.getElementById("profilePhoto");
const emailInput      = document.getElementById("email");
const verifyEmailBtn  = document.getElementById("verifyEmailBtn");
const saveBtn         = document.getElementById("saveBtn");
const changeBtn       = document.getElementById("changePhotoBtn");
const photoInput      = document.getElementById("photoInput");
const redeemBtn       = document.getElementById("redeemPulseBtn");
const confirmInline   = document.getElementById("redeemConfirmInline");
const redeemYes       = document.getElementById("redeemYesBtn");
const redeemNo        = document.getElementById("redeemNoBtn");
const msg             = document.getElementById("msg");

/* -----------------------------
   BOOTSTRAP — UI ONLY
----------------------------- */
(async function userRecordBootstrap() {
  showTPLoader();

  if (isAdmin) {
    setupAdminUserDropdown();
  } else {
    const users = typeof getUsersCache === "function" ? getUsersCache() : null;
    currentUser =
      (Array.isArray(users) && users.find(u => u.id === identityUser.uid)) ||
      identityUser;
    populateUserUI(currentUser);
  }

  hideTPLoader();
})();

/* -----------------------------
   ADMIN DROPDOWN (UNCHANGED)
----------------------------- */
function setupAdminUserDropdown() {
  const dropdown = document.getElementById("userSelectDropdown");
  if (!dropdown) return;

  dropdown.style.display = "block";

  const users = getUsersCache().sort((a, b) =>
    (a.displayName || "").localeCompare(b.displayName || "")
  );

  dropdown.innerHTML = `<option value="">Select a user...</option>`;
  users.forEach(u => {
    const opt = document.createElement("option");
    opt.value = u.id;
    opt.textContent = `${u.displayName || u.email} (${u.email})`;
    dropdown.appendChild(opt);
  });

  dropdown.onchange = () => {
    currentUser = users.find(u => u.id === dropdown.value);
    if (currentUser) populateUserUI(currentUser);
  };
}

/* -----------------------------
   POPULATE UI (UNCHANGED)
----------------------------- */
function populateUserUI(user) {
  if (!user) return;

  document.getElementById("displayNameInput").value = user.displayName || "";
  emailInput.value = user.email || "";
  img.src = user.photoURL || "./_PICTURES/Frustrated.png";

  const pointsEl = document.getElementById("pointsBalance");
  if (pointsEl) pointsEl.textContent = user.pointsBalance ?? 0;

  document.getElementById("emailPinContainer").style.display = "none";
  verifyEmailBtn.style.display = "none";
  saveBtn.disabled = false;
  saveBtn.classList.remove("disabled");
  formIsDirty = false;
}

/* -----------------------------
   SAVE PROFILE (UNCHANGED)
----------------------------- */
saveBtn.onclick = async () => {
  if (!currentUser) return;

  const payload = {
    uid: currentUser.id,
    displayName: document.getElementById("displayNameInput").value.trim(),
    email: currentUser.email,
    photoURL: currentUser.photoURL
  };

  if (!await updateUserRecordFromUI(payload)) {
    showMessage("Unable to update profile.", "error");
    return;
  }

  Object.assign(currentUser, payload);

  if (currentUser.id === identityUser.uid) {
    Object.assign(identityUser, payload);
    localStorage.setItem("tp_identity_v4", JSON.stringify(identityUser));
  }

  showMessage("Profile updated!", "success");
  formIsDirty = false;
};

/* -----------------------------
   EMAIL CHANGE HANDLER (UNCHANGED)
----------------------------- */
emailInput.addEventListener("input", () => {
  if (!currentUser) return;

  const newEmail = emailInput.value.trim().toLowerCase();
  const currentEmail = (currentUser.email || "").toLowerCase();

  if (isAdmin && currentUser.id !== identityUser.uid) {
    emailInput.value = currentUser.email || "";
    showMessage("Admins cannot change another user's email.", "error");
    return;
  }

  const changed = newEmail && newEmail !== currentEmail;
  verifyEmailBtn.style.display = changed ? "inline-block" : "none";
  saveBtn.disabled = changed;
  saveBtn.classList.toggle("disabled", changed);
});

/* -----------------------------
   SEND EMAIL VERIFICATION PIN (UNCHANGED)
----------------------------- */
verifyEmailBtn.onclick = async () => {
  if (!currentUser) return;

  const newEmail = emailInput.value.trim().toLowerCase();
  if (!newEmail) return showMessage("Please enter a valid email first.", "error");

  try {
    const data = await getHook({
      type: "sendPin",
      email: newEmail,
      uid: identityUser.uid,
      purpose: "emailChange"
    });

    if (!data.success) return showMessage(data.error || "Unable to send verification PIN.", "error");

    document.getElementById("emailPinContainer").style.display = "block";
    showMessage("A verification code has been sent to " + newEmail, "success");
  } catch {
    showMessage("Unable to send verification PIN.", "error");
  }
};

/* -----------------------------
   VERIFY EMAIL PIN (UNCHANGED)
----------------------------- */
document.getElementById("submitEmailPinBtn").onclick = async () => {
  if (!currentUser) return;

  const newEmail = emailInput.value.trim().toLowerCase();
  const pin = document.getElementById("emailPinInput").value.trim();
  if (!newEmail || !pin) return showMessage("Please enter both email and PIN.", "error");

  try {
    const data = await getHook({
      type: "verifyPin",
      email: newEmail,
      pin,
      uid: identityUser.uid,
      purpose: "emailChange"
    });

    if (!data.success) return showMessage(data.error || "Invalid PIN.", "error");

    identityUser.email = newEmail;
    if (currentUser.id === identityUser.uid) currentUser.email = newEmail;

    localStorage.setItem("tp_identity_v4", JSON.stringify(identityUser));

    verifyEmailBtn.style.display = "none";
    document.getElementById("emailPinContainer").style.display = "none";
    saveBtn.disabled = false;
    saveBtn.classList.remove("disabled");

    showMessage("Email Verified and Updated!", "success");
  } catch {
    showMessage("Network error verifying PIN.", "error");
  }
};

/* -----------------------------
   MESSAGES (UNCHANGED)
----------------------------- */
function showMessage(text, type = "error") {
  msg.textContent = text;
  msg.className = "msg " + type;
  msg.style.display = "block";
  msg.classList.add("show");

  setTimeout(() => msg.classList.remove("show"), 300);
  msg.scrollIntoView({ behavior: "smooth", block: "center" });
  setTimeout(() => msg.style.display = "none", 4000);
}

/* -----------------------------
   DIRTY FORM TRACKING (UNCHANGED)
----------------------------- */
["fullName","displayNameInput","email","phone"].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener("input", markDirty);
});

["country","role","smsOpt","emailOpt"].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener("change", markDirty);
});

window.addEventListener("beforeunload", e => {
  if (!formIsDirty) return;
  e.preventDefault();
  e.returnValue = "";
});

/* -----------------------------
   LOADER (UNCHANGED)
----------------------------- */
function hideTPLoader() {
  const el = document.getElementById("t-loading");
  if (!el) return;
  el.classList.add("hide");
  setTimeout(() => el.remove(), 700);
}

/* -----------------------------
   LEAVE CONFIRM / STRIPE REDIRECT (UNCHANGED)
----------------------------- */
window.attemptStripeRedirect = function (url) {
  if (url.includes("stripe.com") || url.includes("connect.stripe.com"))
    return window.location.href = url;

  if (!formIsDirty)
    return window.location.href = url;

  const row = document.getElementById("leaveConfirmRow");
  row.style.display = "flex";

  document.getElementById("leaveYesBtn").onclick = () => {
    row.style.display = "none";
    window.location.href = url;
  };

  document.getElementById("leaveNoBtn").onclick = () => {
    row.style.display = "none";
  };
};
// -----------------------------
// HERO HEADER ENTRANCE
// -----------------------------
export async function runHeroHeaderEntrance() {
  if (window.__heroHeaderPlayed) return;
  window.__heroHeaderPlayed = true;

  const top = document.createElement("div");
  const bottom = document.createElement("div");
  top.id = "hero-backdrop-top";
  bottom.id = "hero-backdrop-bottom";

  const base = {
    position: "fixed",
    left: "0",
    right: "0",
    background: "rgba(0,0,0,0.65)",
    pointerEvents: "none",
    zIndex: "9999",
    opacity: "1"
  };

  Object.assign(top.style, base, {
    top: "0",
    height: "100vh",
    transition: "height 1.2s ease-out, opacity 0.8s ease-out"
  });

  Object.assign(bottom.style, base, {
    bottom: "0",
    height: "100vh",
    transition: "height 1.2s ease-out"
  });

  document.body.append(top, bottom);

  await new Promise(requestAnimationFrame);
  await new Promise(requestAnimationFrame);
  await new Promise(res => setTimeout(res, 600));

  bottom.style.height = "0";
  top.style.height = "115px";

  setTimeout(() => top.style.opacity = "0", 900);

  setTimeout(() => {
    bottom.style.opacity = "0";
    top.remove();
    bottom.remove();
  }, 1800);
}


// ============================================================================
// UTILITIES
// ============================================================================
function normalizePhone(raw) {
  if (!raw) return null;
  let v = String(raw).replace(/\u00A0/g, " ").trim().replace(/[^\d+]/g, "");
  if (v.startsWith("+") && v.length >= 8 && v.length <= 15) return v;
  if (v.startsWith("+")) v = v.slice(1);

  const digits = v.replace(/\D/g, "");
  if (digits.length === 7) return "+501" + digits;
  if (digits.startsWith("501") && digits.length === 10) return "+501" + digits.slice(3);
  if (digits.length === 10) return "+1" + digits;
  if (digits.length === 11 && digits.startsWith("1")) return "+1" + digits.slice(1);
  if (digits.length >= 8 && digits.length <= 15) return "+" + digits;
  return null;
}

function isDesktop() {
  const ua = navigator.userAgent.toLowerCase();
  const mobile = ua.includes("iphone") || ua.includes("android") || ua.includes("ipad") || ua.includes("mobile");
  const small = window.innerWidth < 900 || window.innerHeight < 700;
  return !(mobile && small && navigator.maxTouchPoints > 1);
}


// ============================================================================
// STRIPE STATUS
// ============================================================================
async function loadStripeStatus() {
  if (!identityUser) return;

  const statusEl = document.getElementById("stripeStatus");
  const actionEl = document.getElementById("stripeAction");
  statusEl.textContent = "Checking Status…";

  const stripeId = identityUser.stripeAccountID || identityUser.stripeId || null;

  try {
    const data = await getHook({
      type: "getStripeStatus",
      uid: identityUser.uid,
      stripeAccountId: stripeId
    });

    if (!data.success) {
      statusEl.textContent = "Unable to Load Stripe Status!?"; 
      actionEl.innerHTML = "";
      return;
    }

    const s = data.status;

    if (s === "connected") {
      statusEl.textContent = "Connected ✔";
      actionEl.innerHTML = `<div class="t-btn-tri" onclick="attemptStripeRedirect('${data.dashboardLink}')">Open Stripe Dashboard</div>`;
    } else if (s === "pending") {
      statusEl.textContent = "Onboarding Not Complete";
      actionEl.innerHTML = `<div class="t-btn-tri" onclick="attemptStripeRedirect('${data.onboardingLink}')">Continue Setup</div>`;
    } else if (s === "needs_verification") {
      statusEl.textContent = "Verification Required";
      actionEl.innerHTML = `<div class="t-btn-tri" onclick="attemptStripeRedirect('${data.onboardingLink}')">Fix Now</div>`;
    } else {
      statusEl.textContent = "Not Connected";
      actionEl.innerHTML = `<div class="t-btn-tri" onclick="attemptStripeRedirect('${data.onboardingLink}')">Start Setup</div>`;
    }

  } catch {
    statusEl.textContent = "Error Loading Status!?";
  }
}


// ============================================================================
// DISPLAY NAME SANITIZER
// ============================================================================
function sanitizeDisplayName(name) {
  if (!name) return "";
  return name
    .replace(/·/g, "•")
    .replace(/[^\p{L}\p{N}\s\-_•]/gu, "")
    .replace(/[\s\-_]+/g, "•")
    .replace(/•+/g, "•")
    .replace(/^•|•$/g, "")
    .split("•")
    .map(w => w.charAt(0).toUpperCase() + w.slice(1))
    .join("•");
}


// ============================================================================
// UPDATE USER RECORD
// ============================================================================
async function updateUserRecordFromUI(payloadOverride = null) {
  try {
    const rawName        = document.getElementById("fullName").value.trim();
    const rawDisplayName = document.getElementById("displayNameInput").value.trim();
    const rawEmail       = document.getElementById("email").value.trim().toLowerCase();
    const rawPhone       = document.getElementById("phone").value.trim();
    const country        = document.getElementById("country").value;
    const role           = document.getElementById("role").value;

    const smsOpt   = document.getElementById("smsOpt").checked;
    const emailOpt = document.getElementById("emailOpt").checked;

    const cleanDisplayName = sanitizeDisplayName(rawDisplayName);
    const normalizedPhone  = normalizePhone(rawPhone);

    const token = localStorage.getItem("tp_token_v4");
    if (!token || !identityUser?.uid) {
      showMessage("Missing identity or token.", "error");
      return false;
    }

    const payload = payloadOverride || {
      uid: currentUser.id,
      name: rawName,
      displayName: cleanDisplayName,
      email: rawEmail,
      phone: normalizedPhone,
      country,
      role,
      receiveSMS: smsOpt,
      receiveMassEmails: emailOpt,
      photoURL: currentUser.photoURL || ""
    };

    const data = await getHook({
      type: "updateUserRecord",
      token,
      uid: currentUser.id,
      payload
    });

    if (!data?.success) {
      showMessage(data?.message || data?.error || "Unable to update profile.", "error");
      return false;
    }

    Object.assign(currentUser, payload);

    if (currentUser.id === identityUser.uid) {
      Object.assign(identityUser, payload);
      localStorage.setItem("tp_identity_v4", JSON.stringify(identityUser));
    }

    showMessage("Profile updated!", "success");
    return true;

  } catch (err) {
    error("updateUserRecordFromUI error:", err);
    showMessage("Unable to update profile.", "error");
    return false;
  }
}


// ============================================================================
// FALLBACK PHOTO
// ============================================================================
function loadFallbackPhoto() {
  const shimmer = document.getElementById("shimmer");
  shimmer.style.display = "block";

  const photo =
    currentUser?.photoURL?.trim() ||
    identityUser?.photoURL?.trim() ||
    "./_PICTURES/Frustrated.png";

  img.src = photo;

  img.onload = () => {
    shimmer.style.display = "none";
    img.style.display = "block";
  };

  img.onerror = () => {
    shimmer.style.display = "none";
    img.src = "./_PICTURES/Frustrated.png";
    img.style.display = "block";
  };
}


// ============================================================================
// STRIPE REDIRECT
// ============================================================================
window.attemptStripeRedirect = function (url) {
  if (url.includes("stripe.com") || url.includes("connect.stripe.com"))
    return window.location.href = url;

  if (!formIsDirty)
    return window.location.href = url;

  const row = document.getElementById("leaveConfirmRow");
  row.style.display = "flex";

  document.getElementById("leaveYesBtn").onclick = () => {
    row.style.display = "none";
    window.location.href = url;
  };

  document.getElementById("leaveNoBtn").onclick = () => {
    row.style.display = "none";
  };
};


// ============================================================================
// SESSION CHECK (LEGACY COMPAT — MINIMAL)
// ============================================================================
async function sessionCheck() {
  let id = null;

  try {
    const raw = localStorage.getItem("tp_identity_v9");
    if (raw) id = JSON.parse(raw);
  } catch {
    id = null;
  }

  if (!id && typeof identity === "function") {
    try { id = await identity(); } catch { id = null; }
  }

  if (!id || !id.trustedDevice) {
    const here = encodeURIComponent(location.pathname + location.search);
    window.location.href = `/CheckEmail.html?returnTo=${here}`;
    return null;
  }

  window.PulseIdentity = id;
  return id;
}

// -----------------------------
// USERRECORD BOOTSTRAP — v11 (CLEAN, SAFE, MINIMAL)
// -----------------------------
(async () => {
  let lastTime = nowMs();
  const mark = (label, absolute = false) => {
    const now = nowMs();
    log(absolute ? `${label}: @${now.toFixed(1)}ms`
                 : `${label}: +${(now - lastTime).toFixed(1)}ms`);
    lastTime = now;
  };

  // -----------------------------
  // GLOBAL PAGE STATE
  // -----------------------------
  window.isIdle       = true;
  window.identityUser = window.identityUser || null;
  window.currentUser  = window.currentUser  || null;
  window.isAdmin      = window.isAdmin      || false;

  // -----------------------------
  // 1. v11 SESSION CHECK
  // -----------------------------
  mark("USERRECORD: STARTING sessionCheck()");
  const id = await sessionCheck();
  if (!id) return;

  window.identityUser = id;
  window.currentUser  = window.currentUser || id;
  window.isAdmin      = id.role === "Admin";

  if (!window.identityUser) {
    window.location.replace("/CheckEmail.html");
    return;
  }

  // -----------------------------
  // 2. DETERMINE CURRENT USER
  // -----------------------------
  if (window.isAdmin) {
    if (typeof setupAdminUserDropdown === "function") {
      setupAdminUserDropdown();
    }
  } else {
    const users = typeof getUsersCache === "function" ? getUsersCache() : null;

    window.currentUser =
      (Array.isArray(users) && users.find(u => u.id === id.uid)) ||
      id;

    if (typeof populateUserUI === "function") {
      populateUserUI(window.currentUser);
    }
  }

  // -----------------------------
  // 3. STRIPE VISIBILITY / TITLE
  // -----------------------------
  const stripeSection = document.querySelector(".stripe-section");
  const pageTitle     = document.getElementById("pageTitle");
  const pageSubtitle  = document.getElementById("pageSubtitle");

  if (pageTitle)     pageTitle.textContent = "Your Tropic Pulse Profile";
  if (pageSubtitle)  pageSubtitle.textContent = "Update your account details and preferences.";
  if (stripeSection) stripeSection.style.display = "block";

  // -----------------------------
  // 4. HIDE LOADER + STRIPE STATUS
  // -----------------------------
  hideTPLoader();
  if (typeof loadStripeStatus === "function") {
    await loadStripeStatus();
  }

  // -----------------------------
  // 5. HERO HEADER ANIMATION
  // -----------------------------
  document.body.classList.add("hero-header-intro");
  mark("USERRECORD: STARTING HERO ENTRANCE");
  await runHeroHeaderEntrance();

  mark("USERRECORD: ENDING DOM BOOTSTRAP");
  mark("USERRECORD: ENDING DOM LOAD", true);
})();
