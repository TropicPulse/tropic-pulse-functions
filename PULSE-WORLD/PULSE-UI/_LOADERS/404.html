  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #fff3cd 0, #fdf6e3 40%, #f4f4f4 100%);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      max-width: 600px;
      width: 100%;
      padding: 48px 40px 40px; /* more breathing room */
      text-align: center;
      position: relative;
      overflow: hidden;
      margin: 1px auto 6px auto;
      transform: scale(1.4); /* 40% bigger */
    }

    .header {
      margin-bottom: 18px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #00a86b;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }

    .toucan-wrap {
      margin: 22px auto 18px;
    }

    .toucan-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: #F5DD00;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      animation: float 3s ease-in-out infinite;
    }

    .toucan-circle img {
      width: 160px;
      height: auto;
      display: block;
    }

    .message h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #222;
    }

    .message p {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .cta {
      margin-top: 18px;
    }

    .cta a {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 999px;
      background: #00a86b;
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(0, 168, 107, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .cta a:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0, 168, 107, 0.45);
    }

    .footer-note {
      margin-top: 14px;
      font-size: 11px;
      color: #888;
    }

    .hover-pop {
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.hover-pop:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 26px rgba(0, 168, 107, 0.45);
}
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo-text">Tropic Pulse</div>
      <div class="subtitle">Oops! This page flew the coop.</div>
    </div>

    <div class="toucan-wrap">
      <div class="toucan-circle hover-pop">
      <img src="./_PICTURES/Frustrated.png" alt="Frustrated Toucan" />
    </div>
    </div>

    <div class="message">
      <h1>404 – Page Not Found</h1>
      <p>
        Our toucan is frustrated and can’t seem to find the page you’re looking for.  
        It might have been moved, deleted, or never existed.
      </p>
    </div>

    <div class="cta">
      <a href="https://www.tropicpulse.bz">Return to Tropic Pulse</a>
    </div>

    <div class="footer-note">
      Need help? Contact <a href="mailto:sales@tropicpulse.bz">Sales@TropicPulse.BZ</a>
    </div>
  </div>
