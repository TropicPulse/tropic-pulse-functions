<!DOCTYPE html>
<html>
<head>
  <title>Loading Pulse Account…</title>
   <meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               minimum-scale=1,
               user-scalable=no">


<!-- End Meta Pixel Code -->
  <style>
    
    body {
      margin: 0;
      padding: 0;
      background: #000;
      background-image: url('./_PICTURES/Mysterious.png?v4');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }
    
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65); /* increase to 0.75 or 0.85 for deeper darkness */
      pointer-events: none;
      z-index: -1;
    }

    .center-box {
      max-width: 360px;
      background: #ffff99;
      display: flex;
      margin: 1px auto 6px auto;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.4s ease-out;
      width: 100%;
      box-sizing: border-box;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .loader-image {
      width: 200px;
      height: 200px;
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-image img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }

    .loader-circle {
      width: 70px;
      height: 70px;
      border: 6px solid #00a884;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 18px;
      color: #4a3f2f;
      font-weight: 600;
      margin-top: 10px;
      min-height: 24px;
    }

    .fade-out {
      animation: fadeOut 0.35s ease forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: scale(0.98); }
    }
  </style>
</head>

<body>
  <div class="center-box" id="loaderBox">

    <div class="loader-image">
      <img src="./_PICTURES/ToucanLogo-Mini.png?v4" alt="Tropic Pulse Logo">
    </div>

    <div class="loader-circle"></div>

    <div class="loading-text" id="loadingText">Loading your Pulse Account…</div>

  </div>
    <script>
      // Rotate tropical messages
      const messages = [
        "Warming up the Island Breeze…",
        "Checking your Tropic Pulse Identity…",
        "Preparing your Dashboard…",
        "Almost There…"
      ];

      let i = 0;
      setInterval(() => {
        document.getElementById("loadingText").innerText = messages[i];
        i = (i + 1) % messages.length;
      }, 800);

      // Begin logic
      setTimeout(() => {
        const token = localStorage.getItem("tp_token_v4");

        if (!token) {
          setTimeout(() => {
            window.location.replace("/CheckEmail.html");
          }, 300);
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const dest = params.get("dest") || "appDashboard";

        fetch("https://verifytoken-ilx3agka5q-uc.a.run.app", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        })
        .then(r => r.json())
        .then(data => {
          if (!data.success) {
            Object.keys(localStorage).forEach(k => {
              if (k.startsWith("tp_") || k.includes("vault") || k.includes("pulse")) {
                localStorage.removeItem(k);
              }
            });
            setTimeout(() => {
              window.location.replace("/CheckEmail.html");
            }, 300);
            return;
          }

          localStorage.setItem("tp_identity_v4", JSON.stringify(data.identity));
          localStorage.setItem("tp_device_token_v4", "1");

          const preload = new Image();
          preload.src = data.identity.photoURL;

          setTimeout(() => {
            
            setTimeout(() => {
              if (dest === "stripeDashboard") {
                window.location.replace(data.identity.stripeDashboardURL);
                return;
              }
              window.location.replace("/dashboard.html");
            }, 300);
          }, 500);
        });
      }, 100);
    </script>

</body>
</html>
