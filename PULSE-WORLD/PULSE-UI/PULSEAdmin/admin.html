function formatDate(value) {
  if (!value) return "—";

  const d = new Date(value);
  if (isNaN(d.getTime())) return value; // fallback if it's not a valid date

  return d.toLocaleString("en-US", {
    year: "numeric",
    month: "long",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit",
    second: "2-digit"
  });
}

function currency(amount, displayCurrency = "$") {
  // 1. Normalize amount into a clean string
  amount = String(amount || "").replace("$", "").replace("BZ$", "");

  // 2. Convert to number safely
  const num = Number(amount);
  const safe = isNaN(num) ? "0.00" : num.toFixed(2);

  // 3. Normalize displayCurrency safely
  displayCurrency = String(displayCurrency || "$").toUpperCase();

  // 4. Convert displayCurrency into correct symbol
  if (displayCurrency === "USD" || displayCurrency === "$") {
    displayCurrency = "$";
  } else {
    displayCurrency = "BZ$";
  }

  // 5. Return formatted result
  return `${displayCurrency}${safe}`;
}

function formatDisplayAmount(displayCurrency, amount) {
  // If amount is null, undefined, empty string, or NaN → force 0.00
  const safeAmount = Number(amount);
  const finalAmount = isNaN(safeAmount) ? "0.00" : safeAmount.toFixed(2);
  log(displayCurrency);
  displayCurrency = String(displayCurrency || "$").toUpperCase();
  log(displayCurrency);
  if (displayCurrency === "USD" || displayCurrency === "$") {
    displayCurrency = "$";
  } else {
    displayCurrency = "BZ$";
  }

  return currency(finalAmount,displayCurrency);
}

async function loadEvents() {
  const eventSelect = document.getElementById("eventSelect");
  eventSelect.innerHTML = `<option>Loading Events...</option>`;

  try {
    const snapshot = await db.collection("Events")
      .orderBy("createdAt", "desc")
      .get();

    if (snapshot.empty) {
      eventSelect.innerHTML = `<option>No Events Found</option>`;
      return;
    }

    allEvents = snapshot.docs.map(doc => ({
      id: doc.id,
      ...doc.data()
    }));

    // Clear dropdown
    eventSelect.innerHTML = "";

    // Populate dropdown
    allEvents.forEach(ev => {
      const opt = document.createElement("option");
      opt.value = ev.id;
      opt.textContent = ev.Title || ev.title || "Untitled Event";
      eventSelect.appendChild(opt);
    });

    // ⭐ FIX: Set selected value AFTER options exist
    if (selectedEvent) {
      eventSelect.value = selectedEvent.id;
    } else {
      selectedEvent = allEvents[0];
      eventSelect.value = selectedEvent.id;
    }

  } catch (err) {
    error("Error loading events:", err);
    eventSelect.innerHTML = `<option>Error Loading Events</option>`;
  }
}

function applyUserSort(list) {
  if (userSortMode === "alpha") {
    return [...list].sort((a, b) =>
      (a.Email || "").localeCompare(b.Email || "")
    );
  }

  if (userSortMode === "created") {
    return [...list].sort((a, b) => {
      const aDate = a.createdAt?._seconds || 0;
      const bDate = b.createdAt?._seconds || 0;
      return bDate - aDate; // newest first
    });
  }

  return list;
}

      }

    const data = await resp.json();

    if (!orders.length) {
      orderSelect.innerHTML = `<option>No Orders Found</option>`;
      return;
    }

    orders.forEach(order => {
      allOrders.push(order);

      const therest = Number(
        (
          (Number(order.ordertotal) || 0) -
          (Number(order.orderprice) || 0) -
          (Number(order.ordertip) || 0) -
          (Number(order.ordertax) || 0) -
          (Number(order.ordershipping) || 0)
        ).toFixed(2)
      );

      const percentage = (
        ((Number(therest) || 0) / (Number(order.ordertotal) || 1)) * 100
      ).toFixed(2) + "%";

      const option = document.createElement("option");
      option.value = order.id;
      option.textContent =
        `${order.orderID || order.id} — ${currency(order.ordertotal)} - ` +
        `${currency(order.orderprice)} / ${currency(order.ordertip)} ` +
        `($${therest}:::${percentage})`;

      orderSelect.appendChild(option);
    });

    // Set first order
    if (allOrders.length > 0) {
      selectedOrder = allOrders[0];
      firstOrder = allOrders[0];
      document.getElementById("orderlogs").value = allOrders[0].id;
    }

  } catch (err) {
    error("loadOrdersForUser error:", err);
    orderSelect.innerHTML = `<option>Error loading orders</option>`;
  }
}

function safeDate(value) {
  if (!value) return null;

  // Firestore Timestamp object
  if (typeof value.toDate === "function") {
    try { return value.toDate().toISOString(); }
    catch { return null; }
  }

  // Firestore raw timestamp object: { seconds, nanoseconds }
  if (typeof value === "object" && ("seconds" in value || "_seconds" in value)) {
    const sec = value.seconds ?? value._seconds;
    try { return new Date(sec * 1000).toISOString(); }
    catch { return null; }
  }

  // ISO string or JS Date
  try {
    const d = new Date(value);
    if (!isNaN(d.getTime())) return d.toISOString();
  } catch {}

  return null;
}

}

function clean(str) {
  if (!str) return "—";
  return String(str)
    .replace(/\\/g, "\\\\")   // escape backslashes FIRST
    .replace(/\n/g, " ")      // remove newlines
    .replace(/\r/g, " ")      // remove carriage returns
    .replace(/"/g, '\\"')     // escape double quotes
    .replace(/'/g, "\\'")     // escape apostrophes
    .trim();
}

function buildPayload(existing = {}) {
  const email = document.getElementById("users")?.value.trim();
  const type = document.getElementById("type")?.value;
  const sendBtn = document.getElementById("sendEmailBtn");

  // -----------------------------
  // Helpers
  // -----------------------------
  const resetBtn = () => {
    if (!sendBtn) return;
    sendBtn.disabled = false;
    sendBtn.classList.remove("loading");
    sendBtn.innerHTML = "Send Email";
    sendBtn.textContent = "Send Email";
  };

  const fail = (msg) => {
    showMessage(msg, "error");
    resetBtn();
    return null;
  };

  const validateEmail = () => {
  if (!email || !email.includes("@")) {
    return fail("Please select a valid user!");
  }
  return true;
};

  // -----------------------------
  // Base payload
  // -----------------------------
  const payload = {
    ...existing,
    email,
    emailType: type,
  };
  if (!payload) return; 
  // -----------------------------
  // Type: sendPayout
  // -----------------------------
  if (type === "sendPayout") {
    
    if (validateEmail() === null) return null;
    payload.orderID = document.getElementById("orderlogs")?.value || null;
    payload.delivererEmail = email;

    const orderPrice = Number(payload.itemPrice ?? payload.orderprice) || 0;
    const orderTip = Number(payload.tipAmount ?? payload.ordertip) || 0;
    

    payload.payoutAmount = Number(orderTip.toFixed(2));

    if (!payload.orderID || typeof payload.orderID !== "string") {
      return fail("Order ID is required!");
    }

    if (isNaN(payload.payoutAmount)) {
      return fail("Payout amount must be a number!");
    }
  }

  // -----------------------------
  // Type: pulsePointsGifted
  // -----------------------------
  if (type === "pulsePointsGifted") {

    validateEmail();

    payload.points = document.getElementById("points")?.value;

    if (!payload.points || isNaN(Number(payload.points))) {
      return fail("Pulse Points must be a number!");
    }
  }

  return payload;

    function safeJSONParse(str) {
        try {
            return JSON.parse(str);
        } catch (e) {
            return null; // or return the raw string
        }
    }

  function normalizePhone(raw) {
    if (!raw) return null;

    // Remove all non-digits
    let phone = String(raw).replace(/\D+/g, "");

    // Already has country code (E.164 without +)
    if (phone.length === 11 && phone.startsWith("1")) {
      return "+" + phone; // US/Canada
    }

    if (phone.length === 10) {
      // US number missing country code
      return "+1" + phone;
    }

    if (phone.length === 8 && phone.startsWith("6")) {
      // Belize local mobile number (e.g., 6xxxxxxx)
      return "+501" + phone;
    }

    if (phone.length === 11 && phone.startsWith("501")) {
      // Belize with country code but no +
      return "+" + phone;
    }

    // Fallback: if it already starts with country code
    if (phone.length > 8 && !phone.startsWith("+")) {
      return "+" + phone;
    }

    return null;
  }

async function createPaymentShortlink(userID, eventID) {
  const realUrl = `https://pay.tropicpulse.bz/b/00w4gy1ZP0Si7UpcgIfIs01?userID=${encodeURIComponent(userID)}&eventID=${encodeURIComponent(eventID)}`;
  const code = Math.random().toString(36).substring(2, 10);

  await db.collection("ShortLinks").doc(code).set({
    url: realUrl,
    createdAt: Date.now(),
    type: "email"
  });

  return `https://www.tropicpulse.bz/l/${code}`;
}
